<li><strong>Ứng dụng:</strong> Cập nhật giá trị dựa trên giá trị đầu vào và logic trong procedure.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tăng giá trị số lên một tỷ lệ phần trăm</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">PROCEDURE</span> increase_value (
   p_value <span class="hljs-keyword">IN</span> <span class="hljs-keyword">OUT</span> NUMBER,
   p_percent <span class="hljs-keyword">IN</span> NUMBER
)
<span class="hljs-keyword">IS</span>
<span class="hljs-keyword">BEGIN</span>
   p_value :<span class="hljs-operator">=</span> p_value <span class="hljs-operator">*</span> (<span class="hljs-number">1</span> <span class="hljs-operator">+</span> p_percent <span class="hljs-operator">/</span> <span class="hljs-number">100</span>);
<span class="hljs-keyword">END</span> increase_value;

<span class="hljs-comment">-- Gọi:</span>
<span class="hljs-keyword">DECLARE</span>
   v_salary NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">3000</span>;
<span class="hljs-keyword">BEGIN</span>
   increase_value(v_salary, <span class="hljs-number">10</span>); <span class="hljs-comment">-- v_salary trở thành 3300</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương mới: &#x27;</span> <span class="hljs-operator">||</span> v_salary);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="101" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="101" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="tham-s%E1%BB%91-m%E1%BA%B7c-%C4%91%E1%BB%8Bnh-default-1">Tham số mặc định (DEFAULT) (1)</h1>
<ul>
<li>Cho phép gán giá trị mặc định cho tham số nếu người gọi không truyền vào.</li>
<li>Cú pháp: <code>parameter_name datatype DEFAULT value</code></li>
<li><strong>Ví dụ:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">PROCEDURE</span> add_employee (
   p_empno   <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE,
   p_ename   <span class="hljs-keyword">IN</span> emp.ename<span class="hljs-operator">%</span>TYPE,
   p_sal     <span class="hljs-keyword">IN</span> emp.sal<span class="hljs-operator">%</span>TYPE <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">1000</span>,
   p_deptno  <span class="hljs-keyword">IN</span> emp.deptno<span class="hljs-operator">%</span>TYPE <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">10</span>,
   p_job     <span class="hljs-keyword">IN</span> emp.job<span class="hljs-operator">%</span>TYPE <span class="hljs-keyword">DEFAULT</span> <span class="hljs-string">&#x27;CLERK&#x27;</span>
)
<span class="hljs-keyword">IS</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">INSERT INTO</span> emp (empno, ename, sal, deptno, job)
   <span class="hljs-keyword">VALUES</span> (p_empno, p_ename, p_sal, p_deptno, p_job);
   <span class="hljs-keyword">COMMIT</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã thêm nhân viên &#x27;</span> <span class="hljs-operator">||</span> p_ename);
<span class="hljs-keyword">END</span> add_employee;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="102" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="102" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="tham-s%E1%BB%91-m%E1%BA%B7c-%C4%91%E1%BB%8Bnh-default-2">Tham số mặc định (DEFAULT) (2)</h1>
<p><strong>Các cách gọi:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   add_employee(<span class="hljs-number">8888</span>, <span class="hljs-string">&#x27;NGUYEN A&#x27;</span>);                 <span class="hljs-comment">-- Sal=1000, Dept=10, Job=CLERK</span>
   add_employee(<span class="hljs-number">8889</span>, <span class="hljs-string">&#x27;TRAN B&#x27;</span>, <span class="hljs-number">2000</span>);            <span class="hljs-comment">-- Dept=10, Job=CLERK</span>
   add_employee(<span class="hljs-number">8890</span>, <span class="hljs-string">&#x27;LE C&#x27;</span>, p_deptno <span class="hljs-operator">=</span><span class="hljs-operator">&gt;</span> <span class="hljs-number">20</span>);    <span class="hljs-comment">-- Sal=1000, Job=CLERK, Dept=20</span>
   add_employee(<span class="hljs-number">8891</span>, <span class="hljs-string">&#x27;PHAM D&#x27;</span>, p_job <span class="hljs-operator">=</span><span class="hljs-operator">&gt;</span> <span class="hljs-string">&#x27;MANAGER&#x27;</span>, p_sal <span class="hljs-operator">=</span><span class="hljs-operator">&gt;</span> <span class="hljs-number">3000</span>); <span class="hljs-comment">-- Không theo thứ tự</span>
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="103" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="103" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="overloading-n%E1%BA%A1p-ch%E1%BB%93ng-trong-procedurefunction">Overloading (Nạp chồng) trong Procedure/Function</h1>
<ul>
<li><strong>Overloading</strong> là khả năng định nghĩa nhiều procedure hoặc function có cùng tên nhưng khác nhau về <strong>số lượng</strong>, <strong>kiểu dữ liệu</strong>, hoặc <strong>thứ tự</strong> của tham số.</li>
<li>Chỉ áp dụng trong <strong>Package</strong> (không áp dụng cho standalone procedure/function).</li>
<li><strong>Lợi ích:</strong> Tăng tính linh hoạt, dễ sử dụng cho người gọi.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Ví dụ trong Package</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE PACKAGE emp_pkg <span class="hljs-keyword">AS</span>
   <span class="hljs-keyword">PROCEDURE</span> print_info (p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE);
   <span class="hljs-keyword">PROCEDURE</span> print_info (p_ename <span class="hljs-keyword">IN</span> emp.ename<span class="hljs-operator">%</span>TYPE);
   <span class="hljs-keyword">PROCEDURE</span> print_info (p_deptno <span class="hljs-keyword">IN</span> emp.deptno<span class="hljs-operator">%</span>TYPE);
<span class="hljs-keyword">END</span> emp_pkg;

<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE PACKAGE BODY emp_pkg <span class="hljs-keyword">AS</span>
   <span class="hljs-keyword">PROCEDURE</span> print_info (p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE) <span class="hljs-keyword">IS</span> ... <span class="hljs-keyword">END</span>;
   <span class="hljs-keyword">PROCEDURE</span> print_info (p_ename <span class="hljs-keyword">IN</span> emp.ename<span class="hljs-operator">%</span>TYPE) <span class="hljs-keyword">IS</span> ... <span class="hljs-keyword">END</span>;
   <span class="hljs-keyword">PROCEDURE</span> print_info (p_deptno <span class="hljs-keyword">IN</span> emp.deptno<span class="hljs-operator">%</span>TYPE) <span class="hljs-keyword">IS</span> ... <span class="hljs-keyword">END</span>;
<span class="hljs-keyword">END</span> emp_pkg;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="104" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="104" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%C3%BA-ph%C3%A1p-t%E1%BA%A1o-stored-function">Cú pháp tạo Stored Function</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> [<span class="hljs-keyword">OR</span> REPLACE] <span class="hljs-keyword">FUNCTION</span> function_name
   [ (parameter1 [<span class="hljs-keyword">IN</span>] datatype [<span class="hljs-keyword">DEFAULT</span> <span class="hljs-keyword">value</span>],
      parameter2 ... ) ]
<span class="hljs-keyword">RETURN</span> return_datatype
<span class="hljs-keyword">IS</span>
   <span class="hljs-comment">-- Phần khai báo biến cục bộ</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Phần thực thi (bắt buộc)</span>
   <span class="hljs-comment">-- Phải có lệnh RETURN để trả về giá trị</span>
   <span class="hljs-keyword">RETURN</span> <span class="hljs-keyword">value</span>;
EXCEPTION
   <span class="hljs-comment">-- Phần xử lý ngoại lệ (tùy chọn)</span>
   <span class="hljs-keyword">RETURN</span> <span class="hljs-keyword">value</span>; <span class="hljs-comment">-- Có thể có RETURN ở đây</span>
<span class="hljs-keyword">END</span> function_name;
</code></pre>
<ul>
<li><strong>RETURN return_datatype:</strong> Bắt buộc để chỉ định kiểu dữ liệu trả về.</li>
<li><strong>RETURN value:</strong> Trong thân function, có thể có nhiều lệnh RETURN nhưng chỉ một được thực thi.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="105" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="105" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-stored-function-c%C6%A1-b%E1%BA%A3n">Ví dụ: Stored Function cơ bản</h1>
<div class="columns">
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tính lương tháng (lương + hoa hồng)</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">FUNCTION</span> get_monthly_income (
   p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE
)
<span class="hljs-keyword">RETURN</span> NUMBER
<span class="hljs-keyword">IS</span>
   v_sal  emp.sal<span class="hljs-operator">%</span>TYPE;
   v_comm emp.comm<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> sal, NVL(comm, <span class="hljs-number">0</span>)
   <span class="hljs-keyword">INTO</span> v_sal, v_comm
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> p_empno;

   <span class="hljs-keyword">RETURN</span> v_sal <span class="hljs-operator">+</span> v_comm;
EXCEPTION
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
      <span class="hljs-keyword">RETURN</span> <span class="hljs-keyword">NULL</span>; <span class="hljs-comment">-- Không có nhân viên</span>
<span class="hljs-keyword">END</span> get_monthly_income;
</code></pre>
</div>
<div>
<p><strong>Gọi từ PL/SQL:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_income NUMBER;
<span class="hljs-keyword">BEGIN</span>
   v_income :<span class="hljs-operator">=</span> get_monthly_income(<span class="hljs-number">7369</span>);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Thu nhập tháng: &#x27;</span> <span class="hljs-operator">||</span> v_income);
<span class="hljs-keyword">END</span>;
</code></pre>
<p><strong>Gọi từ SQL:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> empno, ename, get_monthly_income(empno) <span class="hljs-keyword">AS</span> monthly_income
<span class="hljs-keyword">FROM</span> emp;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="106" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="106" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="function-v%E1%BB%9Bi-tham-s%E1%BB%91-v%C3%A0-x%E1%BB%AD-l%C3%BD-ph%E1%BB%A9c-t%E1%BA%A1p">Function với tham số và xử lý phức tạp</h1>
<div class="columns">
<div class="col-3">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tính thuế thu nhập cá nhân dựa trên lương và số người phụ thuộc</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">FUNCTION</span> calculate_tax (
   p_sal       <span class="hljs-keyword">IN</span> NUMBER,
   p_dependents <span class="hljs-keyword">IN</span> NUMBER <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">0</span>
)
<span class="hljs-keyword">RETURN</span> NUMBER
<span class="hljs-keyword">IS</span>
   v_tax       NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">0</span>;
   v_taxable   NUMBER;
   v_threshold CONSTANT NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">20000000</span>; <span class="hljs-comment">-- 20 triệu</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Tính thu nhập chịu thuế (giả định giảm trừ gia cảnh)</span>
   v_taxable :<span class="hljs-operator">=</span> p_sal <span class="hljs-operator">-</span> v_threshold <span class="hljs-operator">-</span> (p_dependents <span class="hljs-operator">*</span> <span class="hljs-number">1000000</span>);

   IF v_taxable <span class="hljs-operator">&gt;</span> <span class="hljs-number">0</span> <span class="hljs-keyword">THEN</span>
      IF v_taxable <span class="hljs-operator">&lt;=</span> <span class="hljs-number">5000000</span> <span class="hljs-keyword">THEN</span>
         v_tax :<span class="hljs-operator">=</span> v_taxable <span class="hljs-operator">*</span> <span class="hljs-number">0.05</span>;
      ELSIF v_taxable <span class="hljs-operator">&lt;=</span> <span class="hljs-number">10000000</span> <span class="hljs-keyword">THEN</span>
         v_tax :<span class="hljs-operator">=</span> v_taxable <span class="hljs-operator">*</span> <span class="hljs-number">0.1</span>;
      <span class="hljs-keyword">ELSE</span>
         v_tax :<span class="hljs-operator">=</span> v_taxable <span class="hljs-operator">*</span> <span class="hljs-number">0.2</span>;
      <span class="hljs-keyword">END</span> IF;
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-keyword">RETURN</span> ROUND(v_tax, <span class="hljs-number">2</span>);
<span class="hljs-keyword">END</span> calculate_tax;
</code></pre>
</div>
<div class="col-2">
<p><strong>Sử dụng:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> empno, ename, sal,
       calculate_tax(sal, <span class="hljs-number">0</span>) <span class="hljs-keyword">AS</span> tax_no_dep,
       calculate_tax(sal, <span class="hljs-number">2</span>) <span class="hljs-keyword">AS</span> tax_2_deps
<span class="hljs-keyword">FROM</span> emp;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="107" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="107" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="so-s%C3%A1nh-procedure-v%C3%A0-function-chi-ti%E1%BA%BFt">So sánh Procedure và Function (Chi tiết)</h1>
<ul>
<li><strong>Function bắt buộc phải có RETURN</strong>, Procedure thì không.</li>
<li><strong>Function có thể được gọi trong câu lệnh SQL</strong> (ví dụ <code>SELECT</code>, <code>WHERE</code>, <code>VALUES</code>), Procedure thì không.</li>
<li><strong>Function chỉ nên sử dụng tham số IN</strong> để đảm bảo an toàn khi gọi trong SQL (không có tác dụng phụ - side effects).</li>
<li><strong>Procedure</strong> thường được sử dụng cho các thao tác DML, cập nhật dữ liệu; <strong>Function</strong> thường được sử dụng để tính toán và trả về giá trị đơn lẻ.</li>
<li><strong>Tuy nhiên:</strong> Cả Procedure và Function đều có thể thực hiện DML, nhưng trong Function, việc thực hiện DML có thể bị hạn chế nếu được gọi từ câu lệnh SQL.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="108" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="108" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="t%C3%B3m-t%E1%BA%AFt-v%E1%BB%81-procedure-v%C3%A0-function">Tóm tắt về Procedure và Function</h1>
<ul>
<li><strong>Procedure:</strong> Hành động, có thể có OUT/IN OUT, không bắt buộc RETURN.</li>
<li><strong>Function:</strong> Tính toán, bắt buộc RETURN, thường chỉ dùng IN.</li>
<li><strong>Tham số:</strong> <code>IN</code> (mặc định), <code>OUT</code>, <code>IN OUT</code>.</li>
<li><strong>Default Parameter:</strong> Gán giá trị mặc định, gọi linh hoạt.</li>
<li><strong>Overloading:</strong> Cùng tên, khác tham số - chỉ trong Package.</li>
<li><strong>Lưu ý:</strong> Nên đặt tên có ý nghĩa, xử lý ngoại lệ đầy đủ, kiểm tra tham số đầu vào.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="109" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="109" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="package">Package</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="110" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="110" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="package---gi%E1%BB%9Bi-thi%E1%BB%87u">Package - Giới thiệu</h1>
<ul>
<li>
<p><strong>Package</strong> là một nhóm các đối tượng PL/SQL (Procedure, Function, Biến, Cursor, Exception, Type) liên quan đến nhau, được đóng gói lại thành một đơn vị logic.</p>
</li>
<li>
<p><strong>Cấu trúc Package:</strong></p>
<ul>
<li><strong>Package Specification (Đặc tả):</strong> Khai báo các đối tượng công khai (public) - những gì có thể truy cập từ bên ngoài.</li>
<li><strong>Package Body (Thân):</strong> Cài đặt (implementation) chi tiết cho các đối tượng đã khai báo trong đặc tả. Có thể chứa các đối tượng riêng tư (private).</li>
</ul>
</li>
<li>
<p><strong>Lợi ích:</strong></p>
<ul>
<li><strong>Che giấu thông tin (Information Hiding):</strong> Chỉ hiển thị giao diện, giấu chi tiết cài đặt.</li>
<li><strong>Tổ chức mã:</strong> Nhóm các chức năng liên quan lại với nhau.</li>
<li><strong>Tăng hiệu suất:</strong> Toàn bộ package được load vào bộ nhớ một lần.</li>
<li><strong>Tái sử dụng và bảo trì:</strong> Dễ dàng quản lý và cập nhật.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="111" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="111" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="package-specification-%C4%91%E1%BA%B7c-t%E1%BA%A3-package">Package Specification (Đặc tả Package)</h1>
<ul>
<li>Định nghĩa &quot;giao diện&quot; của package.</li>
<li>Chỉ chứa các khai báo (không có phần thực thi).</li>
<li>Các thành phần khai báo có thể được sử dụng từ bên ngoài.</li>
</ul>
<p><strong>Cú pháp:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> [<span class="hljs-keyword">OR</span> REPLACE] PACKAGE package_name
<span class="hljs-keyword">IS</span>
   <span class="hljs-comment">-- Khai báo biến public</span>
   <span class="hljs-comment">-- Khai báo hằng public</span>
   <span class="hljs-comment">-- Khai báo exception public</span>
   <span class="hljs-comment">-- Khai báo cursor public</span>
   <span class="hljs-comment">-- Khai báo Procedure</span>
   <span class="hljs-comment">-- Khai báo Function</span>
<span class="hljs-keyword">END</span> package_name;
</code></pre>
<ul>
<li><strong>Lưu ý:</strong> Tất cả các khai báo ở đây đều có thể truy cập công khai.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="112" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="112" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="package-body-th%C3%A2n-package">Package Body (Thân Package)</h1>
<ul>
<li>Chứa phần cài đặt (implementation) cho các procedure và function đã khai báo trong specification.</li>
<li>Có thể định nghĩa thêm các biến cục bộ, procedure, function <strong>riêng tư</strong> (private) - chỉ được sử dụng bên trong package.</li>
<li>Có thể có phần <strong>khởi tạo (initialization)</strong> được thực thi một lần khi package được nạp vào bộ nhớ lần đầu.</li>
</ul>
<p><strong>Cú pháp:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> [<span class="hljs-keyword">OR</span> REPLACE] PACKAGE BODY package_name
<span class="hljs-keyword">IS</span>
   <span class="hljs-comment">-- Khai báo biến private</span>
   <span class="hljs-comment">-- Khai báo procedure/function private</span>
   <span class="hljs-comment">-- Cài đặt các procedure/function đã khai báo trong spec</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Phần khởi tạo (tùy chọn) - thực thi một lần</span>
<span class="hljs-keyword">END</span> package_name;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="113" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="113" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-package-specification">Ví dụ: Package Specification</h1>
<div class="columns">
<div class="col-2">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Quản lý nhân viên</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE PACKAGE emp_manager
<span class="hljs-keyword">IS</span>
   <span class="hljs-comment">-- Biến public (có thể sử dụng từ bên ngoài)</span>
   g_dept_id NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">10</span>;

   <span class="hljs-comment">-- Hằng số</span>
   c_max_salary CONSTANT NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">100000</span>;

   <span class="hljs-comment">-- Exception public</span>
   e_sal_too_high EXCEPTION;

   <span class="hljs-comment">-- Procedure public</span>
   <span class="hljs-keyword">PROCEDURE</span> add_employee (
      p_empno  <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE,
      p_ename  <span class="hljs-keyword">IN</span> emp.ename<span class="hljs-operator">%</span>TYPE,
      p_sal    <span class="hljs-keyword">IN</span> emp.sal<span class="hljs-operator">%</span>TYPE <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">1000</span>,
      p_deptno <span class="hljs-keyword">IN</span> emp.deptno<span class="hljs-operator">%</span>TYPE <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">10</span>
   );

</code></pre>
</div>
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">PROCEDURE</span> update_salary (
   p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE,
   p_new_sal <span class="hljs-keyword">IN</span> emp.sal<span class="hljs-operator">%</span>TYPE
);

<span class="hljs-comment">-- Function public</span>
<span class="hljs-keyword">FUNCTION</span> get_annual_income (
   p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE
) <span class="hljs-keyword">RETURN</span> NUMBER;

<span class="hljs-keyword">END</span> emp_manager;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="114" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="114" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-package-body">Ví dụ: Package Body</h1>
<div class="columns">
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE PACKAGE BODY emp_manager
<span class="hljs-keyword">IS</span>
   <span class="hljs-comment">-- Biến private (chỉ dùng trong package)</span>
   v_last_updated <span class="hljs-type">DATE</span>;

   <span class="hljs-comment">-- Hàm private</span>
   <span class="hljs-keyword">FUNCTION</span> is_valid_empno (p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE) <span class="hljs-keyword">RETURN</span> <span class="hljs-type">BOOLEAN</span>
   <span class="hljs-keyword">IS</span>
      v_count NUMBER;
   <span class="hljs-keyword">BEGIN</span>
      <span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">COUNT</span>(<span class="hljs-operator">*</span>) <span class="hljs-keyword">INTO</span> v_count <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> p_empno;
      <span class="hljs-keyword">RETURN</span> v_count <span class="hljs-operator">&gt;</span> <span class="hljs-number">0</span>;
   <span class="hljs-keyword">END</span> is_valid_empno;

   <span class="hljs-comment">-- Cài đặt procedure add_employee</span>
   <span class="hljs-keyword">PROCEDURE</span> add_employee (
      p_empno  <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE,
      p_ename  <span class="hljs-keyword">IN</span> emp.ename<span class="hljs-operator">%</span>TYPE,
      p_sal    <span class="hljs-keyword">IN</span> emp.sal<span class="hljs-operator">%</span>TYPE <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">1000</span>,
      p_deptno <span class="hljs-keyword">IN</span> emp.deptno<span class="hljs-operator">%</span>TYPE <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">10</span>
   )
   <span class="hljs-keyword">IS</span>
   <span class="hljs-keyword">BEGIN</span>
      IF p_sal <span class="hljs-operator">&gt;</span> c_max_salary <span class="hljs-keyword">THEN</span>
         RAISE e_sal_too_high;
      <span class="hljs-keyword">END</span> IF;
      <span class="hljs-keyword">INSERT INTO</span> emp (empno, ename, sal, deptno)
      <span class="hljs-keyword">VALUES</span> (p_empno, p_ename, p_sal, p_deptno);
      v_last_updated :<span class="hljs-operator">=</span> SYSDATE;
      <span class="hljs-keyword">COMMIT</span>;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã thêm nhân viên: &#x27;</span> <span class="hljs-operator">||</span> p_ename);
   <span class="hljs-keyword">END</span> add_employee;
</code></pre>
</div>
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Cài đặt update_salary</span>
<span class="hljs-keyword">PROCEDURE</span> update_salary (p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE, p_new_sal <span class="hljs-keyword">IN</span> emp.sal<span class="hljs-operator">%</span>TYPE)
<span class="hljs-keyword">IS</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">UPDATE</span> emp <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> p_new_sal <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> p_empno;
   IF <span class="hljs-keyword">SQL</span><span class="hljs-operator">%</span>NOTFOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không tìm thấy nhân viên &#x27;</span> <span class="hljs-operator">||</span> p_empno);
   <span class="hljs-keyword">ELSE</span>
      v_last_updated :<span class="hljs-operator">=</span> SYSDATE;
      <span class="hljs-keyword">COMMIT</span>;
   <span class="hljs-keyword">END</span> IF;
<span class="hljs-keyword">END</span> update_salary;

<span class="hljs-comment">-- Cài đặt get_annual_income</span>
<span class="hljs-keyword">FUNCTION</span> get_annual_income (p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE) <span class="hljs-keyword">RETURN</span> NUMBER
<span class="hljs-keyword">IS</span>
   v_sal emp.sal<span class="hljs-operator">%</span>TYPE;
   v_comm emp.comm<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> sal, NVL(comm, <span class="hljs-number">0</span>) <span class="hljs-keyword">INTO</span> v_sal, v_comm
   <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> p_empno;
   <span class="hljs-keyword">RETURN</span> (v_sal <span class="hljs-operator">+</span> v_comm) <span class="hljs-operator">*</span> <span class="hljs-number">12</span>;
EXCEPTION
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span> <span class="hljs-keyword">RETURN</span> <span class="hljs-keyword">NULL</span>;
<span class="hljs-keyword">END</span> get_annual_income;

<span class="hljs-keyword">BEGIN</span>
<span class="hljs-comment">-- Phần khởi tạo (initialization) - chạy khi package được nạp lần đầu</span>
v_last_updated :<span class="hljs-operator">=</span> SYSDATE;
DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Package EMP_MANAGER được khởi tạo lúc: &#x27;</span> <span class="hljs-operator">||</span> v_last_updated);
<span class="hljs-keyword">END</span> emp_manager;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="115" data-paginate="true" data-class="text-xs" data-theme="eaut" lang="en-US" class="text-xs" data-marpit-pagination="115" style="--paginate:true;--class:text-xs;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="s%E1%BB%AD-d%E1%BB%A5ng-package-t%E1%BB%AB-b%C3%AAn-ngo%C3%A0i">Sử dụng Package từ bên ngoài</h1>
<ul>
<li>Gọi các thành phần public của package bằng cú pháp: <code>package_name.element_name</code></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Gọi procedure từ package</span>
<span class="hljs-keyword">BEGIN</span>
   emp_manager.add_employee(<span class="hljs-number">7000</span>, <span class="hljs-string">&#x27;NGUYEN VAN A&#x27;</span>, <span class="hljs-number">5000</span>, <span class="hljs-number">20</span>);
<span class="hljs-keyword">END</span>;
<span class="hljs-comment">-- Gọi function từ package</span>
<span class="hljs-keyword">DECLARE</span>
   v_income NUMBER;
<span class="hljs-keyword">BEGIN</span>
   v_income :<span class="hljs-operator">=</span> emp_manager.get_annual_income(<span class="hljs-number">7369</span>);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Thu nhập năm của 7369: &#x27;</span> <span class="hljs-operator">||</span> v_income);
<span class="hljs-keyword">END</span>;
<span class="hljs-comment">-- Sử dụng biến public</span>
<span class="hljs-keyword">DECLARE</span>
   v_dept_id NUMBER :<span class="hljs-operator">=</span> emp_manager.g_dept_id;
<span class="hljs-keyword">BEGIN</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Phòng mặc định: &#x27;</span> <span class="hljs-operator">||</span> v_dept_id);
<span class="hljs-keyword">END</span>;
<span class="hljs-comment">-- Gọi function trong SQL</span>
<span class="hljs-keyword">SELECT</span> empno, ename, emp_manager.get_annual_income(empno) <span class="hljs-keyword">AS</span> annual_income
<span class="hljs-keyword">FROM</span> emp;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="116" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="116" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="bi%E1%BA%BFn-function-procedure-trong-package">Biến, Function, Procedure trong Package</h1>
<ul>
<li><strong>Biến Package:</strong> Có thể là public (trong spec) hoặc private (trong body). Biến public được duy trì trạng thái trong suốt phiên làm việc (session).</li>
<li><strong>Hàm và Thủ tục:</strong> Public (trong spec) được gọi từ bên ngoài. Private (chỉ trong body) được gọi nội bộ.</li>
<li><strong>Cursor:</strong> Có thể khai báo cursor trong spec hoặc body.</li>
<li><strong>Exception:</strong> Có thể khai báo exception trong spec để bên ngoài có thể bắt.</li>
</ul>
<p><strong>Ví dụ sử dụng biến public duy trì trạng thái:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Gán giá trị cho biến public</span>
<span class="hljs-keyword">BEGIN</span>
   emp_manager.g_dept_id :<span class="hljs-operator">=</span> <span class="hljs-number">30</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="117" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="117" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="package-initialization-kh%E1%BB%9Fi-t%E1%BA%A1o-package">Package Initialization (Khởi tạo Package)</h1>
<ul>
<li>Phần khởi tạo nằm ở cuối Package Body, sau <code>BEGIN</code> và trước <code>END</code>.</li>
<li><strong>Đặc điểm:</strong>
<ul>
<li>Được thực thi <strong>một lần duy nhất</strong> khi package lần đầu tiên được tham chiếu trong một session.</li>
<li>Dùng để khởi tạo biến, thiết lập cấu hình, kiểm tra môi trường.</li>
</ul>
</li>
<li><strong>Ví dụ:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE PACKAGE BODY my_pkg
<span class="hljs-keyword">IS</span>
   v_start_time <span class="hljs-type">DATE</span>;
   ...
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Phần khởi tạo</span>
   v_start_time :<span class="hljs-operator">=</span> SYSDATE;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Package khởi tạo lúc: &#x27;</span> <span class="hljs-operator">||</span> v_start_time);
   <span class="hljs-comment">-- Có thể gọi các thủ tục khởi tạo khác</span>
<span class="hljs-keyword">END</span> my_pkg;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="118" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="118" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="l%E1%BB%A3i-%C3%ADch-c%E1%BB%A7a-package-so-v%E1%BB%9Bi-standalone">Lợi ích của Package so với Standalone</h1>
<table>
<thead>
<tr>
<th><strong>Tiêu chí</strong></th>
<th><strong>Procedure/Function riêng lẻ</strong></th>
<th><strong>Package</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Tổ chức</strong></td>
<td>Rời rạc</td>
<td>Nhóm logic liên quan</td>
</tr>
<tr>
<td><strong>Che giấu thông tin</strong></td>
<td>Không</td>
<td>Có (private trong body)</td>
</tr>
<tr>
<td><strong>Biến toàn cục</strong></td>
<td>Không</td>
<td>Có (public, duy trì trạng thái)</td>
</tr>
<tr>
<td><strong>Overloading</strong></td>
<td>Không</td>
<td>Có thể</td>
</tr>
<tr>
<td><strong>Hiệu suất</strong></td>
<td>Biên dịch riêng lẻ</td>
<td>Biên dịch toàn bộ, load một lần</td>
</tr>
<tr>
<td><strong>Bảo trì</strong></td>
<td>Khó quản lý nhiều đối tượng</td>
<td>Dễ dàng tập trung</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="119" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="119" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="t%C3%B3m-t%E1%BA%AFt-v%E1%BB%81-package">Tóm tắt về Package</h1>
<ul>
<li><strong>Package = Specification (giao diện) + Body (cài đặt)</strong></li>
<li><strong>Specification:</strong> Khai báo các thành phần public.</li>
<li><strong>Body:</strong> Cài đặt chi tiết + có thể có thành phần private và khởi tạo.</li>
<li><strong>Lợi ích:</strong> Tổ chức tốt, che giấu thông tin, tăng hiệu suất, cho phép overloading.</li>
<li><strong>Phạm vi biến:</strong> Biến public tồn tại suốt session.</li>
<li><strong>Khởi tạo:</strong> Chạy một lần khi package được nạp.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="120" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="120" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="trigger">Trigger</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="121" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="121" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="trigger---gi%E1%BB%9Bi-thi%E1%BB%87u">Trigger - Giới thiệu</h1>
<ul>
<li><strong>Trigger</strong> là một khối PL/SQL được lưu trữ và tự động thực thi (kích hoạt) khi một sự kiện nhất định xảy ra trên bảng, view, schema, hoặc database.</li>
<li><strong>Các loại sự kiện:</strong>
<ul>
<li><strong>DML Triggers:</strong> INSERT, UPDATE, DELETE trên bảng.</li>
<li><strong>DDL Triggers:</strong> CREATE, ALTER, DROP trên schema.</li>
<li><strong>Database Triggers:</strong> Logon, Logoff, Startup, Shutdown.</li>
</ul>
</li>
<li><strong>Ứng dụng:</strong>
<ul>
<li>Tự động sinh giá trị (ví dụ: sinh mã tự tăng).</li>
<li>Kiểm tra ràng buộc dữ liệu phức tạp.</li>
<li>Ghi nhật ký (audit) các thay đổi.</li>
<li>Thực thi logic nghiệp vụ khi có sự kiện.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="122" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="122" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="ph%C3%A2n-lo%E1%BA%A1i-trigger-theo-th%E1%BB%9Di-%C4%91i%E1%BB%83m-v%C3%A0-ph%E1%BA%A1m-vi">Phân loại Trigger theo thời điểm và phạm vi</h1>
<p><strong>1. Theo thời điểm kích hoạt:</strong></p>
<ul>
<li><strong>BEFORE Trigger:</strong> Kích hoạt <strong>trước khi</strong> sự kiện được thực hiện.</li>
<li><strong>AFTER Trigger:</strong> Kích hoạt <strong>sau khi</strong> sự kiện được thực hiện.</li>
</ul>
<p><strong>2. Theo phạm vi tác động:</strong></p>
<ul>
<li><strong>Statement Trigger:</strong> Kích hoạt <strong>một lần</strong> cho mỗi câu lệnh DML (dù câu lệnh ảnh hưởng đến nhiều dòng hay không).</li>
<li><strong>Row Trigger:</strong> Kích hoạt <strong>cho mỗi dòng</strong> bị ảnh hưởng bởi câu lệnh DML.</li>
</ul>
<p><strong>3. Theo loại sự kiện:</strong></p>
<ul>
<li><strong>INSERT Trigger</strong>, <strong>UPDATE Trigger</strong>, <strong>DELETE Trigger</strong>, hoặc kết hợp.</li>
<li><strong>INSTEAD OF Trigger:</strong> Sử dụng trên view, cho phép cập nhật view thay vì thực hiện DML.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="123" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="123" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%C3%BA-ph%C3%A1p-t%E1%BA%A1o-trigger">Cú pháp tạo Trigger</h1>
<div class="columns">
<div class="col-3">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> [<span class="hljs-keyword">OR</span> REPLACE] <span class="hljs-keyword">TRIGGER</span> trigger_name
   {BEFORE <span class="hljs-operator">|</span> AFTER <span class="hljs-operator">|</span> INSTEAD <span class="hljs-keyword">OF</span>}
   {<span class="hljs-keyword">INSERT</span> <span class="hljs-operator">|</span> <span class="hljs-keyword">UPDATE</span> [<span class="hljs-keyword">OF</span> column_list] <span class="hljs-operator">|</span> <span class="hljs-keyword">DELETE</span>}
   <span class="hljs-keyword">ON</span> {table_name <span class="hljs-operator">|</span> view_name}
   [<span class="hljs-keyword">FOR</span> <span class="hljs-keyword">EACH</span> <span class="hljs-type">ROW</span>]
   [<span class="hljs-keyword">WHEN</span> (<span class="hljs-keyword">condition</span>)]
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-comment">-- Khai báo biến cục bộ</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Thân trigger</span>
EXCEPTION
   <span class="hljs-comment">-- Xử lý ngoại lệ</span>
<span class="hljs-keyword">END</span> trigger_name;
</code></pre>
</div>
<div class="col-2">
<ul>
<li><strong>BEFORE/AFTER/INSTEAD OF:</strong> Thời điểm kích hoạt.</li>
<li><strong>INSERT/UPDATE/DELETE:</strong> Sự kiện.</li>
<li><strong>ON:</strong> Bảng hoặc view.</li>
<li><strong>FOR EACH ROW:</strong> Nếu có -&gt; Row Trigger, nếu không -&gt; Statement Trigger.</li>
<li><strong>WHEN:</strong> Điều kiện bổ sung (chỉ cho Row Trigger).</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="124" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="124" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="bi%E1%BA%BFn-old-v%C3%A0-new-trong-row-trigger">Biến :OLD và :NEW trong Row Trigger</h1>
<ul>
<li>
<p><strong>:OLD:</strong> Tham chiếu đến giá trị cũ của cột trước khi thay đổi (chỉ có ý nghĩa với UPDATE và DELETE).</p>
</li>
<li>
<p><strong>:NEW:</strong> Tham chiếu đến giá trị mới của cột sau khi thay đổi (chỉ có ý nghĩa với INSERT và UPDATE).</p>
</li>
<li>
<p><strong>Quy tắc sử dụng:</strong></p>
<ul>
<li><strong>INSERT:</strong> Chỉ có <code>:NEW</code> (không có <code>:OLD</code>).</li>
<li><strong>DELETE:</strong> Chỉ có <code>:OLD</code> (không có <code>:NEW</code>).</li>
<li><strong>UPDATE:</strong> Có cả <code>:OLD</code> và <code>:NEW</code>.</li>
</ul>
</li>
<li>
<p><strong>Lưu ý quan trọng:</strong></p>
<ul>
<li>Trong <strong>BEFORE</strong> trigger, có thể gán giá trị cho <code>:NEW</code> (thay đổi dữ liệu trước khi ghi).</li>
<li>Trong <strong>AFTER</strong> trigger, <code>:NEW</code> là chỉ đọc (read-only).</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="125" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="125" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-before-insert-trigger-t%E1%BA%A1o-kh%C3%B3a-ch%C3%ADnh-t%E1%BB%B1-%C4%91%E1%BB%99ng">Ví dụ: BEFORE INSERT Trigger (Tạo khóa chính tự động)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tạo bảng audit cho nhân viên mới</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">TRIGGER</span> trg_emp_before_insert
BEFORE <span class="hljs-keyword">INSERT</span> <span class="hljs-keyword">ON</span> emp
<span class="hljs-keyword">FOR</span> <span class="hljs-keyword">EACH</span> <span class="hljs-type">ROW</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-comment">-- Có thể không cần khai báo nếu đơn giản</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Tự động gán ngày hiện tại cho hiredate nếu không được cung cấp</span>
   IF :NEW.hiredate <span class="hljs-keyword">IS</span> <span class="hljs-keyword">NULL</span> <span class="hljs-keyword">THEN</span>
      :NEW.hiredate :<span class="hljs-operator">=</span> SYSDATE;
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-comment">-- Tự động tạo empno nếu không có (giả định sử dụng sequence)</span>
   IF :NEW.empno <span class="hljs-keyword">IS</span> <span class="hljs-keyword">NULL</span> <span class="hljs-keyword">THEN</span>
      <span class="hljs-keyword">SELECT</span> seq_empno.NEXTVAL <span class="hljs-keyword">INTO</span> :NEW.empno <span class="hljs-keyword">FROM</span> DUAL;
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-comment">-- Chuyển tên thành chữ hoa</span>
   :NEW.ename :<span class="hljs-operator">=</span> <span class="hljs-built_in">UPPER</span>(:NEW.ename);

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã thêm nhân viên mới: &#x27;</span> <span class="hljs-operator">||</span> :NEW.ename);
<span class="hljs-keyword">END</span> trg_emp_before_insert;

<span class="hljs-comment">-- Kiểm tra:</span>
<span class="hljs-keyword">INSERT INTO</span> emp (ename, sal, deptno) <span class="hljs-keyword">VALUES</span> (<span class="hljs-string">&#x27;Nguyen van A&#x27;</span>, <span class="hljs-number">3000</span>, <span class="hljs-number">10</span>);
<span class="hljs-comment">-- hiredate sẽ là SYSDATE, empno được sinh tự động, ename thành &#x27;NGUYEN VAN A&#x27;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="126" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="126" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-before-update-trigger-ki%E1%BB%83m-tra-r%C3%A0ng-bu%E1%BB%99c">Ví dụ: BEFORE UPDATE Trigger (Kiểm tra ràng buộc)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Ngăn chặn cập nhật lương xuống dưới mức tối thiểu</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">TRIGGER</span> trg_emp_before_update_sal
BEFORE <span class="hljs-keyword">UPDATE</span> <span class="hljs-keyword">OF</span> sal <span class="hljs-keyword">ON</span> emp
<span class="hljs-keyword">FOR</span> <span class="hljs-keyword">EACH</span> <span class="hljs-type">ROW</span>
<span class="hljs-keyword">WHEN</span> (NEW.sal <span class="hljs-operator">&lt;</span> OLD.sal)  <span class="hljs-comment">-- Chỉ kích hoạt khi lương bị giảm</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Ngăn chặn giảm lương quá 10%</span>
   IF :NEW.sal <span class="hljs-operator">&lt;</span> :OLD.sal <span class="hljs-operator">*</span> <span class="hljs-number">0.9</span> <span class="hljs-keyword">THEN</span>
      RAISE_APPLICATION_ERROR(<span class="hljs-number">-20001</span>, <span class="hljs-string">&#x27;Không thể giảm lương quá 10%&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-comment">-- Ghi log</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương của &#x27;</span> <span class="hljs-operator">||</span> :OLD.ename <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; thay đổi từ &#x27;</span> <span class="hljs-operator">||</span>
                        :OLD.sal <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; thành &#x27;</span> <span class="hljs-operator">||</span> :NEW.sal);
<span class="hljs-keyword">END</span> trg_emp_before_update_sal;

<span class="hljs-comment">-- Kiểm tra:</span>
<span class="hljs-keyword">UPDATE</span> emp <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> sal <span class="hljs-operator">*</span> <span class="hljs-number">0.8</span> <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>; <span class="hljs-comment">-- Sẽ bị lỗi nếu giảm &gt;10%</span>
<span class="hljs-keyword">UPDATE</span> emp <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> sal <span class="hljs-operator">*</span> <span class="hljs-number">0.95</span> <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>; <span class="hljs-comment">-- Cho phép</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="127" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="127" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-after-delete-trigger-audit-log">Ví dụ: AFTER DELETE Trigger (Audit Log)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tạo bảng audit</span>
<span class="hljs-keyword">CREATE TABLE</span> emp_audit (
   audit_id NUMBER GENERATED <span class="hljs-keyword">BY</span> <span class="hljs-keyword">DEFAULT</span> <span class="hljs-keyword">AS</span> <span class="hljs-keyword">IDENTITY</span>,
   empno NUMBER,
   ename VARCHAR2(<span class="hljs-number">50</span>),
   action VARCHAR2(<span class="hljs-number">20</span>),
   action_date <span class="hljs-type">DATE</span>
);

<span class="hljs-comment">-- Trigger ghi log khi xóa nhân viên</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">TRIGGER</span> trg_emp_after_delete
AFTER <span class="hljs-keyword">DELETE</span> <span class="hljs-keyword">ON</span> emp
<span class="hljs-keyword">FOR</span> <span class="hljs-keyword">EACH</span> <span class="hljs-type">ROW</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">INSERT INTO</span> emp_audit (empno, ename, action, action_date)
   <span class="hljs-keyword">VALUES</span> (:OLD.empno, :OLD.ename, <span class="hljs-string">&#x27;DELETE&#x27;</span>, SYSDATE);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã ghi log xóa nhân viên &#x27;</span> <span class="hljs-operator">||</span> :OLD.empno);
<span class="hljs-keyword">END</span> trg_emp_after_delete;

<span class="hljs-comment">-- Kiểm tra:**</span>
<span class="hljs-keyword">DELETE</span> <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
<span class="hljs-keyword">SELECT</span> <span class="hljs-operator">*</span> <span class="hljs-keyword">FROM</span> emp_audit;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="128" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="128" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-after-insert-trigger-t%E1%BB%B1-%C4%91%E1%BB%99ng-c%E1%BA%ADp-nh%E1%BA%ADt-th%E1%BB%91ng-k%C3%AA">Ví dụ: AFTER INSERT Trigger (Tự động cập nhật thống kê)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Giả sử có bảng dept_stats để lưu số lượng nhân viên theo phòng</span>
<span class="hljs-keyword">CREATE TABLE</span> dept_stats (
   deptno NUMBER <span class="hljs-keyword">PRIMARY KEY</span>,
   emp_count NUMBER <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">0</span>
);

<span class="hljs-comment">-- Trigger cập nhật số lượng khi thêm nhân viên</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">TRIGGER</span> trg_emp_after_insert_update_stats
AFTER <span class="hljs-keyword">INSERT</span> <span class="hljs-keyword">ON</span> emp
<span class="hljs-keyword">FOR</span> <span class="hljs-keyword">EACH</span> <span class="hljs-type">ROW</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Cập nhật số lượng nhân viên trong phòng</span>
   <span class="hljs-keyword">UPDATE</span> dept_stats
   <span class="hljs-keyword">SET</span> emp_count <span class="hljs-operator">=</span> emp_count <span class="hljs-operator">+</span> <span class="hljs-number">1</span>
   <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> :NEW.deptno;

   <span class="hljs-comment">-- Nếu phòng chưa có trong bảng stats, thêm mới</span>
   IF <span class="hljs-keyword">SQL</span><span class="hljs-operator">%</span>NOTFOUND <span class="hljs-keyword">THEN</span>
      <span class="hljs-keyword">INSERT INTO</span> dept_stats (deptno, emp_count) <span class="hljs-keyword">VALUES</span> (:NEW.deptno, <span class="hljs-number">1</span>);
   <span class="hljs-keyword">END</span> IF;
<span class="hljs-keyword">END</span> trg_emp_after_insert_update_stats;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="129" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="129" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-instead-of-trigger-c%E1%BA%ADp-nh%E1%BA%ADt-view">Ví dụ: INSTEAD OF Trigger (Cập nhật View)</h1>
<div class="columns">
<div class="col-1">
<ul>
<li><strong>INSTEAD OF Trigger</strong> được sử dụng trên <strong>view</strong> để cập nhật dữ liệu khi view không thể cập nhật trực tiếp (ví dụ view join nhiều bảng).</li>
</ul>
</div>
<div class="col-3">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tạo view kết hợp nhân viên và phòng ban</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">VIEW</span> emp_dept_view <span class="hljs-keyword">AS</span>
<span class="hljs-keyword">SELECT</span> e.empno, e.ename, e.sal, d.deptno, d.dname
<span class="hljs-keyword">FROM</span> emp e <span class="hljs-keyword">JOIN</span> dept d <span class="hljs-keyword">ON</span> e.deptno <span class="hljs-operator">=</span> d.deptno;

<span class="hljs-comment">-- INSTEAD OF INSERT trigger cho view</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">TRIGGER</span> trg_emp_dept_view_insert
INSTEAD <span class="hljs-keyword">OF</span> <span class="hljs-keyword">INSERT</span> <span class="hljs-keyword">ON</span> emp_dept_view
<span class="hljs-keyword">FOR</span> <span class="hljs-keyword">EACH</span> <span class="hljs-type">ROW</span>
<span class="hljs-keyword">DECLARE</span>
   v_deptno dept.deptno<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Kiểm tra và thêm phòng ban mới nếu chưa có</span>
   <span class="hljs-keyword">BEGIN</span>
      <span class="hljs-keyword">SELECT</span> deptno <span class="hljs-keyword">INTO</span> v_deptno <span class="hljs-keyword">FROM</span> dept <span class="hljs-keyword">WHERE</span> dname <span class="hljs-operator">=</span> :NEW.dname;
   EXCEPTION
      <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
         <span class="hljs-comment">-- Tạo phòng ban mới</span>
         <span class="hljs-keyword">INSERT INTO</span> dept (deptno, dname)
         <span class="hljs-keyword">VALUES</span> (seq_deptno.NEXTVAL, :NEW.dname)
         RETURNING deptno <span class="hljs-keyword">INTO</span> v_deptno;
   <span class="hljs-keyword">END</span>;

   <span class="hljs-comment">-- Thêm nhân viên vào bảng emp</span>
   <span class="hljs-keyword">INSERT INTO</span> emp (empno, ename, sal, deptno)
   <span class="hljs-keyword">VALUES</span> (:NEW.empno, :NEW.ename, :NEW.sal, v_deptno);
<span class="hljs-keyword">END</span> trg_emp_dept_view_insert;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="130" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="130" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="statement-trigger-vs-row-trigger">Statement Trigger vs Row Trigger</h1>
<table>
<thead>
<tr>
<th><strong>Tiêu chí</strong></th>
<th><strong>Statement Trigger</strong></th>
<th><strong>Row Trigger</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Tần suất kích hoạt</strong></td>
<td>Một lần cho mỗi câu lệnh DML</td>
<td>Một lần cho mỗi dòng bị ảnh hưởng</td>
</tr>
<tr>
<td><strong>Cú pháp</strong></td>
<td>Không có <code>FOR EACH ROW</code></td>
<td>Có <code>FOR EACH ROW</code></td>
</tr>
<tr>
<td><strong>Sử dụng :OLD/:NEW</strong></td>
<td>Không thể</td>
<td>Có thể</td>
</tr>
<tr>
<td><strong>Hiệu suất</strong></td>
<td>Tốt hơn khi câu lệnh ảnh hưởng nhiều dòng</td>
<td>Có thể chậm hơn nếu nhiều dòng</td>
</tr>
<tr>
<td><strong>Ứng dụng</strong></td>
<td>Kiểm tra quyền, log câu lệnh, thống kê</td>
<td>Kiểm tra từng dòng, audit từng dòng</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="131" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="131" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-statement-trigger">Ví dụ Statement Trigger</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">TRIGGER</span> trg_emp_statement_audit
AFTER <span class="hljs-keyword">INSERT</span> <span class="hljs-keyword">OR</span> <span class="hljs-keyword">UPDATE</span> <span class="hljs-keyword">OR</span> <span class="hljs-keyword">DELETE</span> <span class="hljs-keyword">ON</span> emp
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Chỉ ghi lại câu lệnh đã thực thi, không quan tâm đến từng dòng</span>
   <span class="hljs-keyword">INSERT INTO</span> audit_log (action_time, action_user, action_type)
   <span class="hljs-keyword">VALUES</span> (SYSDATE, <span class="hljs-keyword">USER</span>, <span class="hljs-string">&#x27;DML on EMP&#x27;</span>);
<span class="hljs-keyword">END</span> trg_emp_statement_audit;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="132" data-paginate="true" data-class="text-xs" data-theme="eaut" lang="en-US" class="text-xs" data-marpit-pagination="132" style="--paginate:true;--class:text-xs;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="k%E1%BA%BFt-h%E1%BB%A3p-nhi%E1%BB%81u-s%E1%BB%B1-ki%E1%BB%87n-trong-trigger">Kết hợp nhiều sự kiện trong Trigger</h1>
<ul>
<li>Có thể kết hợp nhiều sự kiện (INSERT, UPDATE, DELETE) trong một trigger.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Trigger xử lý nhiều sự kiện</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">TRIGGER</span> trg_emp_multi_events
BEFORE <span class="hljs-keyword">INSERT</span> <span class="hljs-keyword">OR</span> <span class="hljs-keyword">UPDATE</span> <span class="hljs-keyword">OR</span> <span class="hljs-keyword">DELETE</span> <span class="hljs-keyword">ON</span> emp
<span class="hljs-keyword">FOR</span> <span class="hljs-keyword">EACH</span> <span class="hljs-type">ROW</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Xác định loại sự kiện</span>
   IF INSERTING <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Thêm mới nhân viên: &#x27;</span> <span class="hljs-operator">||</span> :NEW.ename);
   ELSIF UPDATING <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Cập nhật nhân viên: &#x27;</span> <span class="hljs-operator">||</span> :OLD.ename);
   ELSIF DELETING <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Xóa nhân viên: &#x27;</span> <span class="hljs-operator">||</span> :OLD.ename);
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-comment">-- Kiểm tra cột cụ thể trong UPDATING</span>
   IF UPDATING(<span class="hljs-string">&#x27;SAL&#x27;</span>) <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương thay đổi từ &#x27;</span> <span class="hljs-operator">||</span> :OLD.sal <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; thành &#x27;</span> <span class="hljs-operator">||</span> :NEW.sal);
   <span class="hljs-keyword">END</span> IF;
<span class="hljs-keyword">END</span> trg_emp_multi_events;
</code></pre>
<ul>
<li>Các hàm <code>INSERTING</code>, <code>UPDATING</code>, <code>DELETING</code> dùng để xác định loại sự kiện.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="133" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="133" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="qu%E1%BA%A3n-l%C3%BD-trigger-enable-disable-drop">Quản lý Trigger: ENABLE, DISABLE, DROP</h1>
<div class="columns">
<div>
<p><strong>1. Vô hiệu hóa (Disable) Trigger:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">TRIGGER</span> trigger_name DISABLE;
</code></pre>
<p><strong>2. Kích hoạt (Enable) Trigger:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">TRIGGER</span> trigger_name ENABLE;
</code></pre>
<p><strong>3. Vô hiệu hóa tất cả trigger trên bảng:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER TABLE</span> table_name DISABLE <span class="hljs-keyword">ALL</span> TRIGGERS;
</code></pre>
</div>
<div>
<p><strong>4. Kích hoạt tất cả trigger trên bảng:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER TABLE</span> table_name ENABLE <span class="hljs-keyword">ALL</span> TRIGGERS;
</code></pre>
<p><strong>5. Xóa Trigger:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DROP</span> <span class="hljs-keyword">TRIGGER</span> trigger_name;
</code></pre>
</div>
</div>
<p><strong>Xem thông tin Trigger:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> trigger_name, table_name, status, trigger_type, triggering_event
<span class="hljs-keyword">FROM</span> user_triggers
<span class="hljs-keyword">WHERE</span> table_name <span class="hljs-operator">=</span> <span class="hljs-string">&#x27;EMP&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="134" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="134" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="l%C6%B0u-%C3%BD-khi-s%E1%BB%AD-d%E1%BB%A5ng-trigger">Lưu ý khi sử dụng Trigger</h1>
<ul>
<li><strong>Tránh đệ quy:</strong> Trigger có thể tự kích hoạt lẫn nhau gây đệ quy vô hạn.</li>
<li><strong>Hạn chế logic phức tạp:</strong> Trigger nên ngắn gọn, tránh xử lý nặng nề ảnh hưởng hiệu suất.</li>
<li><strong>Không sử dụng COMMIT/ROLLBACK trong Trigger:</strong> Gây lỗi vì trigger nằm trong transaction.</li>
<li><strong>Kiểm tra ràng buộc:</strong> Sử dụng Trigger để kiểm tra ràng buộc phức tạp không thể dùng CONSTRAINT.</li>
<li><strong>Xử lý ngoại lệ:</strong> Luôn bắt lỗi và thông báo rõ ràng.</li>
<li><strong>Ưu tiên Constraint:</strong> Nếu có thể, sử dụng ràng buộc (CONSTRAINT) thay vì Trigger vì hiệu suất tốt hơn.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="135" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="135" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="t%C3%B3m-t%E1%BA%AFt-v%E1%BB%81-trigger">Tóm tắt về Trigger</h1>
<ul>
<li><strong>Trigger</strong> tự động thực thi khi sự kiện xảy ra.</li>
<li><strong>Phân loại:</strong> BEFORE/AFTER/INSTEAD OF, INSERT/UPDATE/DELETE, Statement/Row.</li>
<li><strong>:OLD và :NEW:</strong> Truy cập giá trị cũ và mới (Row Trigger).</li>
<li><strong>Ứng dụng:</strong> Audit, kiểm tra ràng buộc, tự động sinh giá trị, cập nhật thống kê.</li>
<li><strong>Quản lý:</strong> ENABLE/DISABLE/DROP.</li>
<li><strong>Lưu ý:</strong> Tránh đệ quy, hạn chế độ phức tạp, không dùng COMMIT.</li>
</ul>
</section>
