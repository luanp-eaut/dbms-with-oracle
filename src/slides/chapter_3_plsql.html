<td>Không thực hiện các lệnh phía sau, chuyển đến lần lặp tiếp theo</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-so-s%C3%A1nh-exit-v%C3%A0-continue">Ví dụ so sánh EXIT và CONTINUE</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> <span class="hljs-number">1.</span><span class="hljs-number">.5</span> LOOP
      IF i <span class="hljs-operator">=</span> <span class="hljs-number">3</span> <span class="hljs-keyword">THEN</span>
         CONTINUE;  <span class="hljs-comment">-- Bỏ qua i=3</span>
      <span class="hljs-keyword">END</span> IF;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;i = &#x27;</span> <span class="hljs-operator">||</span> i);
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-comment">-- Output: 1, 2, 4, 5</span>
<span class="hljs-keyword">END</span>;

<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> <span class="hljs-number">1.</span><span class="hljs-number">.5</span> LOOP
      IF i <span class="hljs-operator">=</span> <span class="hljs-number">3</span> <span class="hljs-keyword">THEN</span>
         EXIT;  <span class="hljs-comment">-- Thoát khi i=3</span>
      <span class="hljs-keyword">END</span> IF;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;i = &#x27;</span> <span class="hljs-operator">||</span> i);
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-comment">-- Output: 1, 2</span>
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="52" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="truy-v%E1%BA%A5n-d%E1%BB%AF-li%E1%BB%87u-trong-plsql">Truy vấn dữ liệu trong PL/SQL</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="53" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="truy-v%E1%BA%A5n-d%E1%BB%AF-li%E1%BB%87u-trong-plsql-select-into">Truy vấn dữ liệu trong PL/SQL: SELECT INTO</h1>
<ul>
<li><code>SELECT INTO</code> là cách tiêu chuẩn để lấy dữ liệu từ một hoặc nhiều bảng và gán vào các biến PL/SQL.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> column1, column2, ...
<span class="hljs-keyword">INTO</span> variable1, variable2, ...
<span class="hljs-keyword">FROM</span> table_name
[<span class="hljs-keyword">WHERE</span> <span class="hljs-keyword">condition</span>];
</code></pre>
<ul>
<li><strong>Điều kiện:</strong>
<ul>
<li>Truy vấn phải trả về <strong>đúng một dòng</strong>.</li>
<li>Nếu không có dòng nào, ngoại lệ <code>NO_DATA_FOUND</code> được ném ra.</li>
<li>Nếu nhiều hơn một dòng, ngoại lệ <code>TOO_MANY_ROWS</code> được ném ra.</li>
</ul>
</li>
<li><strong>Mẹo:</strong> Sử dụng các hàm tổng hợp (ví dụ <code>MAX</code>, <code>MIN</code>) hoặc <code>ROWNUM</code> để đảm bảo một dòng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="54" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-select-into">Ví dụ SELECT INTO</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Lấy thông tin một nhân viên</span>
<span class="hljs-keyword">DECLARE</span>
   v_ename  emp.ename<span class="hljs-operator">%</span>TYPE;
   v_sal    emp.sal<span class="hljs-operator">%</span>TYPE;
   v_deptno emp.deptno<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> ename, sal, deptno
   <span class="hljs-keyword">INTO</span> v_ename, v_sal, v_deptno
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tên: &#x27;</span> <span class="hljs-operator">||</span> v_ename);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương: &#x27;</span> <span class="hljs-operator">||</span> v_sal);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Phòng: &#x27;</span> <span class="hljs-operator">||</span> v_deptno);
EXCEPTION
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không tìm thấy nhân viên!&#x27;</span>);
   <span class="hljs-keyword">WHEN</span> TOO_MANY_ROWS <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Có nhiều hơn một nhân viên!&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="55" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="select-into-v%E1%BB%9Bi-bi%E1%BA%BFn-rowtype">SELECT INTO với biến %ROWTYPE</h1>
<ul>
<li>Có thể sử dụng <code>%ROWTYPE</code> để nhận toàn bộ dòng dữ liệu.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_emp_record emp<span class="hljs-operator">%</span>ROWTYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> <span class="hljs-operator">*</span> <span class="hljs-keyword">INTO</span> v_emp_record
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã: &#x27;</span> <span class="hljs-operator">||</span> v_emp_record.empno);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tên: &#x27;</span> <span class="hljs-operator">||</span> v_emp_record.ename);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Ngày vào: &#x27;</span> <span class="hljs-operator">||</span> v_emp_record.hiredate);
EXCEPTION
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không tìm thấy!&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>Lưu ý:</strong> Khi dùng <code>SELECT *</code>, thứ tự cột phải khớp với cấu trúc record.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="56" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="select-into-v%E1%BB%9Bi-bi%E1%BB%83u-th%E1%BB%A9c-v%C3%A0-h%C3%A0m">SELECT INTO với biểu thức và hàm</h1>
<ul>
<li>Có thể sử dụng các hàm SQL (như <code>UPPER</code>, <code>TO_CHAR</code>, <code>ROUND</code>) và biểu thức trong SELECT.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_full_name VARCHAR2(<span class="hljs-number">100</span>);
   v_annual_sal NUMBER;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> <span class="hljs-built_in">UPPER</span>(ename) <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; - &#x27;</span> <span class="hljs-operator">||</span> job,
          sal <span class="hljs-operator">*</span> <span class="hljs-number">12</span> <span class="hljs-operator">+</span> NVL(comm, <span class="hljs-number">0</span>)
   <span class="hljs-keyword">INTO</span> v_full_name, v_annual_sal
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7499</span>;

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Thông tin: &#x27;</span> <span class="hljs-operator">||</span> v_full_name);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Thu nhập năm: &#x27;</span> <span class="hljs-operator">||</span> v_annual_sal);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="57" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%C3%A1c-thao-t%C3%A1c-dml-trong-plsql-insert-update-delete">Các thao tác DML trong PL/SQL (INSERT, UPDATE, DELETE)</h1>
<ul>
<li>Các câu lệnh DML (INSERT, UPDATE, DELETE) có thể được sử dụng trực tiếp trong khối PL/SQL.</li>
<li>Chúng hoạt động giống như trong SQL thuần, nhưng có thể sử dụng biến PL/SQL.</li>
<li><strong>Ví dụ INSERT:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">INSERT INTO</span> emp (empno, ename, job, sal, deptno)
   <span class="hljs-keyword">VALUES</span> (<span class="hljs-number">9999</span>, <span class="hljs-string">&#x27;NGUYEN VAN A&#x27;</span>, <span class="hljs-string">&#x27;CLERK&#x27;</span>, <span class="hljs-number">1500</span>, <span class="hljs-number">20</span>);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã thêm nhân viên mới.&#x27;</span>);
   <span class="hljs-keyword">COMMIT</span>; <span class="hljs-comment">-- Lưu thay đổi</span>
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="58" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%C3%A1c-thao-t%C3%A1c-dml-trong-plsql-insert-update-delete-1">Các thao tác DML trong PL/SQL (INSERT, UPDATE, DELETE)</h1>
<ul>
<li><strong>Ví dụ UPDATE:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">UPDATE</span> emp <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> sal <span class="hljs-operator">*</span> <span class="hljs-number">1.1</span> <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> <span class="hljs-number">10</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã tăng lương 10% cho phòng 10.&#x27;</span>);
   <span class="hljs-keyword">COMMIT</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>Ví dụ DELETE:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">DELETE</span> <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">9999</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã xóa nhân viên.&#x27;</span>);
   <span class="hljs-keyword">COMMIT</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="59" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="s%E1%BB%AD-d%E1%BB%A5ng-bi%E1%BA%BFn-trong-dml">Sử dụng biến trong DML</h1>
<ul>
<li>Có thể sử dụng biến PL/SQL trong câu lệnh DML.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_empno   emp.empno<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">7788</span>;
   v_new_sal emp.sal<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">3500</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">UPDATE</span> emp
   <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> v_new_sal
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> v_empno;

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã cập nhật lương cho nhân viên &#x27;</span> <span class="hljs-operator">||</span> v_empno);
   <span class="hljs-keyword">COMMIT</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="60" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="s%E1%BB%AD-d%E1%BB%A5ng-bi%E1%BA%BFn-trong-dml-1">Sử dụng biến trong DML</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- INSERT với biến</span>
<span class="hljs-keyword">DECLARE</span>
   v_empno   emp.empno<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">8888</span>;
   v_ename   emp.ename<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;TRAN THI B&#x27;</span>;
   v_sal     emp.sal<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">2000</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">INSERT INTO</span> emp (empno, ename, sal, deptno)
   <span class="hljs-keyword">VALUES</span> (v_empno, v_ename, v_sal, <span class="hljs-number">30</span>);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã thêm nhân viên: &#x27;</span> <span class="hljs-operator">||</span> v_ename);
   <span class="hljs-keyword">COMMIT</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="61" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="thu%E1%BB%99c-t%C3%ADnh-ng%E1%BA%A7m-%C4%91%E1%BB%8Bnh-sqlxxx">Thuộc tính ngầm định SQL%xxx</h1>
<ul>
<li>Sau khi thực thi một câu lệnh SQL (DML hoặc SELECT INTO), PL/SQL cung cấp các thuộc tính để kiểm tra kết quả.</li>
<li>Chúng là các thuộc tính của con trỏ <strong>ngầm định</strong> SQL.</li>
<li><strong>SQL%ROWCOUNT:</strong> Số dòng bị ảnh hưởng bởi câu lệnh.</li>
<li><strong>SQL%FOUND:</strong> Trả về <code>TRUE</code> nếu câu lệnh ảnh hưởng ít nhất một dòng.</li>
<li><strong>SQL%NOTFOUND:</strong> Trả về <code>TRUE</code> nếu câu lệnh <strong>không</strong> ảnh hưởng dòng nào.</li>
<li><strong>SQL%ISOPEN:</strong> Luôn trả về <code>FALSE</code> đối với con trỏ ngầm (vì Oracle tự động đóng sau khi thực thi).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="62" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-s%E1%BB%AD-d%E1%BB%A5ng-sqlrowcount-v%C3%A0-sqlfound">Ví dụ: Sử dụng SQL%ROWCOUNT và SQL%FOUND</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Cập nhật lương và kiểm tra số dòng bị ảnh hưởng</span>
<span class="hljs-keyword">DECLARE</span>
   v_empno emp.empno<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">UPDATE</span> emp
   <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> sal <span class="hljs-operator">+</span> <span class="hljs-number">500</span>
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> v_empno;

   IF <span class="hljs-keyword">SQL</span><span class="hljs-operator">%</span>FOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã cập nhật &#x27;</span> <span class="hljs-operator">||</span> <span class="hljs-keyword">SQL</span><span class="hljs-operator">%</span>ROWCOUNT <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; dòng.&#x27;</span>);
   <span class="hljs-keyword">ELSE</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không tìm thấy nhân viên để cập nhật.&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;
   <span class="hljs-keyword">COMMIT</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="63" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-s%E1%BB%AD-d%E1%BB%A5ng-sqlrowcount-v%C3%A0-sqlfound-1">Ví dụ: Sử dụng SQL%ROWCOUNT và SQL%FOUND</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Xóa nhân viên và thông báo</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">DELETE</span> <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> <span class="hljs-number">99</span>;
   IF <span class="hljs-keyword">SQL</span><span class="hljs-operator">%</span>NOTFOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không có nhân viên nào bị xóa.&#x27;</span>);
   <span class="hljs-keyword">ELSE</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã xóa &#x27;</span> <span class="hljs-operator">||</span> <span class="hljs-keyword">SQL</span><span class="hljs-operator">%</span>ROWCOUNT <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; nhân viên.&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;
   <span class="hljs-keyword">COMMIT</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="64" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="sqlisopen-v%C3%A0-l%C6%B0u-%C3%BD">SQL%ISOPEN và lưu ý</h1>
<ul>
<li><code>SQL%ISOPEN</code> cho con trỏ ngầm định <strong>luôn là FALSE</strong> vì Oracle tự động đóng ngay sau khi câu lệnh hoàn thành.</li>
<li>Nó thường được sử dụng với con trỏ tường minh (sẽ học ở phần sau).</li>
<li><strong>Ví dụ (không có ý nghĩa thực tế cho con trỏ ngầm):</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">UPDATE</span> emp <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> sal <span class="hljs-keyword">WHERE</span> <span class="hljs-number">1</span><span class="hljs-operator">=</span><span class="hljs-number">0</span>; <span class="hljs-comment">-- không ảnh hưởng dòng</span>
   IF <span class="hljs-keyword">SQL</span><span class="hljs-operator">%</span>ISOPEN <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Con trỏ mở&#x27;</span>); <span class="hljs-comment">-- Sẽ không bao giờ in ra</span>
   <span class="hljs-keyword">ELSE</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Con trỏ đã đóng&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="65" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="cursor">Cursor</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="66" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="gi%E1%BB%9Bi-thi%E1%BB%87u-v%E1%BB%81-cursor-con-tr%E1%BB%8F">Giới thiệu về Cursor (Con trỏ)</h1>
<ul>
<li>
<p><strong>Cursor</strong> là một vùng nhớ tạm thời được Oracle cấp phát để lưu trữ kết quả của một câu lệnh SQL.</p>
</li>
<li>
<p>Cho phép duyệt qua từng dòng kết quả một cách tuần tự.</p>
</li>
<li>
<p><strong>Có hai loại cursor:</strong></p>
<ol>
<li><strong>Con trỏ ngầm định (Implicit Cursor):</strong> Được tạo tự động khi thực thi các câu lệnh DML hoặc SELECT INTO. Chúng ta đã sử dụng với các thuộc tính SQL%.</li>
<li><strong>Con trỏ tường minh (Explicit Cursor):</strong> Được lập trình viên khai báo, mở, lấy dữ liệu, và đóng. Dùng để xử lý tập kết quả có nhiều dòng.</li>
</ol>
</li>
<li>
<p><strong>Ưu điểm của cursor tường minh:</strong></p>
<ul>
<li>Kiểm soát chi tiết quá trình duyệt dữ liệu.</li>
<li>Cho phép truy xuất từng dòng và xử lý logic phức tạp.</li>
<li>Hỗ trợ tham số (Parameterized Cursor).</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="67" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%C3%A1c-b%C6%B0%E1%BB%9Bc-s%E1%BB%AD-d%E1%BB%A5ng-explicit-cursor">Các bước sử dụng Explicit Cursor</h1>
<p><strong>1. Khai báo (Declare):</strong> Xác định truy vấn.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CURSOR</span> cursor_name <span class="hljs-keyword">IS</span>
   select_statement;
</code></pre>
<p><strong>2. Mở (Open):</strong> Thực thi truy vấn và nạp dữ liệu vào vùng nhớ.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">OPEN</span> cursor_name;
</code></pre>
<p><strong>3. Lấy dữ liệu (Fetch):</strong> Lấy từng dòng từ cursor vào biến.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">FETCH</span> cursor_name <span class="hljs-keyword">INTO</span> variable_list;
</code></pre>
<p><strong>4. Đóng (Close):</strong> Giải phóng vùng nhớ.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CLOSE</span> cursor_name;
</code></pre>
<ul>
<li><strong>Lưu ý:</strong> Luôn kiểm tra điều kiện dừng (thường là <code>cursor_name%NOTFOUND</code>) để tránh lỗi khi không còn dữ liệu.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="68" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-explicit-cursor-c%C6%A1-b%E1%BA%A3n">Ví dụ Explicit Cursor cơ bản</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- In danh sách tên và lương của tất cả nhân viên</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp <span class="hljs-keyword">IS</span>
      <span class="hljs-keyword">SELECT</span> ename, sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">ORDER</span> <span class="hljs-keyword">BY</span> ename;
   v_ename emp.ename<span class="hljs-operator">%</span>TYPE;
   v_sal   emp.sal<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">OPEN</span> c_emp;
   LOOP
      <span class="hljs-keyword">FETCH</span> c_emp <span class="hljs-keyword">INTO</span> v_ename, v_sal;
      EXIT <span class="hljs-keyword">WHEN</span> c_emp<span class="hljs-operator">%</span>NOTFOUND;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tên: &#x27;</span> <span class="hljs-operator">||</span> v_ename <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;, Lương: &#x27;</span> <span class="hljs-operator">||</span> v_sal);
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-keyword">CLOSE</span> c_emp;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="69" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="cursor-v%E1%BB%9Bi-rowtype">Cursor với %ROWTYPE</h1>
<ul>
<li>Có thể sử dụng <code>cursor_name%ROWTYPE</code> để lấy toàn bộ dòng.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp <span class="hljs-keyword">IS</span>
      <span class="hljs-keyword">SELECT</span> <span class="hljs-operator">*</span> <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> <span class="hljs-number">20</span>;
   v_emp_record c_emp<span class="hljs-operator">%</span>ROWTYPE;  <span class="hljs-comment">-- Kiểu record giống với dòng của cursor</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">OPEN</span> c_emp;
   LOOP
      <span class="hljs-keyword">FETCH</span> c_emp <span class="hljs-keyword">INTO</span> v_emp_record;
      EXIT <span class="hljs-keyword">WHEN</span> c_emp<span class="hljs-operator">%</span>NOTFOUND;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã: &#x27;</span> <span class="hljs-operator">||</span> v_emp_record.empno <span class="hljs-operator">||</span>
                           <span class="hljs-string">&#x27;, Tên: &#x27;</span> <span class="hljs-operator">||</span> v_emp_record.ename);
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-keyword">CLOSE</span> c_emp;
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><code>cursor_name%ROWTYPE</code> tương tự <code>table_name%ROWTYPE</code> nhưng dựa trên cấu trúc truy vấn của cursor (không phải bảng).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="70" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="cursor-for-loop-v%C3%B2ng-l%E1%BA%B7p-con-tr%E1%BB%8F-t%E1%BB%B1-%C4%91%E1%BB%99ng">Cursor FOR LOOP (Vòng lặp con trỏ tự động)</h1>
<ul>
<li><strong>Cursor FOR LOOP</strong> là cách ngắn gọn và an toàn nhất để xử lý cursor.</li>
<li>Vòng lặp tự động:
<ul>
<li>Khai báo biến record.</li>
<li>Mở cursor.</li>
<li>Fetch từng dòng.</li>
<li>Đóng cursor khi kết thúc.</li>
</ul>
</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">FOR</span> record_variable <span class="hljs-keyword">IN</span> cursor_name LOOP
   <span class="hljs-comment">-- Xử lý record_variable</span>
<span class="hljs-keyword">END</span> LOOP;
</code></pre>
<ul>
<li>Không cần khai báo biến record riêng, không cần <code>OPEN</code>, <code>FETCH</code>, <code>CLOSE</code>.</li>
<li>Ngoài ra, có thể sử dụng trực tiếp câu lệnh SELECT trong vòng lặp (sẽ minh họa).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-class="text-xs" data-theme="eaut" lang="en-US" class="text-xs" data-marpit-pagination="71" style="--paginate:true;--class:text-xs;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-cursor-for-loop">Ví dụ Cursor FOR LOOP</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Sử dụng cursor đã khai báo</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp <span class="hljs-keyword">IS</span>
      <span class="hljs-keyword">SELECT</span> empno, ename, sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> <span class="hljs-number">30</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> emp_rec <span class="hljs-keyword">IN</span> c_emp LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.empno <span class="hljs-operator">||</span>
                           <span class="hljs-string">&#x27;, Tên: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.ename <span class="hljs-operator">||</span>
                           <span class="hljs-string">&#x27;, Lương: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.sal);
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-comment">-- Tự động đóng cursor</span>
<span class="hljs-keyword">END</span>;

<span class="hljs-comment">-- Sử dụng trực tiếp câu lệnh SELECT trong FOR LOOP (không cần khai báo cursor)</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> emp_rec <span class="hljs-keyword">IN</span> (<span class="hljs-keyword">SELECT</span> empno, ename, job <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> sal <span class="hljs-operator">&gt;</span> <span class="hljs-number">2000</span>) LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.empno <span class="hljs-operator">||</span>
                           <span class="hljs-string">&#x27;, Tên: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.ename <span class="hljs-operator">||</span>
                           <span class="hljs-string">&#x27;, Chức vụ: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.job);
   <span class="hljs-keyword">END</span> LOOP;
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>Ưu điểm:</strong> Đơn giản, không lo quên đóng cursor.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="72" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="parameterized-cursor-con-tr%E1%BB%8F-c%C3%B3-tham-s%E1%BB%91">Parameterized Cursor (Con trỏ có tham số)</h1>
<ul>
<li>Cho phép truyền tham số vào cursor để lọc dữ liệu linh hoạt.</li>
<li><strong>Khai báo:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CURSOR</span> cursor_name (parameter_name datatype, ...) <span class="hljs-keyword">IS</span>
   select_statement <span class="hljs-keyword">WHERE</span> ... <span class="hljs-operator">=</span> parameter_name ...;
</code></pre>
<ul>
<li><strong>Mở:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">OPEN</span> cursor_name (value1, value2, ...);
</code></pre>
<ul>
<li>Khi dùng <code>FOR LOOP</code>, truyền tham số vào trong ngoặc đơn của tên cursor.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-class="text-xs" data-theme="eaut" lang="en-US" class="text-xs" data-marpit-pagination="73" style="--paginate:true;--class:text-xs;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-parameterized-cursor">Ví dụ Parameterized Cursor</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Cursor lấy nhân viên theo phòng ban và mức lương tối thiểu</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp (p_deptno NUMBER, p_min_sal NUMBER) <span class="hljs-keyword">IS</span>
      <span class="hljs-keyword">SELECT</span> empno, ename, sal
      <span class="hljs-keyword">FROM</span> emp
      <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> p_deptno
        <span class="hljs-keyword">AND</span> sal <span class="hljs-operator">&gt;</span> p_min_sal;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- In nhân viên phòng 20 có lương &gt; 2000</span>
   <span class="hljs-keyword">FOR</span> emp_rec <span class="hljs-keyword">IN</span> c_emp(<span class="hljs-number">20</span>, <span class="hljs-number">2000</span>) LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Phòng 20: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.ename <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; - &#x27;</span> <span class="hljs-operator">||</span> emp_rec.sal);
   <span class="hljs-keyword">END</span> LOOP;

   <span class="hljs-comment">-- In nhân viên phòng 30 có lương &gt; 1500</span>
   <span class="hljs-keyword">FOR</span> emp_rec <span class="hljs-keyword">IN</span> c_emp(<span class="hljs-number">30</span>, <span class="hljs-number">1500</span>) LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Phòng 30: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.ename <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; - &#x27;</span> <span class="hljs-operator">||</span> emp_rec.sal);
   <span class="hljs-keyword">END</span> LOOP;
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>Tham số ngầm định:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CURSOR</span> c_emp (p_deptno NUMBER <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">10</span>) <span class="hljs-keyword">IS</span> ...
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="74" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="thu%E1%BB%99c-t%C3%ADnh-c%E1%BB%A7a-cursor-t%C6%B0%E1%BB%9Dng-minh">Thuộc tính của Cursor tường minh</h1>
<ul>
<li>Tương tự như con trỏ ngầm, cursor tường minh có các thuộc tính:
<ul>
<li><strong>%FOUND:</strong> <code>TRUE</code> nếu lần fetch cuối cùng trả về một dòng.</li>
<li><strong>%NOTFOUND:</strong> <code>TRUE</code> nếu lần fetch cuối cùng không trả về dòng nào.</li>
<li><strong>%ROWCOUNT:</strong> Số dòng đã được fetch từ cursor.</li>
<li><strong>%ISOPEN:</strong> <code>TRUE</code> nếu cursor đang mở.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="75" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-thu%E1%BB%99c-t%C3%ADnh-c%E1%BB%A7a-cursor-t%C6%B0%E1%BB%9Dng-minh">Ví dụ thuộc tính của Cursor tường minh</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp <span class="hljs-keyword">IS</span> <span class="hljs-keyword">SELECT</span> ename <span class="hljs-keyword">FROM</span> emp;
   v_name emp.ename<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">OPEN</span> c_emp;
   LOOP
      <span class="hljs-keyword">FETCH</span> c_emp <span class="hljs-keyword">INTO</span> v_name;
      EXIT <span class="hljs-keyword">WHEN</span> c_emp<span class="hljs-operator">%</span>NOTFOUND;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Dòng &#x27;</span> <span class="hljs-operator">||</span> c_emp<span class="hljs-operator">%</span>ROWCOUNT <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;: &#x27;</span> <span class="hljs-operator">||</span> v_name);
   <span class="hljs-keyword">END</span> LOOP;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tổng số dòng: &#x27;</span> <span class="hljs-operator">||</span> c_emp<span class="hljs-operator">%</span>ROWCOUNT);
   <span class="hljs-keyword">CLOSE</span> c_emp;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="76" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="cursor-v%E1%BB%9Bi-for-update-v%C3%A0-where-current-of">Cursor với FOR UPDATE và WHERE CURRENT OF</h1>
<ul>
<li>
<p><strong>FOR UPDATE:</strong> Khóa các dòng được chọn bởi cursor để ngăn các phiên khác cập nhật chúng.</p>
</li>
<li>
<p><strong>WHERE CURRENT OF:</strong> Dùng trong lệnh UPDATE hoặc DELETE để tham chiếu đến dòng hiện tại mà cursor đang trỏ đến.</p>
</li>
<li>
<p><strong>Lợi ích:</strong> Đảm bảo tính toàn vẹn dữ liệu khi cập nhật/xóa dựa trên dữ liệu đã đọc.</p>
</li>
<li>
<p><strong>Cú pháp khai báo cursor:</strong></p>
</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CURSOR</span> cursor_name <span class="hljs-keyword">IS</span>
   select_statement
   <span class="hljs-keyword">FOR</span> <span class="hljs-keyword">UPDATE</span> [<span class="hljs-keyword">OF</span> column_list] [NOWAIT];
</code></pre>
<ul>
<li><strong>Cập nhật:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">UPDATE</span> table_name
<span class="hljs-keyword">SET</span> <span class="hljs-keyword">column</span> <span class="hljs-operator">=</span> <span class="hljs-keyword">value</span>
<span class="hljs-keyword">WHERE</span> <span class="hljs-keyword">CURRENT</span> <span class="hljs-keyword">OF</span> cursor_name;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="77" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-for-update-v%C3%A0-where-current-of">Ví dụ FOR UPDATE và WHERE CURRENT OF</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tăng lương 5% cho tất cả nhân viên trong phòng 10</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp <span class="hljs-keyword">IS</span>
      <span class="hljs-keyword">SELECT</span> empno, sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> <span class="hljs-number">10</span>
      <span class="hljs-keyword">FOR</span> <span class="hljs-keyword">UPDATE</span> <span class="hljs-keyword">OF</span> sal;  <span class="hljs-comment">-- Khóa cột sal</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> emp_rec <span class="hljs-keyword">IN</span> c_emp LOOP
      <span class="hljs-keyword">UPDATE</span> emp
      <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> sal <span class="hljs-operator">*</span> <span class="hljs-number">1.05</span>
      <span class="hljs-keyword">WHERE</span> <span class="hljs-keyword">CURRENT</span> <span class="hljs-keyword">OF</span> c_emp;
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-keyword">COMMIT</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã cập nhật lương cho phòng 10.&#x27;</span>);
<span class="hljs-keyword">END</span>;

<span class="hljs-comment">-- Xóa nhân viên có lương dưới 1000 (nếu có)</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp <span class="hljs-keyword">IS</span>
      <span class="hljs-keyword">SELECT</span> empno <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> sal <span class="hljs-operator">&lt;</span> <span class="hljs-number">1000</span>
      <span class="hljs-keyword">FOR</span> <span class="hljs-keyword">UPDATE</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> emp_rec <span class="hljs-keyword">IN</span> c_emp LOOP
      <span class="hljs-keyword">DELETE</span> <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> <span class="hljs-keyword">CURRENT</span> <span class="hljs-keyword">OF</span> c_emp;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã xóa nhân viên &#x27;</span> <span class="hljs-operator">||</span> emp_rec.empno);
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-keyword">COMMIT</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="78" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="t%E1%BB%95ng-k%E1%BA%BFt-v%E1%BB%81-cursor">Tổng kết về Cursor</h1>
<ul>
<li>
<p><strong>Explicit Cursor:</strong> Cần khai báo, mở, fetch, đóng - kiểm soát chi tiết.</p>
</li>
<li>
<p><strong>Cursor FOR LOOP:</strong> Tự động hóa, sạch sẽ, ít lỗi nhất.</p>
</li>
<li>
<p><strong>Parameterized Cursor:</strong> Linh hoạt với tham số.</p>
</li>
<li>
<p><strong>FOR UPDATE / WHERE CURRENT OF:</strong> Đảm bảo an toàn khi cập nhật dữ liệu dựa trên cursor.</p>
</li>
<li>
<p><strong>Thuộc tính:</strong> <code>%FOUND</code>, <code>%NOTFOUND</code>, <code>%ROWCOUNT</code>, <code>%ISOPEN</code> giúp kiểm soát vòng lặp.</p>
</li>
<li>
<p><strong>Chú ý:</strong> Luôn đóng cursor sau khi sử dụng (trừ khi dùng FOR LOOP tự động). Quên đóng có thể gây rò rỉ bộ nhớ.</p>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="79" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="exception-handling">Exception Handling</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="80" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="x%E1%BB%AD-l%C3%BD-ngo%E1%BA%A1i-l%E1%BB%87-exception-handling---gi%E1%BB%9Bi-thi%E1%BB%87u">Xử lý ngoại lệ (Exception Handling) - Giới thiệu</h1>
<ul>
<li><strong>Ngoại lệ (Exception)</strong> là một lỗi hoặc sự kiện bất thường xảy ra trong quá trình thực thi chương trình.</li>
<li>PL/SQL có cơ chế xử lý ngoại lệ mạnh mẽ để bắt lỗi và thực hiện hành động khắc phục.</li>
</ul>
<div class="columns">
<div class="col-4">
<ul>
<li><strong>Cấu trúc:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Các câu lệnh có thể gây lỗi</span>
EXCEPTION
   <span class="hljs-keyword">WHEN</span> exception1 <span class="hljs-keyword">THEN</span>
      <span class="hljs-comment">-- Xử lý exception1</span>
   <span class="hljs-keyword">WHEN</span> exception2 <span class="hljs-keyword">THEN</span>
      <span class="hljs-comment">-- Xử lý exception2</span>
   <span class="hljs-keyword">WHEN</span> OTHERS <span class="hljs-keyword">THEN</span>
      <span class="hljs-comment">-- Xử lý tất cả các lỗi khác</span>
<span class="hljs-keyword">END</span>;
</code></pre>
</div>
<div class="col-3">
<ul>
<li><strong>Lợi ích:</strong>
<ul>
<li>Ngăn chặn chương trình dừng đột ngột.</li>
<li>Cung cấp thông tin lỗi chi tiết.</li>
<li>Cho phép thực hiện các hành động dọn dẹp (rollback, ghi log).</li>
</ul>
</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="81" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%C3%A1c-lo%E1%BA%A1i-ngo%E1%BA%A1i-l%E1%BB%87">Các loại ngoại lệ</h1>
<ol>
<li>
<p><strong>Ngoại lệ định nghĩa sẵn (Predefined Exceptions):</strong></p>
<ul>
<li>Được Oracle định nghĩa sẵn và liên kết với các lỗi Oracle thông thường (ví dụ: <code>NO_DATA_FOUND</code>, <code>TOO_MANY_ROWS</code>, <code>DUP_VAL_ON_INDEX</code>).</li>
<li>Chúng được tự động ném ra khi lỗi tương ứng xảy ra.</li>
</ul>
</li>
<li>
<p><strong>Ngoại lệ do người dùng định nghĩa (User-defined Exceptions):</strong></p>
<ul>
<li>Lập trình viên tự định nghĩa trong phần <code>DECLARE</code>.</li>
<li>Phải được ném ra một cách rõ ràng bằng lệnh <code>RAISE</code>.</li>
</ul>
</li>
<li>
<p><strong>Ngoại lệ không được định nghĩa (Non-predefined Exceptions):</strong></p>
<ul>
<li>Là các lỗi Oracle không có tên ngoại lệ được định nghĩa sẵn.</li>
<li>Có thể gán cho một ngoại lệ do người dùng định nghĩa bằng cách sử dụng <code>PRAGMA EXCEPTION_INIT</code>.</li>
</ul>
</li>
</ol>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="82" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="ngo%E1%BA%A1i-l%E1%BB%87-%C4%91%E1%BB%8Bnh-ngh%C4%A9a-s%E1%BA%B5n-predefined-exceptions-th%C3%B4ng-d%E1%BB%A5ng">Ngoại lệ định nghĩa sẵn (Predefined Exceptions) thông dụng</h1>
<div class="columns">
<div>
<ul>
<li><strong><code>NO_DATA_FOUND</code> (ORA-01403)</strong>: Không có dòng nào được trả về khi thực hiện truy vấn <code>SELECT INTO</code>.</li>
<li><strong><code>TOO_MANY_ROWS</code> (ORA-01422)</strong>: Truy vấn <code>SELECT INTO</code> trả về nhiều hơn một dòng dữ liệu.</li>
<li><strong><code>DUP_VAL_ON_INDEX</code> (ORA-00001)</strong>: Xảy ra khi cố gắng chèn giá trị trùng lặp vào cột có ràng buộc duy nhất (Unique Constraint/Primary Key).</li>
<li><strong><code>INVALID_CURSOR</code> (ORA-01001)</strong>: Thực hiện thao tác không hợp lệ trên cursor.</li>
<li><strong><code>ZERO_DIVIDE</code> (ORA-01476)</strong>: Lỗi xảy ra khi thực hiện phép chia cho số 0.</li>
</ul>
</div>
<div>
<ul>
<li><strong><code>VALUE_ERROR</code> (ORA-06502)</strong>: Lỗi liên quan đến kiểu dữ liệu, ví dụ như ép kiểu không thành công hoặc gán giá trị vượt quá giới hạn của biến.</li>
<li><strong><code>LOGIN_DENIED</code> (ORA-01017)</strong>: Việc đăng nhập vào cơ sở dữ liệu bị từ chối do thông tin xác thực không chính xác.</li>
<li><strong><code>CURSOR_ALREADY_OPEN</code> (ORA-06511)</strong>: Cố gắng mở một cursor hiện đã ở trạng thái đang mở.</li>
<li><strong><code>OTHERS</code> (Không có mã lỗi cụ thể)</strong>: Đây là ngoại lệ dùng để bắt tất cả các lỗi còn lại chưa được liệt kê trong khối <code>EXCEPTION</code>.</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="83" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-b%E1%BA%AFt-predefined-exceptions">Ví dụ bắt Predefined Exceptions</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_ename emp.ename<span class="hljs-operator">%</span>TYPE;
   v_empno emp.empno<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">9999</span>;  <span class="hljs-comment">-- Mã không tồn tại</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> ename <span class="hljs-keyword">INTO</span> v_ename
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> v_empno;

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tên: &#x27;</span> <span class="hljs-operator">||</span> v_ename);
EXCEPTION
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi: Không tìm thấy nhân viên có mã &#x27;</span> <span class="hljs-operator">||</span> v_empno);
   <span class="hljs-keyword">WHEN</span> TOO_MANY_ROWS <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi: Có nhiều hơn một nhân viên với mã này (không thể xảy ra)&#x27;</span>);
   <span class="hljs-keyword">WHEN</span> OTHERS <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi khác: &#x27;</span> <span class="hljs-operator">||</span> SQLERRM);
<span class="hljs-keyword">END</span>;

<span class="hljs-comment">-- Xử lý chia cho 0</span>
<span class="hljs-keyword">DECLARE</span>
   v_result NUMBER;
<span class="hljs-keyword">BEGIN</span>
   v_result :<span class="hljs-operator">=</span> <span class="hljs-number">100</span> <span class="hljs-operator">/</span> <span class="hljs-number">0</span>;  <span class="hljs-comment">-- Sẽ gây lỗi ZERO_DIVIDE</span>
EXCEPTION
   <span class="hljs-keyword">WHEN</span> ZERO_DIVIDE <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi: Không thể chia cho 0.&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="84" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="ngo%E1%BA%A1i-l%E1%BB%87-do-ng%C6%B0%E1%BB%9Di-d%C3%B9ng-%C4%91%E1%BB%8Bnh-ngh%C4%A9a-user-defined-exception">Ngoại lệ do người dùng định nghĩa (User-Defined Exception)</h1>
<ul>
<li><strong>Bước 1:</strong> Khai báo ngoại lệ trong phần <code>DECLARE</code>.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">exception_name EXCEPTION;
</code></pre>
<ul>
<li><strong>Bước 2:</strong> Ném ngoại lệ bằng lệnh <code>RAISE</code>.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">RAISE exception_name;
</code></pre>
<ul>
<li><strong>Bước 3:</strong> Bắt và xử lý trong phần <code>EXCEPTION</code>.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="85" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-ngo%E1%BA%A1i-l%E1%BB%87-do-ng%C6%B0%E1%BB%9Di-d%C3%B9ng-%C4%91%E1%BB%8Bnh-ngh%C4%A9a">Ví dụ ngoại lệ do người dùng định nghĩa</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_sal emp.sal<span class="hljs-operator">%</span>TYPE;
   v_empno emp.empno<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
   e_sal_too_high EXCEPTION;  <span class="hljs-comment">-- Khai báo ngoại lệ</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> sal <span class="hljs-keyword">INTO</span> v_sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> v_empno;

   IF v_sal <span class="hljs-operator">&gt;</span> <span class="hljs-number">10000</span> <span class="hljs-keyword">THEN</span>
      RAISE e_sal_too_high;   <span class="hljs-comment">-- Ném ngoại lệ</span>
   <span class="hljs-keyword">END</span> IF;

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương hợp lệ: &#x27;</span> <span class="hljs-operator">||</span> v_sal);
EXCEPTION
   <span class="hljs-keyword">WHEN</span> e_sal_too_high <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi: Lương quá cao!&#x27;</span>);
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không tìm thấy nhân viên.&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="86" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="raise_application_error">RAISE_APPLICATION_ERROR</h1>
<ul>
<li><strong>RAISE_APPLICATION_ERROR</strong> là thủ tục có sẵn của Oracle để ném một ngoại lệ với mã lỗi và thông báo tùy chỉnh.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">RAISE_APPLICATION_ERROR (error_code, error_message);
</code></pre>
<ul>
<li><code>error_code</code>: Số nguyên trong khoảng từ -20000 đến -20999 (do người dùng định nghĩa).</li>
<li><code>error_message</code>: Chuỗi thông báo lỗi (tối đa 2048 ký tự).</li>
<li>Sử dụng trong:
<ul>
<li>Stored Procedure/Function để báo lỗi về ứng dụng.</li>
<li>Trigger để kiểm tra ràng buộc.</li>
</ul>
</li>
<li><strong>Khác với <code>RAISE</code>:</strong> <code>RAISE</code> chỉ ném ngoại lệ đã khai báo, còn <code>RAISE_APPLICATION_ERROR</code> tạo ra lỗi Oracle với mã và thông báo cụ thể.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="87" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-raise_application_error">Ví dụ RAISE_APPLICATION_ERROR</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Kiểm tra lương khi cập nhật (ví dụ trong trigger hoặc procedure)</span>
<span class="hljs-keyword">DECLARE</span>
   v_empno emp.empno<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
   v_new_sal emp.sal<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">15000</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Giả sử kiểm tra điều kiện lương tối đa là 10000</span>
   IF v_new_sal <span class="hljs-operator">&gt;</span> <span class="hljs-number">10000</span> <span class="hljs-keyword">THEN</span>
      RAISE_APPLICATION_ERROR(<span class="hljs-number">-20001</span>, <span class="hljs-string">&#x27;Lương không được vượt quá 10000&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-keyword">UPDATE</span> emp <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> v_new_sal <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> v_empno;
   <span class="hljs-keyword">COMMIT</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Cập nhật thành công.&#x27;</span>);
EXCEPTION
   <span class="hljs-keyword">WHEN</span> OTHERS <span class="hljs-keyword">THEN</span>
      <span class="hljs-comment">-- Bắt lỗi và hiển thị</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi: &#x27;</span> <span class="hljs-operator">||</span> SQLERRM);
      <span class="hljs-keyword">ROLLBACK</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="88" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="k%E1%BA%BFt-h%E1%BB%A3p-raise-v%C3%A0-raise_application_error">Kết hợp RAISE và RAISE_APPLICATION_ERROR</h1>
<ul>
<li>Có thể ném ngoại lệ người dùng và sau đó bắt nó, rồi ném lại với <code>RAISE_APPLICATION_ERROR</code> để gửi thông báo thân thiện ra ngoài.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_sal emp.sal<span class="hljs-operator">%</span>TYPE;
   e_low_sal EXCEPTION;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> sal <span class="hljs-keyword">INTO</span> v_sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
   IF v_sal <span class="hljs-operator">&lt;</span> <span class="hljs-number">1000</span> <span class="hljs-keyword">THEN</span>
      RAISE e_low_sal;
   <span class="hljs-keyword">END</span> IF;
EXCEPTION
   <span class="hljs-keyword">WHEN</span> e_low_sal <span class="hljs-keyword">THEN</span>
      RAISE_APPLICATION_ERROR(<span class="hljs-number">-20002</span>, <span class="hljs-string">&#x27;Lương nhân viên quá thấp (dưới 1000)&#x27;</span>);
   <span class="hljs-keyword">WHEN</span> OTHERS <span class="hljs-keyword">THEN</span>
      RAISE_APPLICATION_ERROR(<span class="hljs-number">-20999</span>, <span class="hljs-string">&#x27;Lỗi không xác định: &#x27;</span> <span class="hljs-operator">||</span> SQLERRM);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="89" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="lan-truy%E1%BB%81n-ngo%E1%BA%A1i-l%E1%BB%87-exception-propagation">Lan truyền ngoại lệ (Exception Propagation)</h1>
<div class="columns">
<div>
<ul>
<li>Nếu một ngoại lệ xảy ra và không được xử lý trong khối hiện tại, nó sẽ được lan truyền lên <strong>khối bao ngoài</strong> (nếu có).</li>
<li>Quá trình lan truyền tiếp tục cho đến khi ngoại lệ được bắt hoặc đến khối ngoài cùng.</li>
</ul>
</div>
<div class="col-2">
<ul>
<li><strong>Ví dụ:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Khối ngoài</span>
   <span class="hljs-keyword">DECLARE</span>
      v_sal NUMBER;
   <span class="hljs-keyword">BEGIN</span>
      <span class="hljs-comment">-- Khối trong (gây lỗi ZERO_DIVIDE)</span>
      v_sal :<span class="hljs-operator">=</span> <span class="hljs-number">100</span> <span class="hljs-operator">/</span> <span class="hljs-number">0</span>;
   EXCEPTION
      <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
         <span class="hljs-comment">-- Chỉ bắt NO_DATA_FOUND, không bắt ZERO_DIVIDE</span>
         DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi trong khối trong&#x27;</span>);
   <span class="hljs-keyword">END</span>;
EXCEPTION
   <span class="hljs-keyword">WHEN</span> ZERO_DIVIDE <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi ZERO_DIVIDE được lan truyền và bắt ở khối ngoài&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
</div>
</div>
<ul>
<li>Nếu không được bắt ở bất kỳ đâu, chương trình sẽ kết thúc với lỗi.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="90" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="90" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-lan-truy%E1%BB%81n-ngo%E1%BA%A1i-l%E1%BB%87">Ví dụ lan truyền ngoại lệ</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Khối cha</span>
<span class="hljs-keyword">DECLARE</span>
   v_result NUMBER;
   e_custom EXCEPTION;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Khối con</span>
   <span class="hljs-keyword">DECLARE</span>
      v_divisor NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">0</span>;
   <span class="hljs-keyword">BEGIN</span>
      IF v_divisor <span class="hljs-operator">=</span> <span class="hljs-number">0</span> <span class="hljs-keyword">THEN</span>
         RAISE e_custom;  <span class="hljs-comment">-- Ném ngoại lệ e_custom</span>
      <span class="hljs-keyword">END</span> IF;
      v_result :<span class="hljs-operator">=</span> <span class="hljs-number">100</span> <span class="hljs-operator">/</span> v_divisor;
   EXCEPTION
      <span class="hljs-keyword">WHEN</span> e_custom <span class="hljs-keyword">THEN</span>
         DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Khối con bắt được e_custom, nhưng không xử lý hết, lan truyền lên?&#x27;</span>);
         <span class="hljs-comment">-- Không có RAISE, nên ngoại lệ sẽ không lan truyền (đã xử lý)</span>
   <span class="hljs-keyword">END</span>;

   <span class="hljs-comment">-- Nếu ngoại lệ được xử lý trong khối con, khối cha không biết</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Chương trình tiếp tục.&#x27;</span>);

EXCEPTION
   <span class="hljs-keyword">WHEN</span> OTHERS <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Khối cha bắt ngoại lệ: &#x27;</span> <span class="hljs-operator">||</span> SQLERRM);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="91" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="91" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="t%C3%B3m-t%E1%BA%AFt-exception-handling">Tóm tắt Exception Handling</h1>
<ul>
<li><strong>Predefined Exceptions:</strong> Xử lý các lỗi Oracle thông thường một cách dễ dàng.</li>
<li><strong>User-defined Exceptions:</strong> Tạo ngoại lệ riêng cho logic nghiệp vụ.</li>
<li><strong>RAISE:</strong> Ném ngoại lệ (có thể là predefined hoặc user-defined).</li>
<li><strong>RAISE_APPLICATION_ERROR:</strong> Ném lỗi tùy chỉnh với mã và thông báo cụ thể, thường dùng trong ứng dụng.</li>
<li><strong>Propagation:</strong> Nếu không xử lý, ngoại lệ lan lên khối cha; có thể ném lại bằng <code>RAISE;</code>.</li>
<li><strong>Best Practices:</strong>
<ul>
<li>Luôn xử lý ngoại lệ ở mức phù hợp.</li>
<li>Sử dụng <code>WHEN OTHERS THEN</code> để bắt các lỗi không mong đợi, nhưng nên ghi log và ném lại hoặc rollback.</li>
<li>Trong transaction, nên rollback khi có lỗi để tránh dữ liệu không nhất quán.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="92" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="92" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="procedure-v%C3%A0-function">Procedure và Function</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="93" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="93" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="procedure-v%C3%A0-function---gi%E1%BB%9Bi-thi%E1%BB%87u">Procedure và Function - Giới thiệu</h1>
<ul>
<li><strong>Stored Procedure</strong> và <strong>Stored Function</strong> là các khối PL/SQL có tên, được lưu trữ trong cơ sở dữ liệu và có thể được gọi lại nhiều lần.</li>
<li>Chúng là các đối tượng schema, thuộc sở hữu của một user cụ thể.</li>
<li><strong>Lợi ích:</strong>
<ul>
<li><strong>Tái sử dụng:</strong> Logic nghiệp vụ được viết một lần, sử dụng nhiều nơi.</li>
<li><strong>Bảo mật:</strong> Người dùng chỉ cần có quyền thực thi, không cần biết đến dữ liệu nội bộ.</li>
<li><strong>Hiệu suất:</strong> Giảm chi phí mạng và tận dụng bộ nhớ cache của Oracle.</li>
<li><strong>Bảo trì:</strong> Dễ dàng cập nhật logic mà không ảnh hưởng đến ứng dụng (nếu giao diện không đổi).</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="94" data-paginate="true" data-class="text-sm" data-theme="eaut" lang="en-US" class="text-sm" data-marpit-pagination="94" style="--paginate:true;--class:text-sm;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="so-s%C3%A1nh-procedure-v%C3%A0-function">So sánh Procedure và Function</h1>
<div>
<table>
<thead>
<tr>
<th><strong>Tiêu chí</strong></th>
<th><strong>Procedure</strong></th>
<th><strong>Function</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Mục đích</strong></td>
<td>Thực hiện một hành động (ví dụ: cập nhật dữ liệu)</td>
<td>Tính toán và trả về một giá trị</td>
</tr>
<tr>
<td><strong>Cú pháp</strong></td>
<td><code>CREATE PROCEDURE ...</code></td>
<td><code>CREATE FUNCTION ...</code></td>
</tr>
<tr>
<td><strong>Giá trị trả về</strong></td>
<td>Không bắt buộc (có thể có tham số OUT)</td>
<td><strong>Bắt buộc</strong> phải trả về một giá trị (kiểu dữ liệu xác định)</td>
</tr>
<tr>
<td><strong>Gọi trong SQL</strong></td>
<td>Không thể gọi trong câu lệnh SQL</td>
<td>Có thể gọi trong câu lệnh SQL (ví dụ: <code>SELECT function_name(...) FROM ...</code>)</td>
</tr>
<tr>
<td><strong>Tham số</strong></td>
<td>Có IN, OUT, IN OUT</td>
<td>Khuyến nghị chỉ dùng IN (OUT/IN OUT ít dùng)</td>
</tr>
<tr>
<td><strong>Sử dụng trong biểu thức</strong></td>
<td>Không</td>
<td>Có thể</td>
</tr>
</tbody>
</table>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="95" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="95" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%C3%BA-ph%C3%A1p-t%E1%BA%A1o-stored-procedure">Cú pháp tạo Stored Procedure</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> [<span class="hljs-keyword">OR</span> REPLACE] <span class="hljs-keyword">PROCEDURE</span> procedure_name
   [ (parameter1 [<span class="hljs-keyword">IN</span> <span class="hljs-operator">|</span> <span class="hljs-keyword">OUT</span> <span class="hljs-operator">|</span> <span class="hljs-keyword">IN</span> <span class="hljs-keyword">OUT</span>] datatype [<span class="hljs-keyword">DEFAULT</span> <span class="hljs-keyword">value</span>],
      parameter2 ... ) ]
<span class="hljs-keyword">IS</span>
   <span class="hljs-comment">-- Phần khai báo biến cục bộ (không bắt buộc)</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Phần thực thi (bắt buộc)</span>
   <span class="hljs-comment">-- Các câu lệnh SQL và PL/SQL</span>
EXCEPTION
   <span class="hljs-comment">-- Phần xử lý ngoại lệ (tùy chọn)</span>
<span class="hljs-keyword">END</span> procedure_name;
</code></pre>
<ul>
<li><strong>OR REPLACE:</strong> Ghi đè procedure nếu đã tồn tại.</li>
<li><strong>IS</strong> (hoặc <strong>AS</strong>): Bắt đầu phần khai báo.</li>
<li><strong>BEGIN ... END:</strong> Thân procedure.</li>
<li><strong>Tham số:</strong> Có 3 chế độ: <code>IN</code> (mặc định), <code>OUT</code>, <code>IN OUT</code>.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="96" data-paginate="true" data-class="text-sm" data-theme="eaut" lang="en-US" class="text-sm" data-marpit-pagination="96" style="--paginate:true;--class:text-sm;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-stored-procedure-c%C6%A1-b%E1%BA%A3n-kh%C3%B4ng-tham-s%E1%BB%91">Ví dụ: Stored Procedure cơ bản (không tham số)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tăng lương 5% cho tất cả nhân viên trong phòng 10</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">PROCEDURE</span> increase_salary_dept10
<span class="hljs-keyword">IS</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">UPDATE</span> emp
   <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> sal <span class="hljs-operator">*</span> <span class="hljs-number">1.05</span>
   <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> <span class="hljs-number">10</span>;

   <span class="hljs-comment">-- Thông báo số dòng bị ảnh hưởng</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã tăng lương cho &#x27;</span> <span class="hljs-operator">||</span> <span class="hljs-keyword">SQL</span><span class="hljs-operator">%</span>ROWCOUNT <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; nhân viên phòng 10.&#x27;</span>);
   <span class="hljs-keyword">COMMIT</span>;
<span class="hljs-keyword">END</span> increase_salary_dept10;
</code></pre>
<p><strong>Gọi Procedure:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   increase_salary_dept10;
<span class="hljs-keyword">END</span>;

<span class="hljs-comment">-- hoặc trong SQL*Plus:</span>
<span class="hljs-keyword">EXECUTE</span> increase_salary_dept10;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="97" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="97" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-stored-procedure-v%E1%BB%9Bi-tham-s%E1%BB%91-in">Ví dụ: Stored Procedure với tham số IN</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tăng lương cho nhân viên theo mã và tỷ lệ phần trăm</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">PROCEDURE</span> increase_salary (
   p_empno <span class="hljs-keyword">IN</span> emp.empno<span class="hljs-operator">%</span>TYPE,
   p_percent <span class="hljs-keyword">IN</span> NUMBER
)
<span class="hljs-keyword">IS</span>
   v_old_sal emp.sal<span class="hljs-operator">%</span>TYPE;
   v_new_sal emp.sal<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Lấy lương hiện tại</span>
   <span class="hljs-keyword">SELECT</span> sal <span class="hljs-keyword">INTO</span> v_old_sal
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> p_empno
   <span class="hljs-keyword">FOR</span> <span class="hljs-keyword">UPDATE</span>; <span class="hljs-comment">-- Khóa dòng</span>

   <span class="hljs-comment">-- Tính lương mới</span>
   v_new_sal :<span class="hljs-operator">=</span> v_old_sal <span class="hljs-operator">*</span> (<span class="hljs-number">1</span> <span class="hljs-operator">+</span> p_percent <span class="hljs-operator">/</span> <span class="hljs-number">100</span>);

   <span class="hljs-comment">-- Cập nhật</span>
   <span class="hljs-keyword">UPDATE</span> emp <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> v_new_sal <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> p_empno;

   <span class="hljs-keyword">COMMIT</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Cập nhật lương cho &#x27;</span> <span class="hljs-operator">||</span> p_empno <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; từ &#x27;</span> <span class="hljs-operator">||</span> v_old_sal <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; lên &#x27;</span> <span class="hljs-operator">||</span> v_new_sal);
EXCEPTION
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không tìm thấy nhân viên có mã &#x27;</span> <span class="hljs-operator">||</span> p_empno);
   <span class="hljs-keyword">WHEN</span> OTHERS <span class="hljs-keyword">THEN</span>
      <span class="hljs-keyword">ROLLBACK</span>;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lỗi: &#x27;</span> <span class="hljs-operator">||</span> SQLERRM);
<span class="hljs-keyword">END</span> increase_salary;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="98" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="98" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="tham-s%E1%BB%91-out-trong-procedure-1">Tham số OUT trong Procedure (1)</h1>
<ul>
<li><strong>OUT</strong> dùng để trả về một hoặc nhiều giá trị từ procedure cho chương trình gọi.</li>
<li>Tham số OUT là <strong>biến</strong> ở phía người gọi, thường không cần khởi tạo trước.</li>
<li><strong>Ví dụ:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Lấy thông tin nhân viên qua tham số OUT</span>
<span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">OR</span> REPLACE <span class="hljs-keyword">PROCEDURE</span> get_employee_info (
   p_empno <span class="hljs-keyword">IN</span>  emp.empno<span class="hljs-operator">%</span>TYPE,
   p_ename <span class="hljs-keyword">OUT</span> emp.ename<span class="hljs-operator">%</span>TYPE,
   p_sal   <span class="hljs-keyword">OUT</span> emp.sal<span class="hljs-operator">%</span>TYPE,
   p_deptno <span class="hljs-keyword">OUT</span> emp.deptno<span class="hljs-operator">%</span>TYPE
)
<span class="hljs-keyword">IS</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> ename, sal, deptno
   <span class="hljs-keyword">INTO</span> p_ename, p_sal, p_deptno
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> p_empno;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="99" data-paginate="true" data-class="text-xs" data-theme="eaut" lang="en-US" class="text-xs" data-marpit-pagination="99" style="--paginate:true;--class:text-xs;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="tham-s%E1%BB%91-out-trong-procedure-2">Tham số OUT trong Procedure (2)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">EXCEPTION
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
      p_ename :<span class="hljs-operator">=</span> <span class="hljs-keyword">NULL</span>;
      p_sal :<span class="hljs-operator">=</span> <span class="hljs-keyword">NULL</span>;
      p_deptno :<span class="hljs-operator">=</span> <span class="hljs-keyword">NULL</span>;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không tìm thấy nhân viên &#x27;</span> <span class="hljs-operator">||</span> p_empno);
<span class="hljs-keyword">END</span> get_employee_info;
</code></pre>
<p><strong>Gọi từ khối PL/SQL:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_ename  emp.ename<span class="hljs-operator">%</span>TYPE;
   v_sal    emp.sal<span class="hljs-operator">%</span>TYPE;
   v_deptno emp.deptno<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   get_employee_info(<span class="hljs-number">7369</span>, v_ename, v_sal, v_deptno);
   IF v_ename <span class="hljs-keyword">IS</span> <span class="hljs-keyword">NOT NULL</span> <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tên: &#x27;</span> <span class="hljs-operator">||</span> v_ename);
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương: &#x27;</span> <span class="hljs-operator">||</span> v_sal);
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Phòng: &#x27;</span> <span class="hljs-operator">||</span> v_deptno);
   <span class="hljs-keyword">END</span> IF;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="100" data-paginate="true" data-class="text-xs" data-theme="eaut" lang="en-US" class="text-xs" data-marpit-pagination="100" style="--paginate:true;--class:text-xs;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="tham-s%E1%BB%91-in-out-trong-procedure">Tham số IN OUT trong Procedure</h1>
<ul>
<li><strong>IN OUT</strong> vừa nhận giá trị đầu vào, vừa trả về giá trị đã được sửa đổi.</li>
<li>Tham số IN OUT phải là một <strong>biến</strong> và có giá trị ban đầu ở phía người gọi.</li>
