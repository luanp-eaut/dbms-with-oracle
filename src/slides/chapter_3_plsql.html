<h2 id="ch%C6%B0%C6%A1ng-3-ng%C3%B4n-ng%E1%BB%AF-plsql">Chương 3: Ngôn ngữ PL/SQL</h2>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-class="toc" data-theme="eaut" lang="en-US" class="toc" data-marpit-pagination="2" style="--paginate:true;--class:toc;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="n%E1%BB%99i-dung">Nội dung</h1>
<ul>
<li>Tổng quan về PL/SQL</li>
<li>Các thành phần của PL/SQL</li>
<li>Truy vấn dữ liệu trong PL/SQL</li>
<li>Cursor</li>
<li>Exception Handling</li>
<li>Procedure và Function</li>
<li>Package</li>
<li>Trigger</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="3" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="t%E1%BB%95ng-quan-v%E1%BB%81-plsql">Tổng quan về PL/SQL</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="gi%E1%BB%9Bi-thi%E1%BB%87u-h%E1%BB%8Dc-ph%E1%BA%A7n--t%E1%BB%95ng-quan-v%E1%BB%81-plsql">Giới thiệu học phần &amp; Tổng quan về PL/SQL</h1>
<ul>
<li><strong>PL/SQL</strong> là viết tắt của <strong>Procedural Language/SQL</strong> - ngôn ngữ lập trình thủ tục mở rộng của Oracle cho SQL.</li>
<li>Được phát triển để khắc phục những hạn chế của SQL thuần túy (không có cấu trúc điều khiển, vòng lặp, biến, v.v.).</li>
<li>Cho phép kết hợp sức mạnh của SQL với các đặc điểm của ngôn ngữ lập trình bậc cao.</li>
<li>Cú pháp khối lệnh (block-structured), tương tự như Pascal.</li>
<li>Mã PL/SQL được Oracle Database xử lý và thực thi trực tiếp bên trong cơ sở dữ liệu.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="vai-tr%C3%B2-c%E1%BB%A7a-plsql-trong-oracle-database">Vai trò của PL/SQL trong Oracle Database</h1>
<ul>
<li><strong>Tăng hiệu suất xử lý</strong>: Giảm số lần giao tiếp giữa ứng dụng và database (một lần gửi cả khối lệnh thay vì nhiều câu lệnh SQL riêng lẻ).</li>
<li><strong>Tính bảo mật</strong>: Cho phép đóng gói logic nghiệp vụ ngay trong database, hạn chế ứng dụng truy cập trực tiếp vào bảng.</li>
<li><strong>Khả năng tái sử dụng</strong>: Xây dựng các thủ tục (Procedure), hàm (Function), gói (Package) lưu trữ trên server.</li>
<li><strong>Tự động hóa</strong>: Tạo Trigger tự động thực thi khi có sự kiện DML (INSERT, UPDATE, DELETE) trên bảng.</li>
<li><strong>Xử lý lỗi tập trung</strong>: Quản lý ngoại lệ (Exception) hiệu quả với cơ chế bắt và xử lý lỗi thống nhất.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="sql-v%C3%A0-plsql-s%E1%BB%B1-kh%C3%A1c-bi%E1%BB%87t">SQL và PL/SQL: Sự khác biệt</h1>
<table>
<thead>
<tr>
<th><strong>Tiêu chí</strong></th>
<th><strong>SQL</strong></th>
<th><strong>PL/SQL</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Mục đích</strong></td>
<td>Truy vấn và thao tác dữ liệu (DML, DDL, DCL).</td>
<td>Mở rộng SQL, xây dựng ứng dụng logic phức tạp.</td>
</tr>
<tr>
<td><strong>Cấu trúc</strong></td>
<td>Câu lệnh đơn lẻ, không có cấu trúc khối.</td>
<td>Khối lệnh (Block) với phần khai báo, thực thi và xử lý ngoại lệ.</td>
</tr>
<tr>
<td><strong>Ngôn ngữ</strong></td>
<td>Khai báo (Declarative).</td>
<td>Thủ tục (Procedural) + Khai báo.</td>
</tr>
<tr>
<td><strong>Biến và Logic</strong></td>
<td>Không hỗ trợ biến, cấu trúc điều khiển.</td>
<td>Hỗ trợ đầy đủ biến, hằng, cấu trúc điều khiển (IF, LOOP).</td>
</tr>
<tr>
<td><strong>Tương tác</strong></td>
<td>Thường được nhúng trong ứng dụng hoặc PL/SQL.</td>
<td>Có thể chứa SQL bên trong.</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="engine-x%E1%BB%AD-l%C3%BD-plsql-trong-oracle">Engine xử lý PL/SQL trong Oracle</h1>
<ul>
<li><strong>PL/SQL Engine</strong> là thành phần nằm trong Oracle Database Server, chuyên trách biên dịch và thực thi mã PL/SQL.</li>
<li><strong>Quy trình xử lý:</strong>
<ol>
<li><strong>Parsing (Phân tích cú pháp):</strong> Kiểm tra cú pháp, xác định các đối tượng.</li>
<li><strong>Compilation (Biên dịch):</strong> Mã nguồn được biên dịch thành mã máy (P-code - machine code) và lưu trong cache.</li>
<li><strong>Execution (Thực thi):</strong> Engine thực thi các lệnh thủ tục và chuyển các câu lệnh SQL tới <strong>SQL Executor</strong>.</li>
</ol>
</li>
<li><strong>Tách biệt xử lý:</strong>
<ul>
<li><strong>PL/SQL Engine</strong> xử lý các câu lệnh thủ tục.</li>
<li><strong>SQL Executor</strong> xử lý các câu lệnh DML và truy vấn.</li>
</ul>
</li>
<li>Cơ chế này giúp tăng hiệu suất vì mã PL/SQL đã được biên dịch sẵn.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="ki%E1%BA%BFn-tr%C3%BAc-th%E1%BB%B1c-thi-plsql">Kiến trúc thực thi PL/SQL</h1>
<p><img src="./images/3.1.png" alt="" style="width:700px;" /></p>
<ul>
<li>PL/SQL Engine là một thành phần đặc biệt xử lý các câu lệnh PL/SQL.</li>
<li>Nếu PL/SQL Engine nằm trên Server, toàn bộ khối được gửi về Server để xử lý.</li>
<li>Nếu nằm trên Client (như Oracle Forms), PL/SQL được xử lý tại Client, chỉ các câu lệnh SQL được gửi đến Server.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="kh%E1%BB%91i-plsql-v%C3%B4-danh-anonymous-block">Khối PL/SQL vô danh (Anonymous Block)</h1>
<ul>
<li><strong>Định nghĩa:</strong> Là một khối PL/SQL <strong>không có tên</strong>, được tạo động và thực thi một lần duy nhất.</li>
<li><strong>Đặc điểm:</strong>
<ul>
<li>Không được lưu trữ vật lý trong database.</li>
<li>Được biên dịch mỗi khi nạp vào bộ nhớ.</li>
<li>Không thể được gọi từ các chương trình khác.</li>
</ul>
</li>
<li><strong>Ứng dụng:</strong>
<ul>
<li>Viết script thực thi một lần (ví dụ: cập nhật dữ liệu, báo cáo nhanh).</li>
<li>Kiểm thử logic và câu lệnh PL/SQL.</li>
<li>Thực thi các tác vụ quản trị.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="kh%E1%BB%91i-plsql-c%C3%B3-t%C3%AAn-named-block">Khối PL/SQL có tên (Named Block)</h1>
<ul>
<li><strong>Định nghĩa:</strong> Là khối PL/SQL <strong>có tên</strong> và được lưu trữ vĩnh viễn trong cơ sở dữ liệu như một đối tượng schema.</li>
<li><strong>Các loại Named Block:</strong>
<ul>
<li><strong>Stored Procedure:</strong> Thực hiện một hành động cụ thể, không trả về giá trị.</li>
<li><strong>Stored Function:</strong> Trả về một giá trị duy nhất.</li>
<li><strong>Package:</strong> Nhóm các Procedure, Function, biến, cursor liên quan.</li>
<li><strong>Trigger:</strong> Tự động thực thi khi một sự kiện DML/DDL xảy ra.</li>
</ul>
</li>
<li><strong>Ưu điểm:</strong>
<ul>
<li>Có thể được gọi và tái sử dụng nhiều lần.</li>
<li>Bảo mật tốt hơn (trao quyền thực thi).</li>
<li>Cải thiện hiệu suất (biên dịch một lần, dùng nhiều lần - compiled once, reused many times).</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="so-s%C3%A1nh-anonymous-block-v%C3%A0-named-block">So sánh Anonymous Block và Named Block</h1>
<table>
<thead>
<tr>
<th><strong>Tiêu chí</strong></th>
<th><strong>Anonymous Block</strong></th>
<th><strong>Named Block (Procedure/Function)</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Tên</strong></td>
<td>Không có</td>
<td>Có tên duy nhất</td>
</tr>
<tr>
<td><strong>Lưu trữ</strong></td>
<td>Không lưu trong DB</td>
<td>Lưu trong DB (data dictionary)</td>
</tr>
<tr>
<td><strong>Biên dịch</strong></td>
<td>Mỗi lần thực thi</td>
<td>Một lần (khi tạo hoặc biên dịch lại)</td>
</tr>
<tr>
<td><strong>Tái sử dụng</strong></td>
<td>Không</td>
<td>Có, thông qua tên gọi</td>
</tr>
<tr>
<td><strong>Gọi từ khối khác</strong></td>
<td>Không</td>
<td>Có thể được gọi</td>
</tr>
<tr>
<td><strong>Tham số</strong></td>
<td>Không</td>
<td>Có thể có tham số (IN, OUT, IN OUT)</td>
</tr>
<tr>
<td><strong>Mục đích</strong></td>
<td>Thực hiện một lần, kiểm thử</td>
<td>Logic nghiệp vụ, ứng dụng</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="12" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%C3%A1c-th%C3%A0nh-ph%E1%BA%A7n-c%E1%BB%A7a-plsql">Các thành phần của PL/SQL</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-kh%E1%BB%91i-plsql-c%C6%A1-b%E1%BA%A3n">Cấu trúc khối PL/SQL cơ bản</h1>
<ul>
<li>Một khối PL/SQL bao gồm 3 phần (trong đó phần DECLARE và EXCEPTION là tùy chọn):</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">[<span class="hljs-keyword">DECLARE</span>]
   <span class="hljs-comment">-- Phần khai báo: biến, hằng, cursor, exception, subprogram cục bộ</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Phần thực thi: các câu lệnh SQL và PL/SQL (bắt buộc)</span>
[EXCEPTION]
   <span class="hljs-comment">-- Phần xử lý ngoại lệ (tùy chọn)</span>
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>DECLARE:</strong> Khai báo các thành phần sẽ sử dụng trong khối.</li>
<li><strong>BEGIN ... END:</strong> Chứa logic chính, bao gồm các câu lệnh gán, điều khiển, SQL.</li>
<li><strong>EXCEPTION:</strong> Bắt và xử lý các lỗi phát sinh trong phần BEGIN.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-kh%E1%BB%91i-plsql-%C4%91%C6%A1n-gi%E1%BA%A3n-hello-world">Ví dụ: Khối PL/SQL đơn giản (Hello World)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Khối Anonymous đơn giản nhất</span>
<span class="hljs-keyword">BEGIN</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Hello PL/SQL!&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><code>DBMS_OUTPUT.PUT_LINE</code> là thủ tục của Oracle dùng để in dữ liệu ra màn hình console.</li>
<li>Ký tự <code>/</code> dùng để thực thi khối trong SQL*Plus hoặc SQL Developer.</li>
<li>Để xem output cần bật: <code>SET SERVEROUTPUT ON;</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-kh%E1%BB%91i-plsql-v%E1%BB%9Bi-ph%E1%BA%A7n-declare-v%C3%A0-exception">Ví dụ: Khối PL/SQL với phần DECLARE và EXCEPTION</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_emp_name  VARCHAR2(<span class="hljs-number">100</span>);
   v_emp_sal   NUMBER;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Lấy tên và lương của nhân viên có mã 7369</span>
   <span class="hljs-keyword">SELECT</span> ename, sal
   <span class="hljs-keyword">INTO</span> v_emp_name, v_emp_sal
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
   <span class="hljs-comment">-- In thông tin</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Nhân viên: &#x27;</span> <span class="hljs-operator">||</span> v_emp_name);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương: &#x27;</span> <span class="hljs-operator">||</span> v_emp_sal);
EXCEPTION
   <span class="hljs-keyword">WHEN</span> NO_DATA_FOUND <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không tìm thấy nhân viên!&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="khai-b%C3%A1o-bi%E1%BA%BFn-trong-plsql">Khai báo biến trong PL/SQL</h1>
<ul>
<li>Biến được khai báo trong phần <code>DECLARE</code>.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">variable_name [CONSTANT] datatype [<span class="hljs-keyword">NOT NULL</span>] [:<span class="hljs-operator">=</span> <span class="hljs-operator">|</span> <span class="hljs-keyword">DEFAULT</span> initial_value];
</code></pre>
<ul>
<li><strong>Quy tắc đặt tên:</strong>
<ul>
<li>Bắt đầu bằng chữ cái.</li>
<li>Có thể chứa chữ cái, số, <code>_</code>, <code>$</code>, <code>#</code>.</li>
<li>Không trùng với từ khóa của PL/SQL.</li>
</ul>
</li>
<li><strong>Phạm vi (Scope):</strong>
<ul>
<li>Biến cục bộ trong khối (khối con có thể truy cập biến của khối cha).</li>
<li>Biến toàn cục nếu khai báo ở mức Package.</li>
</ul>
</li>
<li><strong>Vòng đời:</strong> Tồn tại trong suốt quá trình thực thi khối.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-khai-b%C3%A1o-bi%E1%BA%BFn">Ví dụ khai báo biến</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   <span class="hljs-comment">-- Biến kiểu số</span>
   v_employee_id   NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">100</span>;
   v_salary        NUMBER(<span class="hljs-number">8</span>,<span class="hljs-number">2</span>);
   v_bonus         NUMBER <span class="hljs-keyword">DEFAULT</span> <span class="hljs-number">500</span>;

   <span class="hljs-comment">-- Biến kiểu chuỗi</span>
   v_first_name    VARCHAR2(<span class="hljs-number">50</span>) :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;John&#x27;</span>;
   v_last_name     VARCHAR2(<span class="hljs-number">50</span>) <span class="hljs-keyword">NOT NULL</span> :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;Doe&#x27;</span>;  <span class="hljs-comment">-- NOT NULL bắt buộc phải có giá trị</span>

   <span class="hljs-comment">-- Biến kiểu ngày tháng</span>
   v_hire_date     <span class="hljs-type">DATE</span> :<span class="hljs-operator">=</span> SYSDATE;

   <span class="hljs-comment">-- Biến Boolean</span>
   v_is_active     <span class="hljs-type">BOOLEAN</span> :<span class="hljs-operator">=</span> <span class="hljs-literal">TRUE</span>;

   <span class="hljs-comment">-- Biến tham chiếu kiểu dữ liệu cột</span>
   v_emp_name      emp.ename<span class="hljs-operator">%</span>TYPE;  <span class="hljs-comment">-- Cùng kiểu với cột ename trong bảng emp</span>
<span class="hljs-keyword">BEGIN</span>
   v_salary :<span class="hljs-operator">=</span> <span class="hljs-number">5000</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã NV: &#x27;</span> <span class="hljs-operator">||</span> v_employee_id);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Họ tên: &#x27;</span> <span class="hljs-operator">||</span> v_first_name <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; &#x27;</span> <span class="hljs-operator">||</span> v_last_name);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương: &#x27;</span> <span class="hljs-operator">||</span> v_salary);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="h%E1%BA%B1ng-s%E1%BB%91-constants-trong-plsql">Hằng số (Constants) trong PL/SQL</h1>
<ul>
<li>Hằng số là biến có giá trị <strong>không thay đổi</strong> trong suốt chương trình.</li>
<li>Khai báo với từ khóa <code>CONSTANT</code>.</li>
<li><strong>Bắt buộc</strong> phải gán giá trị khởi tạo.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">constant_name CONSTANT datatype :<span class="hljs-operator">=</span> <span class="hljs-keyword">value</span>;
</code></pre>
<ul>
<li><strong>Lợi ích:</strong>
<ul>
<li>Tăng tính bảo mật (tránh thay đổi giá trị không mong muốn).</li>
<li>Dễ dàng bảo trì (thay đổi một lần ở khai báo).</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-h%E1%BA%B1ng-s%E1%BB%91">Ví dụ hằng số</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   c_tax_rate CONSTANT NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">0.1</span>;  <span class="hljs-comment">-- Thuế suất 10%</span>
   v_salary NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">1000</span>;
   v_tax NUMBER;
<span class="hljs-keyword">BEGIN</span>
   v_tax :<span class="hljs-operator">=</span> v_salary <span class="hljs-operator">*</span> c_tax_rate;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Thuế phải nộp: &#x27;</span> <span class="hljs-operator">||</span> v_tax);
   <span class="hljs-comment">-- c_tax_rate := 0.2;  -- LỖI! Không thể gán lại cho hằng số</span>
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="ki%E1%BB%83u-d%E1%BB%AF-li%E1%BB%87u-v%C3%B4-h%C6%B0%E1%BB%9Bng-scalar-trong-plsql">Kiểu dữ liệu vô hướng (Scalar) trong PL/SQL</h1>
<ul>
<li><strong>NUMBER:</strong> Số học (số nguyên, số thực). Có thể định nghĩa độ chính xác và số chữ số thập phân.</li>
<li><strong>CHAR:</strong> Chuỗi cố định độ dài (tối đa 32767 bytes).</li>
<li><strong>VARCHAR2:</strong> Chuỗi biến đổi độ dài (tối đa 32767 bytes) - <strong>được dùng phổ biến nhất</strong>.</li>
<li><strong>DATE:</strong> Lưu trữ ngày và giờ (bao gồm thế kỷ, năm, tháng, ngày, giờ, phút, giây).</li>
<li><strong>BOOLEAN:</strong> Lưu trữ giá trị <code>TRUE</code>, <code>FALSE</code>, hoặc <code>NULL</code>. (<strong>Chỉ dùng trong PL/SQL</strong>, không dùng trong bảng).</li>
<li><strong>TIMESTAMP:</strong> Mở rộng của DATE, hỗ trợ phần nhỏ của giây (fractional seconds).</li>
<li><strong>INTERVAL:</strong> Lưu trữ khoảng thời gian.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-class="text-sm" data-theme="eaut" lang="en-US" class="text-sm" data-marpit-pagination="21" style="--paginate:true;--class:text-sm;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="ki%E1%BB%83u-tham-chi%E1%BA%BFu-reference-type-v%C3%A0-rowtype">Kiểu tham chiếu (Reference) %TYPE và %ROWTYPE</h1>
<ul>
<li><strong>%TYPE:</strong> Khai báo biến có cùng kiểu dữ liệu với một cột trong bảng hoặc một biến khác.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_ename  emp.ename<span class="hljs-operator">%</span>TYPE;   <span class="hljs-comment">-- Cùng kiểu với cột ename (VARCHAR2)</span>
   v_sal    emp.sal<span class="hljs-operator">%</span>TYPE;     <span class="hljs-comment">-- Cùng kiểu với cột sal (NUMBER)</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> ename, sal <span class="hljs-keyword">INTO</span> v_ename, v_sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
   DBMS_OUTPUT.PUT_LINE(v_ename <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; - &#x27;</span> <span class="hljs-operator">||</span> v_sal);
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>%ROWTYPE:</strong> Khai báo một bản ghi (record) có cấu trúc giống một hàng của bảng hoặc view.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_emp_record emp<span class="hljs-operator">%</span>ROWTYPE;  <span class="hljs-comment">-- Biến record chứa toàn bộ cột của bảng emp</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> <span class="hljs-operator">*</span> <span class="hljs-keyword">INTO</span> v_emp_record <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã: &#x27;</span> <span class="hljs-operator">||</span> v_emp_record.empno <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;, Tên: &#x27;</span> <span class="hljs-operator">||</span> v_emp_record.ename);
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>Ưu điểm:</strong> Tự động cập nhật kiểu dữ liệu khi cấu trúc bảng thay đổi.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="ki%E1%BB%83u-d%E1%BB%AF-li%E1%BB%87u-record-b%E1%BA%A3n-ghi">Kiểu dữ liệu Record (Bản ghi)</h1>
<div class="columns">
<div>
<ul>
<li><strong>Record</strong> là một kiểu dữ liệu composite cho phép nhóm các trường (field) có kiểu dữ liệu khác nhau thành một đơn vị.</li>
<li><strong>Cách khai báo:</strong>
<ol>
<li><strong>Sử dụng %ROWTYPE:</strong> (đã trình bày ở trên).</li>
<li><strong>Tự định nghĩa kiểu RECORD:</strong></li>
</ol>
</li>
</ul>
</div>
<div class="col-2">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   <span class="hljs-comment">-- Định nghĩa kiểu Record</span>
   TYPE t_emp_info <span class="hljs-keyword">IS</span> RECORD (
      emp_id    emp.empno<span class="hljs-operator">%</span>TYPE,
      emp_name  emp.ename<span class="hljs-operator">%</span>TYPE,
      emp_sal   emp.sal<span class="hljs-operator">%</span>TYPE
   );
   <span class="hljs-comment">-- Khai báo biến kiểu Record</span>
   v_emp_info t_emp_info;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> empno, ename, sal
   <span class="hljs-keyword">INTO</span> v_emp_info
   <span class="hljs-keyword">FROM</span> emp
   <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;ID: &#x27;</span> <span class="hljs-operator">||</span> v_emp_info.emp_id);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Name: &#x27;</span> <span class="hljs-operator">||</span> v_emp_info.emp_name);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Salary: &#x27;</span> <span class="hljs-operator">||</span> v_emp_info.emp_sal);
<span class="hljs-keyword">END</span>;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="ki%E1%BB%83u-d%E1%BB%AF-li%E1%BB%87u-collection-t%E1%BA%ADp-h%E1%BB%A3p">Kiểu dữ liệu Collection (Tập hợp)</h1>
<ul>
<li><strong>Collection</strong> là kiểu dữ liệu dùng để lưu trữ một nhóm các phần tử có <strong>cùng kiểu dữ liệu</strong>.</li>
<li><strong>Ba loại Collection trong PL/SQL</strong>:
<ol>
<li><strong>Associative Array (Index-by Table):</strong>
<ul>
<li>Trước đây gọi là PL/SQL Table.</li>
<li>Sử dụng chỉ mục (key) để truy cập phần tử. Key có thể là số hoặc chuỗi.</li>
<li>Không giới hạn số phần tử.</li>
</ul>
</li>
<li><strong>Nested Table:</strong>
<ul>
<li>Mở rộng của Associative Array, có thể lưu trữ trong cột của bảng.</li>
<li>Có phương thức như <code>EXTEND</code>, <code>TRIM</code>, <code>DELETE</code>.</li>
</ul>
</li>
<li><strong>VARRAY (Variable-Size Array):</strong>
<ul>
<li>Mảng có kích thước cố định tối đa (maximum size).</li>
<li>Các phần tử được đánh số thứ tự (index bắt đầu từ 1).</li>
<li>Lưu trữ tuần tự.</li>
</ul>
</li>
</ol>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-associative-array-index-by-table">Ví dụ: Associative Array (Index-by Table)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   <span class="hljs-comment">-- Khai báo kiểu Associative Array với khóa là số</span>
   TYPE t_emp_name_array <span class="hljs-keyword">IS</span> <span class="hljs-keyword">TABLE</span> <span class="hljs-keyword">OF</span> emp.ename<span class="hljs-operator">%</span>TYPE
      INDEX <span class="hljs-keyword">BY</span> BINARY_INTEGER;

   v_emp_names t_emp_name_array;
   v_idx       BINARY_INTEGER :<span class="hljs-operator">=</span> <span class="hljs-number">1</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Gán giá trị</span>
   v_emp_names(<span class="hljs-number">1</span>) :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;SMITH&#x27;</span>;
   v_emp_names(<span class="hljs-number">2</span>) :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;ALLEN&#x27;</span>;
   v_emp_names(<span class="hljs-number">3</span>) :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;WARD&#x27;</span>;

   <span class="hljs-comment">-- Duyệt và in</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> <span class="hljs-number">1.</span>.v_emp_names.COUNT LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Phần tử &#x27;</span> <span class="hljs-operator">||</span> i <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;: &#x27;</span> <span class="hljs-operator">||</span> v_emp_names(i));
   <span class="hljs-keyword">END</span> LOOP;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-associative-array-index-by-table-1">Ví dụ: Associative Array (Index-by Table)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Associative Array với khóa là chuỗi (VARCHAR2)</span>
<span class="hljs-keyword">DECLARE</span>
   TYPE t_salary_map <span class="hljs-keyword">IS</span> <span class="hljs-keyword">TABLE</span> <span class="hljs-keyword">OF</span> NUMBER INDEX <span class="hljs-keyword">BY</span> VARCHAR2(<span class="hljs-number">20</span>);
   v_salaries t_salary_map;
<span class="hljs-keyword">BEGIN</span>
   v_salaries(<span class="hljs-string">&#x27;SMITH&#x27;</span>) :<span class="hljs-operator">=</span> <span class="hljs-number">800</span>;
   v_salaries(<span class="hljs-string">&#x27;ALLEN&#x27;</span>) :<span class="hljs-operator">=</span> <span class="hljs-number">1600</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương của SMITH: &#x27;</span> <span class="hljs-operator">||</span> v_salaries(<span class="hljs-string">&#x27;SMITH&#x27;</span>));
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="26" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-nested-table">Ví dụ: Nested Table</h1>
<div class="columns">
<div class="col-2">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   <span class="hljs-comment">-- Khai báo kiểu Nested Table</span>
   TYPE t_number_list <span class="hljs-keyword">IS</span> <span class="hljs-keyword">TABLE</span> <span class="hljs-keyword">OF</span> NUMBER;

   <span class="hljs-comment">-- Khởi tạo Nested Table rỗng</span>
   v_numbers t_number_list :<span class="hljs-operator">=</span> t_number_list();
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Mở rộng kích thước và gán giá trị</span>
   v_numbers.EXTEND(<span class="hljs-number">3</span>);
   v_numbers(<span class="hljs-number">1</span>) :<span class="hljs-operator">=</span> <span class="hljs-number">10</span>;
   v_numbers(<span class="hljs-number">2</span>) :<span class="hljs-operator">=</span> <span class="hljs-number">20</span>;
   v_numbers(<span class="hljs-number">3</span>) :<span class="hljs-operator">=</span> <span class="hljs-number">30</span>;

   <span class="hljs-comment">-- Thêm phần tử</span>
   v_numbers.EXTEND;
   v_numbers(<span class="hljs-number">4</span>) :<span class="hljs-operator">=</span> <span class="hljs-number">40</span>;

   <span class="hljs-comment">-- In tất cả phần tử</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> <span class="hljs-number">1.</span>.v_numbers.COUNT LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;v_numbers(&#x27;</span> <span class="hljs-operator">||</span> i <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;) = &#x27;</span> <span class="hljs-operator">||</span> v_numbers(i));
   <span class="hljs-keyword">END</span> LOOP;

   <span class="hljs-comment">-- Xóa phần tử thứ 2</span>
   v_numbers.DELETE(<span class="hljs-number">2</span>);
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Sau khi xóa, COUNT = &#x27;</span> <span class="hljs-operator">||</span> v_numbers.COUNT);
<span class="hljs-keyword">END</span>;
</code></pre>
</div>
<div>
<ul>
<li><code>EXTEND</code>: Thêm phần tử.</li>
<li><code>TRIM</code>: Xóa phần tử cuối.</li>
<li><code>DELETE</code>: Xóa phần tử theo chỉ mục.</li>
<li><code>COUNT</code>: Trả về số lượng phần tử hiện có.</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-varray-m%E1%BA%A3ng-k%C3%ADch-th%C6%B0%E1%BB%9Bc-c%E1%BB%91-%C4%91%E1%BB%8Bnh">Ví dụ: VARRAY (Mảng kích thước cố định)</h1>
<div class="columns">
<div class="col-3">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   <span class="hljs-comment">-- Khai báo VARRAY tối đa 5 phần tử</span>
   TYPE t_five_numbers <span class="hljs-keyword">IS</span> VARRAY(<span class="hljs-number">5</span>) <span class="hljs-keyword">OF</span> NUMBER;

   <span class="hljs-comment">-- Khởi tạo với 3 giá trị</span>
   v_my_array t_five_numbers :<span class="hljs-operator">=</span> t_five_numbers(<span class="hljs-number">100</span>, <span class="hljs-number">200</span>, <span class="hljs-number">300</span>);
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- In các phần tử</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> <span class="hljs-number">1.</span>.v_my_array.COUNT LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Phần tử &#x27;</span> <span class="hljs-operator">||</span> i <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;: &#x27;</span> <span class="hljs-operator">||</span> v_my_array(i));
   <span class="hljs-keyword">END</span> LOOP;

   <span class="hljs-comment">-- Thêm phần tử mới (không vượt quá 5)</span>
   v_my_array.EXTEND;
   v_my_array(<span class="hljs-number">4</span>) :<span class="hljs-operator">=</span> <span class="hljs-number">400</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Sau EXTEND, COUNT = &#x27;</span> <span class="hljs-operator">||</span> v_my_array.COUNT);

   <span class="hljs-comment">-- Cố gắng EXTEND vượt quá giới hạn - sẽ gây lỗi</span>
   <span class="hljs-comment">-- v_my_array.EXTEND(2); -- LỖI: SUBSCRIPT Beyond Count</span>
<span class="hljs-keyword">END</span>;
</code></pre>
</div>
<div>
<ul>
<li><strong>Lưu ý:</strong> Khi khởi tạo VARRAY, có thể chỉ định số lượng phần tử ban đầu (không nhất thiết phải bằng kích thước tối đa).</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="to%C3%A1n-t%E1%BB%AD-operators-trong-plsql">Toán tử (Operators) trong PL/SQL</h1>
<div class="columns">
<div class="col-2">
<p><strong>1. Toán tử số học (Arithmetic)</strong>: <code>+</code> (cộng), <code>-</code> (trừ), <code>*</code> (nhân), <code>/</code> (chia), <code>**</code> (lũy thừa).</p>
<p><strong>2. Toán tử quan hệ (Comparison)</strong>:</p>
<ul>
<li><code>=</code>, <code>!=</code> hoặc <code>&lt;&gt;</code>, <code>^=</code>, <code>&lt;</code>, <code>&gt;</code>, <code>&lt;=</code>, <code>&gt;=</code>.</li>
<li><strong>Kết quả:</strong> <code>TRUE</code>, <code>FALSE</code>, hoặc <code>NULL</code>.</li>
</ul>
<p><strong>3. Toán tử logic (Logical)</strong></p>
<ul>
<li><code>AND</code>, <code>OR</code>, <code>NOT</code>.</li>
<li><code>NOT</code> có độ ưu tiên cao nhất, sau đó là <code>AND</code>, cuối cùng là <code>OR</code>.</li>
</ul>
</div>
<div>
<p><strong>4. Toán tử nối chuỗi (Concatenation)</strong>: <code>||</code> để nối hai hoặc nhiều chuỗi.</p>
<p><strong>5. Toán tử gán (Assignment)</strong>: <code>:=</code> dùng để gán giá trị cho biến.</p>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-v%E1%BB%81-to%C3%A1n-t%E1%BB%AD-trong-plsql">Ví dụ về Toán tử trong PL/SQL</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   a NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">10</span>;
   b NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">3</span>;
   c VARCHAR2(<span class="hljs-number">20</span>) :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;Hello&#x27;</span>;
   d VARCHAR2(<span class="hljs-number">20</span>) :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;World&#x27;</span>;
   e <span class="hljs-type">BOOLEAN</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Số học</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;a + b = &#x27;</span> <span class="hljs-operator">||</span> (a <span class="hljs-operator">+</span> b));
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;a ** b = &#x27;</span> <span class="hljs-operator">||</span> (a <span class="hljs-operator">*</span><span class="hljs-operator">*</span> b)); <span class="hljs-comment">-- 10^3 = 1000</span>

   <span class="hljs-comment">-- Quan hệ</span>
   IF a <span class="hljs-operator">&gt;</span> b <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;a lớn hơn b&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-comment">-- Logic</span>
   IF (a <span class="hljs-operator">&gt;</span> <span class="hljs-number">0</span>) <span class="hljs-keyword">AND</span> (b <span class="hljs-operator">&gt;</span> <span class="hljs-number">0</span>) <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Cả hai đều dương&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-comment">-- Nối chuỗi</span>
   DBMS_OUTPUT.PUT_LINE(c <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; &#x27;</span> <span class="hljs-operator">||</span> d <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;!&#x27;</span>);

   <span class="hljs-comment">-- Gán</span>
   a :<span class="hljs-operator">=</span> a <span class="hljs-operator">*</span> <span class="hljs-number">2</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;a sau khi gán = &#x27;</span> <span class="hljs-operator">||</span> a);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="bi%E1%BB%83u-th%E1%BB%A9c-expressions-trong-plsql">Biểu thức (Expressions) trong PL/SQL</h1>
<div class="columns">
<div>
<ul>
<li><strong>Các loại biểu thức:</strong>
<ul>
<li><strong>Biểu thức số học:</strong> <code>v_salary * 12 + v_bonus</code></li>
<li><strong>Biểu thức chuỗi:</strong> <code>'Xin chào, ' || v_name</code></li>
<li><strong>Biểu thức Boolean:</strong> <code>v_salary &gt; 5000</code>, <code>(v_status = 'ACTIVE') AND (v_age &gt;= 18)</code></li>
<li><strong>Biểu thức ngày tháng:</strong> <code>v_hire_date + 30</code> (cộng 30 ngày)</li>
</ul>
</li>
</ul>
</div>
<div>
<ul>
<li><strong>Độ ưu tiên của toán tử:</strong>
<ol>
<li><code>**</code> (lũy thừa)</li>
<li><code>+</code>, <code>-</code> (số học một ngôi)</li>
<li><code>*</code>, <code>/</code></li>
<li><code>+</code>, <code>-</code>, <code>||</code> (số học hai ngôi và nối chuỗi)</li>
<li>Các phép so sánh (<code>=</code>, <code>&lt;</code>, <code>&gt;</code>, v.v.)</li>
<li><code>NOT</code></li>
<li><code>AND</code></li>
<li><code>OR</code></li>
</ol>
</li>
</ul>
</div>
</div>
<ul>
<li>Có thể sử dụng dấu ngoặc đơn <code>()</code> để thay đổi thứ tự ưu tiên.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-v%E1%BB%81-bi%E1%BB%83u-th%E1%BB%A9c">Ví dụ về Biểu thức</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_base_sal   NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">3000</span>;
   v_commission NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">500</span>;
   v_years      NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">5</span>;
   v_total      NUMBER;
   v_status     VARCHAR2(<span class="hljs-number">10</span>) :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;ACTIVE&#x27;</span>;
   v_eligible   <span class="hljs-type">BOOLEAN</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-comment">-- Biểu thức số học</span>
   v_total :<span class="hljs-operator">=</span> (v_base_sal <span class="hljs-operator">+</span> v_commission) <span class="hljs-operator">*</span> <span class="hljs-number">12</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tổng thu nhập năm: &#x27;</span> <span class="hljs-operator">||</span> v_total);

   <span class="hljs-comment">-- Biểu thức với phép nối</span>
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Lương cơ bản: &#x27;</span> <span class="hljs-operator">||</span> TO_CHAR(v_base_sal, <span class="hljs-string">&#x27;FM$999,999&#x27;</span>));

   <span class="hljs-comment">-- Biểu thức Boolean</span>
   v_eligible :<span class="hljs-operator">=</span> (v_total <span class="hljs-operator">&gt;</span> <span class="hljs-number">40000</span>) <span class="hljs-keyword">AND</span> (v_years <span class="hljs-operator">&gt;=</span> <span class="hljs-number">3</span>);
   IF v_eligible <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đủ điều kiện thưởng&#x27;</span>);
   <span class="hljs-keyword">ELSE</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không đủ điều kiện&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;

   <span class="hljs-comment">-- Biểu thức với CASE (gán có điều kiện)</span>
   v_status :<span class="hljs-operator">=</span> <span class="hljs-keyword">CASE</span> v_years
                  <span class="hljs-keyword">WHEN</span> <span class="hljs-number">1</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Mới&#x27;</span>
                  <span class="hljs-keyword">WHEN</span> <span class="hljs-number">2</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Trung bình&#x27;</span>
                  <span class="hljs-keyword">ELSE</span> <span class="hljs-string">&#x27;Cao cấp&#x27;</span>
               <span class="hljs-keyword">END</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Cấp bậc: &#x27;</span> <span class="hljs-operator">||</span> v_status);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-%C4%91i%E1%BB%81u-khi%E1%BB%83n-if-trong-plsql">Cấu trúc điều khiển IF trong PL/SQL</h1>
<ul>
<li>Cấu trúc <code>IF</code> cho phép rẽ nhánh dựa trên điều kiện Boolean.</li>
</ul>
<div class="columns">
<div class="col-1">
<ul>
<li><strong>Các dạng:</strong>
<ol>
<li><strong>IF-THEN</strong></li>
<li><strong>IF-THEN-ELSE</strong></li>
<li><strong>IF-THEN-ELSIF</strong></li>
</ol>
</li>
</ul>
</div>
<div>
<ul>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">IF condition1 <span class="hljs-keyword">THEN</span>
   statements1;
[ELSIF condition2 <span class="hljs-keyword">THEN</span>
   statements2;]
[<span class="hljs-keyword">ELSE</span>
   statements3;]
<span class="hljs-keyword">END</span> IF;
</code></pre>
</div>
</div>
<ul>
<li><code>ELSIF</code> (không phải <code>ELSE IF</code>).</li>
<li>Điều kiện được đánh giá từ trên xuống dưới, dừng lại ở điều kiện đúng đầu tiên.</li>
<li><code>ELSE</code> là nhánh cuối cùng, thực thi khi tất cả điều kiện đều sai.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-if-then-v%C3%A0-if-then-else">Ví dụ: IF-THEN và IF-THEN-ELSE</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Ví dụ 1: IF-THEN</span>
<span class="hljs-keyword">DECLARE</span>
   v_sal emp.sal<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> sal <span class="hljs-keyword">INTO</span> v_sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7369</span>;
   IF v_sal <span class="hljs-operator">&lt;</span> <span class="hljs-number">1000</span> <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Nhân viên có lương thấp&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;
<span class="hljs-keyword">END</span>;

<span class="hljs-comment">-- Ví dụ 2: IF-THEN-ELSE</span>
<span class="hljs-keyword">DECLARE</span>
   v_emp_name emp.ename<span class="hljs-operator">%</span>TYPE;
   v_comm     emp.comm<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> ename, comm <span class="hljs-keyword">INTO</span> v_emp_name, v_comm
   <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> <span class="hljs-number">7499</span>;

   IF v_comm <span class="hljs-keyword">IS</span> <span class="hljs-keyword">NOT NULL</span> <span class="hljs-keyword">THEN</span>
      DBMS_OUTPUT.PUT_LINE(v_emp_name <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; có hoa hồng: &#x27;</span> <span class="hljs-operator">||</span> v_comm);
   <span class="hljs-keyword">ELSE</span>
      DBMS_OUTPUT.PUT_LINE(v_emp_name <span class="hljs-operator">||</span> <span class="hljs-string">&#x27; không có hoa hồng&#x27;</span>);
   <span class="hljs-keyword">END</span> IF;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-if-then-elsif-nhi%E1%BB%81u-nh%C3%A1nh">Ví dụ: IF-THEN-ELSIF (Nhiều nhánh)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_empno    emp.empno<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">7788</span>;
   v_sal      emp.sal<span class="hljs-operator">%</span>TYPE;
   v_grade    VARCHAR2(<span class="hljs-number">20</span>);
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">SELECT</span> sal <span class="hljs-keyword">INTO</span> v_sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> empno <span class="hljs-operator">=</span> v_empno;

   IF v_sal <span class="hljs-operator">&gt;=</span> <span class="hljs-number">3000</span> <span class="hljs-keyword">THEN</span>
      v_grade :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;Cao&#x27;</span>;
   ELSIF v_sal <span class="hljs-operator">&gt;=</span> <span class="hljs-number">2000</span> <span class="hljs-keyword">THEN</span>
      v_grade :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;Trung bình&#x27;</span>;
   ELSIF v_sal <span class="hljs-operator">&gt;=</span> <span class="hljs-number">1000</span> <span class="hljs-keyword">THEN</span>
      v_grade :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;Thấp&#x27;</span>;
   <span class="hljs-keyword">ELSE</span>
      v_grade :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;Rất thấp&#x27;</span>;
   <span class="hljs-keyword">END</span> IF;

   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã NV: &#x27;</span> <span class="hljs-operator">||</span> v_empno <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;, Lương: &#x27;</span> <span class="hljs-operator">||</span> v_sal <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;, Xếp loại: &#x27;</span> <span class="hljs-operator">||</span> v_grade);
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>Lưu ý:</strong> Khi <code>v_sal = 2500</code>, nhánh <code>Trung bình</code> được thực thi. Khi <code>v_sal = 3500</code>, nhánh <code>Cao</code> được thực thi.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-%C4%91i%E1%BB%81u-khi%E1%BB%83n-case-trong-plsql">Cấu trúc điều khiển CASE trong PL/SQL</h1>
<ul>
<li>
<p><code>CASE</code> là cấu trúc rẽ nhánh dựa trên nhiều giá trị, thường dùng thay thế <code>IF-THEN-ELSIF</code> khi cần so sánh một biểu thức với nhiều giá trị cụ thể.</p>
</li>
<li>
<p><strong>Hai dạng:</strong></p>
<ul>
<li><strong>CASE đơn giản (Simple CASE):</strong> So sánh biểu thức với một loạt các giá trị.</li>
<li><strong>CASE tìm kiếm (Searched CASE):</strong> Kiểm tra nhiều điều kiện Boolean khác nhau.</li>
</ul>
</li>
</ul>
<div class="columns">
<div>
<ul>
<li><strong>Cú pháp CASE đơn giản:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CASE</span> expression
   <span class="hljs-keyword">WHEN</span> value1 <span class="hljs-keyword">THEN</span> result1
   <span class="hljs-keyword">WHEN</span> value2 <span class="hljs-keyword">THEN</span> result2
   ...
   [<span class="hljs-keyword">ELSE</span> result_else]
<span class="hljs-keyword">END</span>;
</code></pre>
</div>
<div>
<ul>
<li><strong>Cú pháp CASE tìm kiếm:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CASE</span>
    <span class="hljs-keyword">WHEN</span> condition_1 <span class="hljs-keyword">THEN</span> statements_1;
    <span class="hljs-keyword">WHEN</span> condition_2 <span class="hljs-keyword">THEN</span> statements_2;
    ...
    [<span class="hljs-keyword">ELSE</span> else_statements;]
<span class="hljs-keyword">END</span> <span class="hljs-keyword">CASE</span>;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-case-%C4%91%C6%A1n-gi%E1%BA%A3n-simple-case">Ví dụ: CASE đơn giản (Simple CASE)</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Ví dụ 1: CASE trong biểu thức (gán giá trị)</span>
<span class="hljs-keyword">DECLARE</span>
   v_deptno emp.deptno<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">20</span>;
   v_dname  VARCHAR2(<span class="hljs-number">20</span>);
<span class="hljs-keyword">BEGIN</span>
   v_dname :<span class="hljs-operator">=</span> <span class="hljs-keyword">CASE</span> v_deptno
                 <span class="hljs-keyword">WHEN</span> <span class="hljs-number">10</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Kế toán&#x27;</span>
                 <span class="hljs-keyword">WHEN</span> <span class="hljs-number">20</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Nghiên cứu&#x27;</span>
                 <span class="hljs-keyword">WHEN</span> <span class="hljs-number">30</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Bán hàng&#x27;</span>
                 <span class="hljs-keyword">WHEN</span> <span class="hljs-number">40</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Điều hành&#x27;</span>
                 <span class="hljs-keyword">ELSE</span> <span class="hljs-string">&#x27;Không xác định&#x27;</span>
              <span class="hljs-keyword">END</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Phòng ban: &#x27;</span> <span class="hljs-operator">||</span> v_dname);
<span class="hljs-keyword">END</span>;

<span class="hljs-comment">-- Ví dụ 2: CASE như một câu lệnh</span>
<span class="hljs-keyword">DECLARE</span>
   v_grade <span class="hljs-type">CHAR</span>(<span class="hljs-number">1</span>) :<span class="hljs-operator">=</span> <span class="hljs-string">&#x27;B&#x27;</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">CASE</span> v_grade
      <span class="hljs-keyword">WHEN</span> <span class="hljs-string">&#x27;A&#x27;</span> <span class="hljs-keyword">THEN</span> DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Xuất sắc&#x27;</span>);
      <span class="hljs-keyword">WHEN</span> <span class="hljs-string">&#x27;B&#x27;</span> <span class="hljs-keyword">THEN</span> DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tốt&#x27;</span>);
      <span class="hljs-keyword">WHEN</span> <span class="hljs-string">&#x27;C&#x27;</span> <span class="hljs-keyword">THEN</span> DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Trung bình&#x27;</span>);
      <span class="hljs-keyword">ELSE</span> DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Không xác định&#x27;</span>);
   <span class="hljs-keyword">END</span> <span class="hljs-keyword">CASE</span>;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-case-t%C3%ACm-ki%E1%BA%BFm-searched-case">Ví dụ: CASE tìm kiếm (Searched CASE)</h1>
<ul>
<li>Dùng khi điều kiện phức tạp, không chỉ so sánh bằng.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_sal  emp.sal<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">2500</span>;
   v_comm emp.comm<span class="hljs-operator">%</span>TYPE :<span class="hljs-operator">=</span> <span class="hljs-number">200</span>;
   v_desc VARCHAR2(<span class="hljs-number">50</span>);
<span class="hljs-keyword">BEGIN</span>
   v_desc :<span class="hljs-operator">=</span> <span class="hljs-keyword">CASE</span>
                <span class="hljs-keyword">WHEN</span> v_sal <span class="hljs-operator">&gt;=</span> <span class="hljs-number">3000</span> <span class="hljs-keyword">AND</span> v_comm <span class="hljs-keyword">IS</span> <span class="hljs-keyword">NOT NULL</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Lương cao, có thưởng&#x27;</span>
                <span class="hljs-keyword">WHEN</span> v_sal <span class="hljs-operator">&gt;=</span> <span class="hljs-number">3000</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Lương cao, không thưởng&#x27;</span>
                <span class="hljs-keyword">WHEN</span> v_sal <span class="hljs-keyword">BETWEEN</span> <span class="hljs-number">1500</span> <span class="hljs-keyword">AND</span> <span class="hljs-number">2999</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Lương trung bình&#x27;</span>
                <span class="hljs-keyword">WHEN</span> v_sal <span class="hljs-operator">&lt;</span> <span class="hljs-number">1500</span> <span class="hljs-keyword">THEN</span> <span class="hljs-string">&#x27;Lương thấp&#x27;</span>
                <span class="hljs-keyword">ELSE</span> <span class="hljs-string">&#x27;Không xác định&#x27;</span>
             <span class="hljs-keyword">END</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mô tả: &#x27;</span> <span class="hljs-operator">||</span> v_desc);
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>Lưu ý:</strong> <code>CASE</code> tìm kiếm linh hoạt hơn, cho phép sử dụng các toán tử so sánh (<code>&gt;=</code>, <code>BETWEEN</code>, <code>AND</code>, <code>OR</code>, ...).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-l%E1%BA%B7p-loop-v%C3%B2ng-l%E1%BA%B7p-c%C6%A1-b%E1%BA%A3n">Cấu trúc lặp LOOP (Vòng lặp cơ bản)</h1>
<ul>
<li>Vòng lặp <code>LOOP</code> cơ bản (còn gọi là <strong>Simple Loop</strong> hay <strong>Infinite Loop</strong>) thực thi khối lệnh liên tục cho đến khi gặp lệnh <code>EXIT</code>.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">LOOP
   <span class="hljs-comment">-- Các câu lệnh</span>
   EXIT [<span class="hljs-keyword">WHEN</span> <span class="hljs-keyword">condition</span>];  <span class="hljs-comment">-- Thoát khỏi vòng lặp khi condition = TRUE</span>
<span class="hljs-keyword">END</span> LOOP;
</code></pre>
<ul>
<li><strong>Đặc điểm:</strong>
<ul>
<li>Vòng lặp vô hạn nếu không có <code>EXIT</code>.</li>
<li><code>EXIT WHEN</code> là cách kiểm soát phổ biến.</li>
<li>Có thể sử dụng <code>IF ... THEN EXIT; END IF;</code>.</li>
</ul>
</li>
<li><strong>Ứng dụng:</strong> Khi chưa biết trước số lần lặp, cần kiểm tra điều kiện ở giữa hoặc cuối vòng lặp.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-loop-c%C6%A1-b%E1%BA%A3n">Ví dụ: LOOP cơ bản</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tính tổng 1+2+...+10</span>
<span class="hljs-keyword">DECLARE</span>
   v_counter NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">1</span>;
   v_sum     NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">0</span>;
<span class="hljs-keyword">BEGIN</span>
   LOOP
      v_sum :<span class="hljs-operator">=</span> v_sum <span class="hljs-operator">+</span> v_counter;
      v_counter :<span class="hljs-operator">=</span> v_counter <span class="hljs-operator">+</span> <span class="hljs-number">1</span>;
      <span class="hljs-comment">-- Thoát khi v_counter &gt; 10</span>
      EXIT <span class="hljs-keyword">WHEN</span> v_counter <span class="hljs-operator">&gt;</span> <span class="hljs-number">10</span>;
   <span class="hljs-keyword">END</span> LOOP;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tổng từ 1 đến 10: &#x27;</span> <span class="hljs-operator">||</span> v_sum);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-loop-c%C6%A1-b%E1%BA%A3n-1">Ví dụ: LOOP cơ bản</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Duyệt qua nhân viên trong bảng EMP (sử dụng EXIT khi hết dữ liệu)</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp <span class="hljs-keyword">IS</span> <span class="hljs-keyword">SELECT</span> ename, sal <span class="hljs-keyword">FROM</span> emp;
   v_ename emp.ename<span class="hljs-operator">%</span>TYPE;
   v_sal   emp.sal<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">OPEN</span> c_emp;
   LOOP
      <span class="hljs-keyword">FETCH</span> c_emp <span class="hljs-keyword">INTO</span> v_ename, v_sal;
      EXIT <span class="hljs-keyword">WHEN</span> c_emp<span class="hljs-operator">%</span>NOTFOUND;  <span class="hljs-comment">-- Thoát khi không còn dòng dữ liệu</span>
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tên: &#x27;</span> <span class="hljs-operator">||</span> v_ename <span class="hljs-operator">||</span> <span class="hljs-string">&#x27;, Lương: &#x27;</span> <span class="hljs-operator">||</span> v_sal);
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-keyword">CLOSE</span> c_emp;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-l%E1%BA%B7p-while-loop">Cấu trúc lặp WHILE LOOP</h1>
<ul>
<li>Vòng lặp <code>WHILE</code> kiểm tra điều kiện <strong>trước</strong> khi thực hiện thân vòng lặp.</li>
<li>Nếu điều kiện đúng, thực thi; nếu sai, thoát vòng lặp.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">WHILE <span class="hljs-keyword">condition</span> LOOP
   <span class="hljs-comment">-- Các câu lệnh</span>
<span class="hljs-keyword">END</span> LOOP;
</code></pre>
<ul>
<li><strong>Khác biệt với LOOP:</strong> Điều kiện được kiểm tra ở đầu, có thể không thực hiện lần nào nếu điều kiện ban đầu sai.</li>
<li><strong>Ứng dụng:</strong> Khi cần lặp với số lần không xác định, nhưng phải thỏa mãn một điều kiện trước khi bắt đầu.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-while-loop">Ví dụ: WHILE LOOP</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tính tổng 1+2+...+10 bằng WHILE LOOP</span>
<span class="hljs-keyword">DECLARE</span>
   v_counter NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">1</span>;
   v_sum     NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">0</span>;
<span class="hljs-keyword">BEGIN</span>
   WHILE v_counter <span class="hljs-operator">&lt;=</span> <span class="hljs-number">10</span> LOOP
      v_sum :<span class="hljs-operator">=</span> v_sum <span class="hljs-operator">+</span> v_counter;
      v_counter :<span class="hljs-operator">=</span> v_counter <span class="hljs-operator">+</span> <span class="hljs-number">1</span>;
   <span class="hljs-keyword">END</span> LOOP;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Tổng (WHILE): &#x27;</span> <span class="hljs-operator">||</span> v_sum);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-while-loop-1">Ví dụ: WHILE LOOP</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Tăng lương cho nhân viên có mức lương dưới 2000 cho đến khi đạt 2000</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp_low <span class="hljs-keyword">IS</span> <span class="hljs-keyword">SELECT</span> empno, sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> sal <span class="hljs-operator">&lt;</span> <span class="hljs-number">2000</span> <span class="hljs-keyword">FOR</span> <span class="hljs-keyword">UPDATE</span>;
   v_empno emp.empno<span class="hljs-operator">%</span>TYPE;
   v_sal   emp.sal<span class="hljs-operator">%</span>TYPE;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">OPEN</span> c_emp_low;
   LOOP
      <span class="hljs-keyword">FETCH</span> c_emp_low <span class="hljs-keyword">INTO</span> v_empno, v_sal;
      EXIT <span class="hljs-keyword">WHEN</span> c_emp_low<span class="hljs-operator">%</span>NOTFOUND;
      WHILE v_sal <span class="hljs-operator">&lt;</span> <span class="hljs-number">2000</span> LOOP
         v_sal :<span class="hljs-operator">=</span> v_sal <span class="hljs-operator">+</span> <span class="hljs-number">100</span>;
         <span class="hljs-keyword">UPDATE</span> emp <span class="hljs-keyword">SET</span> sal <span class="hljs-operator">=</span> v_sal <span class="hljs-keyword">WHERE</span> <span class="hljs-keyword">CURRENT</span> <span class="hljs-keyword">OF</span> c_emp_low;
      <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-keyword">END</span> LOOP;
   <span class="hljs-keyword">CLOSE</span> c_emp_low;
   <span class="hljs-keyword">COMMIT</span>;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã cập nhật lương cho nhân viên có lương dưới 2000.&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="44" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-l%E1%BA%B7p-for-loop">Cấu trúc lặp FOR LOOP</h1>
<ul>
<li>Vòng lặp <code>FOR</code> dùng khi <strong>biết trước số lần lặp</strong>.</li>
<li>Biến đếm (loop index) được tự động khai báo, quản lý và tăng/giảm sau mỗi lần lặp.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">FOR</span> loop_index <span class="hljs-keyword">IN</span> [REVERSE] lower_bound..upper_bound LOOP
   <span class="hljs-comment">-- Các câu lệnh</span>
<span class="hljs-keyword">END</span> LOOP;
</code></pre>
<ul>
<li><strong>Đặc điểm:</strong>
<ul>
<li><code>loop_index</code> tự động được khai báo, không cần khai báo trong <code>DECLARE</code>.</li>
<li>Chỉ đọc (read-only), không thể gán giá trị mới cho biến đếm bên trong vòng lặp.</li>
<li><code>REVERSE</code> lặp từ trên xuống dưới (từ <code>upper_bound</code> xuống <code>lower_bound</code>).</li>
<li>Có thể sử dụng <code>CONTINUE</code> và <code>EXIT</code> bên trong.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="45" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-for-loop">Ví dụ: FOR LOOP</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- In số từ 1 đến 10</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> <span class="hljs-number">1.</span><span class="hljs-number">.10</span> LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;i = &#x27;</span> <span class="hljs-operator">||</span> i);
   <span class="hljs-keyword">END</span> LOOP;
<span class="hljs-keyword">END</span>;

<span class="hljs-comment">-- In số từ 10 đến 1 (REVERSE)</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> REVERSE <span class="hljs-number">1.</span><span class="hljs-number">.10</span> LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;i (REVERSE) = &#x27;</span> <span class="hljs-operator">||</span> i);
   <span class="hljs-keyword">END</span> LOOP;
<span class="hljs-keyword">END</span>;

<span class="hljs-comment">-- Tính giai thừa của 5</span>
<span class="hljs-keyword">DECLARE</span>
   v_factorial NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">1</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> <span class="hljs-number">1.</span><span class="hljs-number">.5</span> LOOP
      v_factorial :<span class="hljs-operator">=</span> v_factorial <span class="hljs-operator">*</span> i;
   <span class="hljs-keyword">END</span> LOOP;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;5! = &#x27;</span> <span class="hljs-operator">||</span> v_factorial);
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-for-loop-v%E1%BB%9Bi-cursor">Ví dụ: FOR LOOP với Cursor</h1>
<ul>
<li><strong>FOR LOOP với Cursor</strong> tự động mở, fetch, và đóng cursor. Rất tiện lợi.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Hiển thị danh sách nhân viên</span>
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> emp_rec <span class="hljs-keyword">IN</span> (<span class="hljs-keyword">SELECT</span> empno, ename, sal <span class="hljs-keyword">FROM</span> emp) LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.empno <span class="hljs-operator">||</span>
                           <span class="hljs-string">&#x27;, Tên: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.ename <span class="hljs-operator">||</span>
                           <span class="hljs-string">&#x27;, Lương: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.sal);
   <span class="hljs-keyword">END</span> LOOP;
<span class="hljs-keyword">END</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="v%C3%AD-d%E1%BB%A5-for-loop-v%E1%BB%9Bi-cursor-1">Ví dụ: FOR LOOP với Cursor</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Sử dụng cursor đã khai báo</span>
<span class="hljs-keyword">DECLARE</span>
   <span class="hljs-keyword">CURSOR</span> c_emp <span class="hljs-keyword">IS</span> <span class="hljs-keyword">SELECT</span> empno, ename, sal <span class="hljs-keyword">FROM</span> emp <span class="hljs-keyword">WHERE</span> deptno <span class="hljs-operator">=</span> <span class="hljs-number">20</span>;
<span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> emp_rec <span class="hljs-keyword">IN</span> c_emp LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Mã: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.empno <span class="hljs-operator">||</span>
                           <span class="hljs-string">&#x27;, Tên: &#x27;</span> <span class="hljs-operator">||</span> emp_rec.ename);
   <span class="hljs-keyword">END</span> LOOP;
<span class="hljs-keyword">END</span>;
</code></pre>
<ul>
<li><strong>Lưu ý:</strong> Trong vòng lặp này, <code>emp_rec</code> tự động có kiểu <code>emp%ROWTYPE</code> (đối với cursor truy vấn toàn bộ bảng) hoặc record tương ứng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="48" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="l%E1%BB%87nh-exit-trong-plsql">Lệnh EXIT trong PL/SQL</h1>
<ul>
<li><code>EXIT</code> dùng để thoát khỏi vòng lặp ngay lập tức.</li>
<li>Có thể sử dụng với <code>WHEN</code> để thoát có điều kiện.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">EXIT [<span class="hljs-keyword">WHEN</span> <span class="hljs-keyword">condition</span>];
</code></pre>
<ul>
<li><strong>Ví dụ:</strong></li>
</ul>
<div class="columns">
<div class="col-3">
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DECLARE</span>
   v_counter NUMBER :<span class="hljs-operator">=</span> <span class="hljs-number">1</span>;
<span class="hljs-keyword">BEGIN</span>
   LOOP
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Counter: &#x27;</span> <span class="hljs-operator">||</span> v_counter);
      v_counter :<span class="hljs-operator">=</span> v_counter <span class="hljs-operator">+</span> <span class="hljs-number">1</span>;
      EXIT <span class="hljs-keyword">WHEN</span> v_counter <span class="hljs-operator">&gt;</span> <span class="hljs-number">5</span>;  <span class="hljs-comment">-- Thoát khi v_counter &gt; 5</span>
   <span class="hljs-keyword">END</span> LOOP;
   DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Đã thoát khỏi vòng lặp.&#x27;</span>);
<span class="hljs-keyword">END</span>;
</code></pre>
</div>
<div class="col-2">
<ul>
<li><strong>Lưu ý:</strong> <code>EXIT</code> chỉ thoát khỏi vòng lặp hiện tại. Nếu có vòng lặp lồng nhau, muốn thoát khỏi vòng lặp bên ngoài cần dùng nhãn (label).</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="49" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="l%E1%BB%87nh-continue-trong-plsql">Lệnh CONTINUE trong PL/SQL</h1>
<ul>
<li><code>CONTINUE</code> dùng để bỏ qua phần còn lại của lần lặp hiện tại và chuyển sang lần lặp tiếp theo.</li>
<li>Có thể sử dụng với <code>WHEN</code> để bỏ qua có điều kiện.</li>
<li><strong>Cú pháp:</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">CONTINUE [<span class="hljs-keyword">WHEN</span> <span class="hljs-keyword">condition</span>];
</code></pre>
<ul>
<li><strong>Ví dụ:</strong></li>
</ul>
<div class="columns">
<div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">BEGIN</span>
   <span class="hljs-keyword">FOR</span> i <span class="hljs-keyword">IN</span> <span class="hljs-number">1.</span><span class="hljs-number">.10</span> LOOP
      <span class="hljs-comment">-- Bỏ qua các số chẵn</span>
      CONTINUE <span class="hljs-keyword">WHEN</span> <span class="hljs-built_in">MOD</span>(i, <span class="hljs-number">2</span>) <span class="hljs-operator">=</span> <span class="hljs-number">0</span>;
      DBMS_OUTPUT.PUT_LINE(<span class="hljs-string">&#x27;Số lẻ: &#x27;</span> <span class="hljs-operator">||</span> i);
   <span class="hljs-keyword">END</span> LOOP;
<span class="hljs-keyword">END</span>;
</code></pre>
</div>
<div>
<ul>
<li><strong>Kết quả:</strong> In ra các số lẻ (1, 3, 5, 7, 9). Khi gặp <code>CONTINUE WHEN MOD(i,2)=0</code>, vòng lặp bỏ qua lệnh <code>PUT_LINE</code> và chuyển sang <code>i</code> tiếp theo.</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="50" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="135">
<h1 id="so-s%C3%A1nh-exit-v%C3%A0-continue">So sánh EXIT và CONTINUE</h1>
<table>
<thead>
<tr>
<th><strong>Lệnh</strong></th>
<th><strong>Tác dụng</strong></th>
<th><strong>Hành vi</strong></th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>EXIT</strong></td>
<td>Thoát vòng lặp</td>
<td>Kết thúc toàn bộ vòng lặp, chuyển đến câu lệnh sau <code>END LOOP</code></td>
</tr>
<tr>
<td><strong>CONTINUE</strong></td>
<td>Bỏ qua lần lặp hiện tại</td>
