<h2 id="ch%C6%B0%C6%A1ng-4-ki%E1%BA%BFn-tr%C3%BAc-qu%E1%BA%A3n-tr%E1%BB%8B-oracle">Chương 4. Kiến trúc, Quản trị Oracle</h2>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-class="toc" data-theme="eaut" lang="en-US" class="toc" data-marpit-pagination="2" style="--paginate:true;--class:toc;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="n%E1%BB%99i-dung">Nội dung</h1>
<ul>
<li>Kiến trúc Oracle Database</li>
<li>Quản trị Tablespace và lưu trữ</li>
<li>Schema và các đối tượng trong Schema</li>
<li>Data Dictionary</li>
<li>Quản trị người dùng và bảo mật</li>
<li>Sao lưu và phục hồi</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="3" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="ki%E1%BA%BFn-tr%C3%BAc-oracle-database">Kiến trúc Oracle Database</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="ki%E1%BA%BFn-tr%C3%BAc-oracle-database---t%E1%BB%95ng-quan">Kiến trúc Oracle Database - Tổng quan</h1>
<div class="columns">
<div>
<ul>
<li>Oracle Database là hệ quản trị cơ sở dữ liệu quan hệ (RDBMS) do Oracle phát triển.</li>
<li>Kiến trúc bao gồm hai thành phần chính: <strong>Instance</strong> và <strong>Database</strong>.</li>
<li>Instance là tập các tiến trình (process) và vùng nhớ (memory) để quản lý dữ liệu.</li>
</ul>
</div>
<div>
<br />
<p><img src="./images/4.1.png" alt="" style="width:600px;" /></p>
</div>
</div>
<ul>
<li>Database là tập các file vật lý lưu trữ dữ liệu thực tế.</li>
<li>Kiến trúc Multitenant (từ 12c) cho phép nhiều PDB (Pluggable Database) bên trong một CDB (Container Database).</li>
<li>Hiểu rõ kiến trúc giúp quản trị hiệu quả, tối ưu hiệu năng và xử lý sự cố.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="oracle-instance---%C4%91%E1%BB%8Bnh-ngh%C4%A9a">Oracle Instance - Định nghĩa</h1>
<div class="columns">
<div>
<ul>
<li>Instance là một <strong>System Global Area (SGA)</strong> và các <strong>background processes</strong>.</li>
<li>SGA: vùng nhớ dùng chung, chứa dữ liệu cache, câu lệnh SQL, thông tin điều khiển.</li>
<li>Background processes: thực hiện các tác vụ nền như ghi dữ liệu xuống đĩa, kiểm tra checkpoint, phục hồi.</li>
</ul>
</div>
<div>
<p><img src="./images/4.2.png" alt="" style="width:600px;" /></p>
</div>
</div>
<ul>
<li>Mỗi instance chỉ kết nối với một database (trong kiến trúc non-CDB) hoặc có thể kết nối với một CDB (trong kiến trúc Multitenant).</li>
<li>Một database có thể được gắn với nhiều instance (RAC - Real Application Clusters) để tăng khả năng sẵn sàng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="6" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="oracle-database---%C4%91%E1%BB%8Bnh-ngh%C4%A9a">Oracle Database - Định nghĩa</h1>
<div class="columns">
<div>
<ul>
<li>Database là tập hợp các file vật lý trên đĩa:
<ul>
<li><strong>Data files</strong>: chứa dữ liệu của user và hệ thống.</li>
<li><strong>Control files</strong>: lưu thông tin cấu trúc database (tên, trạng thái, các file log, checkpoint).</li>
<li><strong>Redo log files</strong>: ghi lại mọi thay đổi để phục hồi khi gặp sự cố.</li>
<li><strong>Temp files</strong>: dùng cho vùng nhớ tạm (sort, hash join, temporary tables).</li>
</ul>
</li>
</ul>
</div>
<div>
<p><img src="./images/4.3.png" alt="" style="width:450px;" /></p>
</div>
</div>
<ul>
<li>Các file này cùng tạo nên một database thống nhất.</li>
<li>Khi instance khởi động, nó sẽ mount và mở database để người dùng truy cập.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="quan-h%E1%BB%87-gi%E1%BB%AFa-instance-v%C3%A0-database">Quan hệ giữa Instance và Database</h1>
<ul>
<li><strong>Instance</strong> là phần <strong>động</strong> (chạy trong bộ nhớ và process).</li>
<li><strong>Database</strong> là phần <strong>tĩnh</strong> (file trên đĩa).</li>
<li>Quan hệ: Một instance chỉ quản lý một database trong non-CDB; trong Multitenant, instance quản lý một CDB (chứa nhiều PDB).</li>
<li>Các trạng thái:
<ul>
<li><strong>Shutdown</strong>: không có instance, database đóng.</li>
<li><strong>Nomount</strong>: instance khởi động nhưng chưa gắn database.</li>
<li><strong>Mount</strong>: instance đã gắn database (đọc control file) nhưng chưa mở cho user.</li>
<li><strong>Open</strong>: database mở, sẵn sàng cho truy cập.</li>
</ul>
</li>
<li>Kiểm tra trạng thái: <code>SELECT status FROM v$instance;</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="v%C3%AD-d%E1%BB%A5-ki%E1%BB%83m-tra-instance-v%C3%A0-database">Ví dụ kiểm tra Instance và Database</h1>
<ul>
<li>Truy vấn thông tin instance:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> instance_name, host_name, version, status <span class="hljs-keyword">FROM</span> v$instance;
</code></pre>
<ul>
<li>Truy vấn thông tin database:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> name, dbid, created, log_mode <span class="hljs-keyword">FROM</span> v$database;
</code></pre>
<ul>
<li>Kiểm tra trạng thái mở của database:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> open_mode <span class="hljs-keyword">FROM</span> v$database;
</code></pre>
<ul>
<li>Kết quả hiển thị tên instance, host, version, trạng thái, và open_mode (READ WRITE, READ ONLY, MOUNTED...).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="ki%E1%BA%BFn-tr%C3%BAc-multitenant---t%E1%BB%95ng-quan">Kiến trúc Multitenant - Tổng quan</h1>
<div class="columns">
<div class="col-2">
<ul>
<li>Giới thiệu từ Oracle 12c, cho phép một <strong>CDB (Container Database)</strong> chứa nhiều <strong>PDB (Pluggable Database)</strong>.</li>
<li>CDB đóng vai trò container chính, có <strong>root container (CDB$ROOT)</strong> và <strong>seed PDB (PDB$SEED)</strong>.</li>
</ul>
</div>
<div class="col-3">
<p><img src="./images/4.4.png" alt="" style="width:650px;" /></p>
</div>
</div>
<ul>
<li>PDB là database độc lập về dữ liệu và ứng dụng, nhưng dùng chung các background process và SGA của CDB.</li>
<li>Giúp quản lý tập trung, dễ dàng di chuyển, nâng cấp và bảo trì nhiều database.</li>
<li>Mỗi PDB có lược đồ (schema) và dữ liệu riêng, tách biệt về bảo mật.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="cdb-container-database">CDB (Container Database)</h1>
<div class="columns">
<div>
<ul>
<li>CDB là một database có chứa các container: <strong>root</strong>, <strong>seed</strong>, và các <strong>PDB</strong>.</li>
<li>Root (CDB$ROOT) chứa metadata chung của toàn bộ CDB, như user common, các tablespace hệ thống.</li>
<li>Seed (PDB$SEED) là PDB mẫu dùng để tạo PDB mới (template).</li>
<li>Các PDB có thể được plug/unplug, tạo mới từ seed hoặc clone từ PDB khác.</li>
</ul>
</div>
<div>
<br />
<p><img src="./images/4.5.png" alt="" style="width:600px;" /></p>
</div>
</div>
<ul>
<li>Quản trị CDB bằng các lệnh SQL với <code>CONTAINER=CURRENT</code> hoặc <code>CONTAINER=ALL</code>.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="pdb-pluggable-database">PDB (Pluggable Database)</h1>
<ul>
<li>PDB là database có cấu trúc đầy đủ (tablespace, user, schema, data) nhưng nằm trong CDB.</li>
<li>Mỗi PDB có <strong>PDB name</strong> và <strong>PDB ID</strong> duy nhất trong CDB.</li>
<li>Có thể kết nối trực tiếp đến PDB để thực hiện các thao tác quản trị riêng.</li>
<li>Các PDB có thể được khởi động/dừng độc lập.</li>
<li>Xem danh sách PDB:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> name, open_mode <span class="hljs-keyword">FROM</span> v$pdbs;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="seed-database-pdbseed">Seed Database (PDB$SEED)</h1>
<ul>
<li>PDB$SEED là PDB hệ thống, chỉ đọc (read-only), dùng làm template để tạo PDB mới.</li>
<li>Không thể kết nối hoặc sửa đổi dữ liệu trong PDB$SEED.</li>
<li>Khi tạo PDB mới với <code>CREATE PLUGGABLE DATABASE ... FROM PDB$SEED</code>, Oracle sao chép cấu trúc từ seed.</li>
<li>Có thể tạo PDB từ seed với các tùy chọn khác (storage, file location).</li>
<li>Kiểm tra thông tin:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> name, open_mode <span class="hljs-keyword">FROM</span> v$pdbs <span class="hljs-keyword">WHERE</span> name <span class="hljs-operator">=</span> <span class="hljs-string">&#x27;PDB$SEED&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="13" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="common-user-v%C3%A0-local-user">Common User và Local User</h1>
<ul>
<li><strong>Common User</strong>: là user tồn tại trong toàn bộ CDB, có thể kết nối vào root và bất kỳ PDB nào (nếu được cấp quyền).
<ul>
<li>Tên thường bắt đầu bằng <code>C##</code> (ví dụ <code>C##ADMIN</code>).</li>
</ul>
</li>
<li><strong>Local User</strong>: chỉ tồn tại trong một PDB cụ thể, không thể kết nối vào root hoặc PDB khác.</li>
<li>Common user có thể quản lý toàn bộ CDB (với quyền phù hợp), local user chỉ quản lý PDB của mình.</li>
<li>Tạo common user:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">USER</span> C##ADMIN IDENTIFIED <span class="hljs-keyword">BY</span> pass CONTAINER<span class="hljs-operator">=</span><span class="hljs-keyword">ALL</span>;
</code></pre>
<ul>
<li>Tạo local user (đang kết nối vào PDB):</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">USER</span> app_user IDENTIFIED <span class="hljs-keyword">BY</span> pass CONTAINER<span class="hljs-operator">=</span><span class="hljs-keyword">CURRENT</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-l%C6%B0u-tr%E1%BB%AF-v%E1%BA%ADt-l%C3%BD---t%E1%BB%95ng-quan">Cấu trúc lưu trữ vật lý - Tổng quan</h1>
<ul>
<li>Các file vật lý chính của Oracle Database:
<ul>
<li><strong>Data files</strong>: chứa dữ liệu bảng, index, v.v.</li>
<li><strong>Control files</strong>: chứa thông tin metadata về database.</li>
<li><strong>Redo log files</strong>: ghi lại các thay đổi để phục hồi.</li>
<li><strong>Temp files</strong>: dùng cho các thao tác tạm thời.</li>
</ul>
</li>
<li>Ngoài ra còn có: Parameter file (spfile), Password file, Audit file, Alert log, Trace files.</li>
<li>Vị trí các file được xác định bởi các tham số khởi tạo (<code>DB_CREATE_FILE_DEST</code>, <code>DB_RECOVERY_FILE_DEST</code>, v.v.)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="data-files">Data Files</h1>
<ul>
<li>Data files là các file vật lý chứa dữ liệu của các tablespace (permanent và undo).</li>
<li>Mỗi data file thuộc về một tablespace duy nhất.</li>
<li>Có thể kích thước cố định hoặc tự động mở rộng (<code>AUTOEXTEND</code>).</li>
<li>Data file được đọc/ghi bởi background process <strong>DBWn</strong> (Database Writer).</li>
<li>Thông tin data file: <code>SELECT file_name, tablespace_name, bytes, autoextensible FROM dba_data_files;</code></li>
<li>Khi bảng hoặc index tăng trưởng, Oracle mở rộng data file nếu được cấu hình.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="control-files">Control Files</h1>
<ul>
<li>Control file là file nhị phân nhỏ, ghi lại cấu trúc của database:
<ul>
<li>Tên database, DBID.</li>
<li>Thông tin các data files, redo log files, temp files.</li>
<li>Số sequence hiện tại của redo log, checkpoint.</li>
<li>Thông tin về backup và recovery.</li>
</ul>
</li>
<li>Oracle thường có ít nhất 2 control files (multiplex) để dự phòng.</li>
<li>Xem thông tin:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> name, status, block_size, file_size_blks <span class="hljs-keyword">FROM</span> v$controlfile;
</code></pre>
<ul>
<li>Khi mất control file, database sẽ không thể mount, cần phục hồi từ backup.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="redo-log-files">Redo Log Files</h1>
<ul>
<li>Redo log file ghi lại tất cả các thay đổi của database (transaction) để phục hồi khi mất dữ liệu.</li>
<li>Gồm các <strong>redo log groups</strong> và <strong>redo log members</strong> (các file trong group).</li>
<li>Một group có ít nhất 2 members (multiplex) để an toàn.</li>
<li>Oracle ghi tuần tự vào các group, khi một group đầy sẽ chuyển sang group khác (switch).</li>
<li>Xem thông tin:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> <span class="hljs-keyword">group</span>#, sequence#, bytes, members, status <span class="hljs-keyword">FROM</span> v$log;
<span class="hljs-keyword">SELECT</span> <span class="hljs-keyword">member</span> <span class="hljs-keyword">FROM</span> v$logfile;
</code></pre>
<ul>
<li>Kịch bản: khi mất redo log, có thể mất dữ liệu; cần cấu hình archive log để phục hồi.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="temp-files">Temp Files</h1>
<ul>
<li>Temp files được sử dụng cho các vùng nhớ tạm thời (temporary tablespace).</li>
<li>Dùng cho sort, hash join, group by, index creation, temporary tables.</li>
<li>Không chứa dữ liệu lâu dài; dữ liệu sẽ được ghi đè khi instance restart.</li>
<li>Có thể được tạo thêm để mở rộng dung lượng tạm.</li>
<li>Xem thông tin:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> file_name, tablespace_name, bytes, autoextensible <span class="hljs-keyword">FROM</span> dba_temp_files;
</code></pre>
<ul>
<li>Có thể thêm tempfile:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> TABLESPACE temp <span class="hljs-keyword">ADD</span> TEMPFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/temp02.dbf&#x27;</span> SIZE <span class="hljs-number">1</span>G;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="query-c%C3%A1c-file-h%E1%BB%87-th%E1%BB%91ng">Query các file hệ thống</h1>
<ul>
<li>Sử dụng các dictionary views để xem thông tin file:
<ul>
<li><code>dba_data_files</code>: data files</li>
<li><code>dba_temp_files</code>: temp files</li>
<li><code>v$controlfile</code>: control files</li>
<li><code>v$logfile</code>: redo log members</li>
</ul>
</li>
<li>Ví dụ kết hợp:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> file_name, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> size_mb, autoextensible, maxbytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> max_mb
<span class="hljs-keyword">FROM</span> dba_data_files
<span class="hljs-keyword">WHERE</span> tablespace_name <span class="hljs-operator">=</span> <span class="hljs-string">&#x27;USERS&#x27;</span>;
</code></pre>
<ul>
<li>Xem tất cả file của database:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> <span class="hljs-string">&#x27;Datafile&#x27;</span> <span class="hljs-keyword">AS</span> type, file_name, bytes <span class="hljs-keyword">FROM</span> dba_data_files
<span class="hljs-keyword">UNION</span> <span class="hljs-keyword">ALL</span>
<span class="hljs-keyword">SELECT</span> <span class="hljs-string">&#x27;Tempfile&#x27;</span>, file_name, bytes <span class="hljs-keyword">FROM</span> dba_temp_files;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="20" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-l%C6%B0u-tr%E1%BB%AF-logic---t%E1%BB%95ng-quan">Cấu trúc lưu trữ logic - Tổng quan</h1>
<div class="columns">
<div>
<ul>
<li>Cấu trúc logic phân cấp: <strong>Database</strong> → <strong>Tablespace</strong> → <strong>Segment</strong> → <strong>Extent</strong> → <strong>Data Block</strong>.</li>
<li>Tablespace là tập hợp các data file, là đơn vị quản lý lưu trữ logic.</li>
<li>Segment là một đối tượng (bảng, index, v.v.) chiếm không gian trong tablespace.</li>
<li>Extent là tập hợp các data block liên tục được cấp cho một segment.</li>
<li>Data block là đơn vị lưu trữ nhỏ nhất (thường 8KB).</li>
</ul>
</div>
<div>
<br />
<p><img src="./images/4.6.png" alt="" style="width:600px;" /></p>
</div>
</div>
<ul>
<li>Hiểu logic giúp tối ưu lưu trữ và hiệu năng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="21" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="c%E1%BA%A5u-tr%C3%BAc-l%C6%B0u-tr%E1%BB%AF-logic">Cấu trúc lưu trữ logic</h1>
<p><img src="./images/4.8.png" alt="" style="width:1100px;" /></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="22" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="tablespace-logical">Tablespace (Logical)</h1>
<ul>
<li>Tablespace là lớp logic giữa database và data file.</li>
<li>Mỗi tablespace có thể chứa nhiều data file.</li>
<li>Các loại tablespace: <strong>Permanent</strong> (dữ liệu người dùng), <strong>Temporary</strong> (dùng tạm), <strong>Undo</strong> (lưu thông tin rollback).</li>
<li>Các tablespace hệ thống: SYSTEM (metadata), SYSAUX (các tính năng bổ sung), UNDO, TEMP.</li>
<li>Tạo tablespace mới:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> TABLESPACE ts_app DATAFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/ts_app01.dbf&#x27;</span> SIZE <span class="hljs-number">500</span>M;
</code></pre>
<ul>
<li>Xem danh sách:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, status, contents <span class="hljs-keyword">FROM</span> dba_tablespaces;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="23" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="segment">Segment</h1>
<ul>
<li>Segment là một đối tượng lưu trữ dữ liệu trong tablespace.</li>
<li>Mỗi segment thuộc về một schema và một tablespace.</li>
<li>Các loại segment: table segment, index segment, LOB segment, temporary segment, undo segment.</li>
<li>Mỗi segment bao gồm nhiều extent.</li>
<li>Xem các segment:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> owner, segment_name, segment_type, tablespace_name, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> size_mb
<span class="hljs-keyword">FROM</span> dba_segments
<span class="hljs-keyword">WHERE</span> owner <span class="hljs-operator">=</span> <span class="hljs-string">&#x27;SCOTT&#x27;</span>;
</code></pre>
<ul>
<li>Khi bảng bị drop, segment được giải phóng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="24" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="extent">Extent</h1>
<ul>
<li>Extent là một tập hợp các data block liên tục được cấp phát cho một segment.</li>
<li>Khi segment cần thêm không gian, Oracle cấp thêm một hoặc nhiều extent.</li>
<li>Kích thước extent có thể được thiết lập (uniform) hoặc tự động (autoallocate).</li>
<li>Xem thông tin extent:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> owner, segment_name, extent_id, file_id, block_id, blocks
<span class="hljs-keyword">FROM</span> dba_extents
<span class="hljs-keyword">WHERE</span> owner <span class="hljs-operator">=</span> <span class="hljs-string">&#x27;SCOTT&#x27;</span> <span class="hljs-keyword">AND</span> segment_name <span class="hljs-operator">=</span> <span class="hljs-string">&#x27;EMP&#x27;</span>;
</code></pre>
<ul>
<li>Quản lý extent giúp kiểm soát phân mảnh và hiệu năng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="25" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="data-block">Data Block</h1>
<ul>
<li>Data block là đơn vị I/O nhỏ nhất của Oracle, kích thước mặc định 8KB (có thể 2KB, 4KB, 16KB, 32KB).</li>
<li>Cấu trúc một block: header (thông tin block), table directory, row directory, free space, row data.</li>
<li>Các tham số điều khiển: PCTFREE (dành không gian trống để cập nhật), PCTUSED (ngưỡng để block được chèn lại).</li>
<li>Xem kích thước block:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> <span class="hljs-keyword">value</span> <span class="hljs-keyword">FROM</span> v$<span class="hljs-keyword">parameter</span> <span class="hljs-keyword">WHERE</span> name <span class="hljs-operator">=</span> <span class="hljs-string">&#x27;db_block_size&#x27;</span>;
</code></pre>
<ul>
<li>Hiệu năng ảnh hưởng bởi kích thước block: block lớn phù hợp cho bảng lớn, OLAP; block nhỏ phù hợp OLTP.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="26" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-tablespace-v%C3%A0-l%C6%B0u-tr%E1%BB%AF">Quản trị Tablespace và lưu trữ</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="27" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="tablespace---t%E1%BB%95ng-quan">Tablespace - Tổng quan</h1>
<div class="columns">
<div>
<ul>
<li>Tablespace là đơn vị lưu trữ logic, chứa các đối tượng của database.</li>
<li>Mỗi database có ít nhất SYSTEM và SYSAUX tablespace.</li>
<li>Các loại tablespace: Permanent (chứa dữ liệu), Temporary (chứa dữ liệu tạm), Undo (chứa thông tin rollback).</li>
</ul>
</div>
<div>
<p><img src="./images/4.9.png" alt="" style="width:600px;" /></p>
</div>
</div>
<ul>
<li>Tablespace có thể được tạo, thay đổi, xóa, chuyển trạng thái (online/offline, read-only/read-write).</li>
<li>Quản lý dung lượng: thêm datafile, resize, autoextend.</li>
<li>Oracle Managed Files (OMF) tự động quản lý file.</li>
<li>Bigfile tablespace giúp quản lý tablespace rất lớn chỉ với một datafile.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="28" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="t%E1%BA%A1o-tablespace---permanent">Tạo Tablespace - Permanent</h1>
<ul>
<li>Permanent tablespace lưu trữ dữ liệu bảng, index, v.v.</li>
<li>Cú pháp:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> TABLESPACE ts_permanent
  DATAFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/ts_perm01.dbf&#x27;</span> SIZE <span class="hljs-number">100</span>M
  AUTOEXTEND <span class="hljs-keyword">ON</span> NEXT <span class="hljs-number">10</span>M MAXSIZE <span class="hljs-number">500</span>M
  EXTENT MANAGEMENT <span class="hljs-keyword">LOCAL</span>
  SEGMENT SPACE MANAGEMENT AUTO;
</code></pre>
<div class="columns">
<div>
<ul>
<li>Các tùy chọn:
<ul>
<li><code>DATAFILE</code>: file vật lý.</li>
<li><code>AUTOEXTEND</code>: tự động mở rộng khi đầy.</li>
</ul>
</li>
</ul>
</div>
<div>
<ul>
<ul>
<li><code>EXTENT MANAGEMENT LOCAL</code>: quản lý extent bằng bitmap (hiệu quả).</li>
<li><code>SEGMENT SPACE MANAGEMENT AUTO</code>: quản lý không gian segment tự động (ASSM).</li>
</ul>
</ul>
</div>
</div>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Kiểm tra</span>
<span class="hljs-keyword">SELECT</span> tablespace_name, status, contents <span class="hljs-keyword">FROM</span> dba_tablespaces;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="29" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="t%E1%BA%A1o-tablespace---temporary">Tạo Tablespace - Temporary</h1>
<ul>
<li>Temporary tablespace dùng cho các thao tác sort, join, group by.</li>
<li>Không lưu trữ dữ liệu vĩnh viễn.</li>
<li>Cú pháp:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> TEMPORARY TABLESPACE ts_temp
  TEMPFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/temp_ts01.dbf&#x27;</span> SIZE <span class="hljs-number">200</span>M
  AUTOEXTEND <span class="hljs-keyword">ON</span> NEXT <span class="hljs-number">50</span>M MAXSIZE <span class="hljs-number">1</span>G
  EXTENT MANAGEMENT <span class="hljs-keyword">LOCAL</span> UNIFORM SIZE <span class="hljs-number">1</span>M;
</code></pre>
<ul>
<li><code>UNIFORM SIZE</code> giúp kiểm soát kích thước extent đồng đều.</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Gán temporary tablespace cho user</span>
<span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> scott TEMPORARY TABLESPACE ts_temp;

<span class="hljs-comment">-- Xem temp tablespace</span>
<span class="hljs-keyword">SELECT</span> tablespace_name, status, contents <span class="hljs-keyword">FROM</span> dba_tablespaces <span class="hljs-keyword">WHERE</span> contents<span class="hljs-operator">=</span><span class="hljs-string">&#x27;TEMPORARY&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="30" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="t%E1%BA%A1o-tablespace---undo">Tạo Tablespace - Undo</h1>
<ul>
<li>Undo tablespace lưu thông tin rollback, hỗ trợ phục hồi transaction, read consistency.</li>
<li>Mỗi database có một undo tablespace hoạt động.</li>
<li>Cú pháp:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> UNDO TABLESPACE ts_undo
  DATAFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/undo_ts01.dbf&#x27;</span> SIZE <span class="hljs-number">500</span>M
  AUTOEXTEND <span class="hljs-keyword">ON</span> NEXT <span class="hljs-number">100</span>M MAXSIZE <span class="hljs-number">2</span>G;
</code></pre>
<ul>
<li>Cấu hình undo tham số: <code>UNDO_TABLESPACE = ts_undo</code>, <code>UNDO_RETENTION</code> (thời gian giữ thông tin).</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-comment">-- Xem undo</span>
<span class="hljs-keyword">SELECT</span> tablespace_name, status <span class="hljs-keyword">FROM</span> dba_tablespaces <span class="hljs-keyword">WHERE</span> contents<span class="hljs-operator">=</span><span class="hljs-string">&#x27;UNDO&#x27;</span>;

<span class="hljs-comment">-- Chuyển đổi undo tablespace</span>
<span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">SYSTEM</span> <span class="hljs-keyword">SET</span> UNDO_TABLESPACE <span class="hljs-operator">=</span> ts_undo2;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="31" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="oracle-managed-files-omf---kh%C3%A1i-ni%E1%BB%87m">Oracle Managed Files (OMF) - Khái niệm</h1>
<ul>
<li>OMF tự động tạo và quản lý các file của database (datafiles, tempfiles, control files, redo log files).</li>
<li>Khi tạo tablespace, không cần chỉ định tên file, Oracle tự tạo file với tên duy nhất.</li>
<li>OMF giúp giảm công sức quản trị, tránh lỗi cấu hình.</li>
<li>Kích hoạt bằng cách thiết lập các tham số:
<ul>
<li><code>DB_CREATE_FILE_DEST</code>: thư mục cho data/temp files.</li>
<li><code>DB_CREATE_ONLINE_LOG_DEST_n</code>: cho redo log và control files.</li>
<li><code>DB_RECOVERY_FILE_DEST</code>: cho flash recovery area.</li>
</ul>
</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="32" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="k%C3%ADch-ho%E1%BA%A1t-omf-v%C3%A0-t%E1%BA%A1o-tablespace-v%E1%BB%9Bi-omf">Kích hoạt OMF và tạo Tablespace với OMF</h1>
<ul>
<li>Kích hoạt OMF (cần quyền sysdba):</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">SYSTEM</span> <span class="hljs-keyword">SET</span> DB_CREATE_FILE_DEST <span class="hljs-operator">=</span> <span class="hljs-string">&#x27;/u01/app/oracle/oradata/&#x27;</span>;
</code></pre>
<ul>
<li>Tạo tablespace permanent với OMF:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> TABLESPACE ts_omf DATAFILE SIZE <span class="hljs-number">100</span>M AUTOEXTEND <span class="hljs-keyword">ON</span> NEXT <span class="hljs-number">10</span>M MAXSIZE <span class="hljs-number">500</span>M;
</code></pre>
<ul>
<li>Tên file sẽ được sinh tự động theo định dạng: <code>ORA$&lt;sid&gt;_TS_&lt;tablespace&gt;_&lt;UUID&gt;.dbf</code>.</li>
<li>Tạo temp tablespace với OMF:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> TEMPORARY TABLESPACE ts_temp_omf TEMPFILE SIZE <span class="hljs-number">50</span>M;
</code></pre>
<ul>
<li>Kiểm tra file:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> file_name <span class="hljs-keyword">FROM</span> dba_data_files <span class="hljs-keyword">WHERE</span> tablespace_name<span class="hljs-operator">=</span><span class="hljs-string">&#x27;TS_OMF&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="33" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="bigfile-tablespace---kh%C3%A1i-ni%E1%BB%87m">Bigfile Tablespace - Khái niệm</h1>
<div class="columns">
<div>
<ul>
<li>Bigfile tablespace chỉ có một data file (hoặc temp file) nhưng có thể rất lớn (lên tới 128TB với block size 8KB, 32TB với 4KB, v.v.).</li>
<li>Giúp quản lý tablespace lớn dễ dàng hơn (ít file hơn).</li>
<li>Hỗ trợ ASSM (Automatic Segment Space Management).</li>
</ul>
</div>
<div>
<p><img src="./images/4.10.png" alt="" style="width:500px;" /></p>
</div>
</div>
<ul>
<li>Thường dùng cho các tablespace lớn như SYSTEM, SYSAUX, hoặc dữ liệu lớn.</li>
<li>Không dùng cho undo và temporary? (Có thể dùng cho temporary, nhưng không khuyến nghị cho undo).</li>
<li>Xem tham số: <code>DB_BIGFILE_TABLESPACE</code> (mặc định FALSE).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="khi-n%C3%A0o-s%E1%BB%AD-d%E1%BB%A5ng-bigfile-tablespace">Khi nào sử dụng Bigfile Tablespace</h1>
<ul>
<li>Thích hợp với:
<ul>
<li>Tablespace có dung lượng rất lớn (hàng TB).</li>
<li>Các ứng dụng data warehouse (OLAP) với dữ liệu lịch sử.</li>
<li>Hệ thống sử dụng ASM (Automatic Storage Management) để quản lý storage.</li>
</ul>
</li>
<li>Không nên dùng khi có nhiều file nhỏ để tối ưu I/O phân tán.</li>
<li>Bigfile giảm số lượng datafiles, đơn giản hóa quản lý.</li>
<li>Tuy nhiên, nếu file bị lỗi, toàn bộ tablespace bị ảnh hưởng (do chỉ có một file).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="35" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="t%E1%BA%A1o-bigfile-tablespace">Tạo Bigfile Tablespace</h1>
<ul>
<li>Sử dụng từ khóa <code>BIGFILE</code> trong câu lệnh:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> BIGFILE TABLESPACE ts_big
  DATAFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/ts_big.dbf&#x27;</span> SIZE <span class="hljs-number">10</span>G
  AUTOEXTEND <span class="hljs-keyword">ON</span> NEXT <span class="hljs-number">1</span>G MAXSIZE <span class="hljs-number">32</span>T;
</code></pre>
<ul>
<li>Hoặc đặt mặc định cho toàn bộ hệ thống:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> DATABASE <span class="hljs-keyword">SET</span> <span class="hljs-keyword">DEFAULT</span> BIGFILE TABLESPACE;
</code></pre>
<ul>
<li>Khi đó mọi tablespace mới sẽ là bigfile.</li>
<li>Kiểm tra:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, bigfile <span class="hljs-keyword">FROM</span> dba_tablespaces;
</code></pre>
<ul>
<li>Chuyển đổi từ bigfile sang smallfile? Không thể trực tiếp, phải tạo mới và di chuyển dữ liệu.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-l%C3%BD-tablespace---datafile">Quản lý Tablespace - Datafile</h1>
<ul>
<li>Thêm datafile vào tablespace:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> TABLESPACE ts_app <span class="hljs-keyword">ADD</span> DATAFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/ts_app02.dbf&#x27;</span> SIZE <span class="hljs-number">500</span>M;
</code></pre>
<ul>
<li>Thay đổi kích thước (resize):</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> DATABASE DATAFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/ts_app01.dbf&#x27;</span> RESIZE <span class="hljs-number">800</span>M;
</code></pre>
<ul>
<li>Kích hoạt autoextend:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> DATABASE DATAFILE <span class="hljs-string">&#x27;/u01/app/oracle/oradata/ts_app01.dbf&#x27;</span> AUTOEXTEND <span class="hljs-keyword">ON</span> NEXT <span class="hljs-number">50</span>M MAXSIZE <span class="hljs-number">2</span>G;
</code></pre>
<ul>
<li>Tắt autoextend:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> DATABASE DATAFILE <span class="hljs-string">&#x27;...&#x27;</span> AUTOEXTEND OFF;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-l%C3%BD-tablespace---offlineonline">Quản lý Tablespace - Offline/Online</h1>
<ul>
<li>Đưa tablespace offline (không truy cập được):</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> TABLESPACE ts_app OFFLINE;
</code></pre>
<ul>
<li>Có thể dùng <code>OFFLINE NORMAL</code> (checkpoint) hoặc <code>OFFLINE IMMEDIATE</code> (không checkpoint).</li>
<li>Đưa online trở lại:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> TABLESPACE ts_app ONLINE;
</code></pre>
<ul>
<li>Lưu ý: SYSTEM và SYSAUX không thể offline.</li>
<li>Tablespace offline sẽ không thể truy cập dữ liệu cho đến khi online.</li>
<li>Kiểm tra trạng thái:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, status <span class="hljs-keyword">FROM</span> dba_tablespaces;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-l%C3%BD-tablespace---read-only--read-write">Quản lý Tablespace - Read Only / Read Write</h1>
<ul>
<li>Chuyển tablespace sang chỉ đọc (read-only):</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> TABLESPACE ts_app READ <span class="hljs-keyword">ONLY</span>;
</code></pre>
<ul>
<li>Không thể thực hiện DML trên dữ liệu trong tablespace read-only.</li>
<li>Chuyển sang read-write:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> TABLESPACE ts_app READ WRITE;
</code></pre>
<ul>
<li>Sử dụng khi cần bảo vệ dữ liệu lịch sử khỏi thay đổi.</li>
<li>Có thể di chuyển dữ liệu từ tablespace read-only sang khác.</li>
<li>Xem trạng thái:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, status <span class="hljs-keyword">FROM</span> dba_tablespaces;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-l%C3%BD-tablespace---drop-tablespace">Quản lý Tablespace - Drop Tablespace</h1>
<ul>
<li>Xóa tablespace và các file vật lý:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DROP</span> TABLESPACE ts_app INCLUDING CONTENTS <span class="hljs-keyword">AND</span> DATAFILES;
</code></pre>
<ul>
<li>Tùy chọn <code>INCLUDING CONTENTS</code> xóa các segment bên trong.</li>
<li><code>AND DATAFILES</code> xóa luôn các datafile trên đĩa.</li>
<li>Nếu không dùng <code>AND DATAFILES</code>, các datafile vẫn tồn tại và cần xóa thủ công.</li>
<li>Cần có quyền DROP TABLESPACE.</li>
<li>Không thể drop SYSTEM, SYSAUX, hoặc UNDO đang hoạt động.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="gi%C3%A1m-s%C3%A1t-tablespace---xem-th%C3%B4ng-tin">Giám sát Tablespace - Xem thông tin</h1>
<ul>
<li>Xem danh sách tablespace:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, status, contents, bigfile <span class="hljs-keyword">FROM</span> dba_tablespaces;
</code></pre>
<ul>
<li>Xem thông tin datafile:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> file_id, file_name, tablespace_name, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> size_mb, autoextensible, maxbytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> max_mb
<span class="hljs-keyword">FROM</span> dba_data_files
<span class="hljs-keyword">ORDER</span> <span class="hljs-keyword">BY</span> tablespace_name;
</code></pre>
<ul>
<li>Xem dung lượng sử dụng và còn trống:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, <span class="hljs-built_in">sum</span>(bytes)<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> total_mb,
       <span class="hljs-built_in">sum</span>(maxbytes)<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> max_mb
<span class="hljs-keyword">FROM</span> dba_data_files
<span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> tablespace_name;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="41" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="gi%C3%A1m-s%C3%A1t-tablespace---dung-l%C6%B0%E1%BB%A3ng-c%C3%B2n-tr%E1%BB%91ng">Giám sát Tablespace - Dung lượng còn trống</h1>
<ul>
<li>Xem dung lượng trống trong mỗi tablespace:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name,
       <span class="hljs-built_in">sum</span>(bytes)<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> free_mb
<span class="hljs-keyword">FROM</span> dba_free_space
<span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> tablespace_name;
</code></pre>
<ul>
<li>Kết hợp để tính tỷ lệ sử dụng:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> df.tablespace_name,
       df.total_mb,
       nvl(fs.free_mb,<span class="hljs-number">0</span>) <span class="hljs-keyword">AS</span> free_mb,
       df.total_mb <span class="hljs-operator">-</span> nvl(fs.free_mb,<span class="hljs-number">0</span>) <span class="hljs-keyword">AS</span> used_mb,
       round((df.total_mb <span class="hljs-operator">-</span> nvl(fs.free_mb,<span class="hljs-number">0</span>))<span class="hljs-operator">*</span><span class="hljs-number">100</span><span class="hljs-operator">/</span>df.total_mb,<span class="hljs-number">2</span>) <span class="hljs-keyword">AS</span> pct_used
<span class="hljs-keyword">FROM</span> (<span class="hljs-keyword">SELECT</span> tablespace_name, <span class="hljs-built_in">sum</span>(bytes)<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> total_mb <span class="hljs-keyword">FROM</span> dba_data_files <span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> tablespace_name) df
<span class="hljs-keyword">LEFT</span> <span class="hljs-keyword">JOIN</span> (<span class="hljs-keyword">SELECT</span> tablespace_name, <span class="hljs-built_in">sum</span>(bytes)<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> free_mb <span class="hljs-keyword">FROM</span> dba_free_space <span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> tablespace_name) fs
<span class="hljs-keyword">ON</span> df.tablespace_name <span class="hljs-operator">=</span> fs.tablespace_name
<span class="hljs-keyword">ORDER</span> <span class="hljs-keyword">BY</span> pct_used <span class="hljs-keyword">DESC</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="42" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="tablespace-v%C3%A0-user---default-v%C3%A0-temporary">Tablespace và User - Default và Temporary</h1>
<ul>
<li>Mỗi user có default tablespace (nơi tạo các đối tượng mới) và temporary tablespace.</li>
<li>Khi tạo user:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">USER</span> app_user IDENTIFIED <span class="hljs-keyword">BY</span> password
  <span class="hljs-keyword">DEFAULT</span> TABLESPACE ts_app
  TEMPORARY TABLESPACE ts_temp
  QUOTA UNLIMITED <span class="hljs-keyword">ON</span> ts_app
  QUOTA <span class="hljs-number">1</span>G <span class="hljs-keyword">ON</span> ts_data;
</code></pre>
<ul>
<li>Thay đổi default/temporary:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user <span class="hljs-keyword">DEFAULT</span> TABLESPACE ts_new;
<span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user TEMPORARY TABLESPACE ts_temp_new;
</code></pre>
<ul>
<li>Nếu không chỉ định, mặc định là <code>USERS</code> và <code>TEMP</code>.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="43" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="tablespace-quota">Tablespace Quota</h1>
<ul>
<li>Quota là giới hạn dung lượng mà user có thể sử dụng trong một tablespace.</li>
<li>Có thể thiết lập khi tạo user hoặc sau:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user QUOTA <span class="hljs-number">500</span>M <span class="hljs-keyword">ON</span> ts_app;
<span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user QUOTA UNLIMITED <span class="hljs-keyword">ON</span> ts_data;
</code></pre>
<ul>
<li>Nếu không có quota trên tablespace, user không thể tạo đối tượng trong đó.</li>
<li>Xem quota:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> username, tablespace_name, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> quota_mb, max_bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> max_mb
<span class="hljs-keyword">FROM</span> dba_ts_quotas
<span class="hljs-keyword">WHERE</span> username<span class="hljs-operator">=</span><span class="hljs-string">&#x27;APP_USER&#x27;</span>;
</code></pre>
<ul>
<li>Quota quan trọng để kiểm soát tài nguyên.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="44" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="best-practices---tablespace">Best Practices - Tablespace</h1>
<ul>
<li>Phân tách dữ liệu và index vào các tablespace riêng để tối ưu I/O.</li>
<li>Sử dụng tablespace riêng cho các ứng dụng lớn.</li>
<li>Cấu hình autoextend với maxsize giới hạn để tránh tràn đĩa.</li>
<li>Theo dõi dung lượng thường xuyên, cảnh báo khi sử dụng trên 80%.</li>
<li>Sử dụng OMF để đơn giản hóa quản lý file.</li>
<li>Bigfile tablespace chỉ khi thực sự cần.</li>
<li>Đảm bảo có ít nhất một temporary tablespace cho mỗi database.</li>
<li>Backup thường xuyên các tablespace.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="45" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="schema-v%C3%A0-c%C3%A1c-%C4%91%E1%BB%91i-t%C6%B0%E1%BB%A3ng-trong-schema">Schema và các đối tượng trong Schema</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="46" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="schema-v%C3%A0-c%C3%A1c-%C4%91%E1%BB%91i-t%C6%B0%E1%BB%A3ng---t%E1%BB%95ng-quan">Schema và các đối tượng - Tổng quan</h1>
<ul>
<li>Schema là tập hợp các đối tượng thuộc về một user.</li>
<li>Mỗi user có một schema cùng tên.</li>
<li>Các đối tượng: Table, View, Index, Procedure, Function, Package, Trigger, Sequence, Synonym, Database Link, Type, v.v.</li>
<li>Quản trị các đối tượng bao gồm tạo, sửa đổi, xóa, di chuyển.</li>
<li>Hiểu rõ từng loại đối tượng giúp thiết kế và tối ưu cơ sở dữ liệu.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="47" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="schema---kh%C3%A1i-ni%E1%BB%87m">Schema - Khái niệm</h1>
<ul>
<li>Schema là một tập hợp các đối tượng cơ sở dữ liệu (bảng, view, index, v.v.) thuộc về một user cụ thể.</li>
<li>Khi tạo user, schema được tạo tự động.</li>
<li>Mỗi đối tượng trong schema có thể được truy cập bằng tên đầy đủ: <code>schema.object</code>.</li>
<li>Schema giúp tổ chức và bảo mật dữ liệu.</li>
<li>Một user có thể truy cập các đối tượng trong schema khác nếu được cấp quyền.</li>
<li>Xem schemas:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> username <span class="hljs-keyword">FROM</span> dba_users <span class="hljs-keyword">ORDER</span> <span class="hljs-keyword">BY</span> username;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="48" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="user-v%C3%A0-schema---m%E1%BB%91i-quan-h%E1%BB%87">User và Schema - Mối quan hệ</h1>
<ul>
<li>User và schema có mối quan hệ 1-1.</li>
<li>User là tài khoản đăng nhập, schema là tập đối tượng.</li>
<li>Khi user tạo bảng, bảng thuộc về schema của user đó.</li>
<li>Có thể có user nhưng không có đối tượng (schema rỗng).</li>
<li>Khi xóa user, schema và các đối tượng bị xóa (nếu dùng CASCADE).</li>
<li>Một số user hệ thống như SYS (schema SYS chứa data dictionary), SYSTEM (schema SYSTEM chứa các bảng quản trị).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="49" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="c%C3%A1c-nh%C3%B3m-schema-objects---l%C6%B0u-tr%E1%BB%AF">Các nhóm Schema Objects - Lưu trữ</h1>
<ul>
<li><strong>Table</strong>: lưu trữ dữ liệu theo hàng và cột. Gồm bảng vĩnh viễn, temporary table.</li>
<li><strong>View</strong>: là câu lệnh SQL được lưu, không chứa dữ liệu vật lý.</li>
<li><strong>Materialized View</strong>: giống view nhưng lưu dữ liệu vật lý, có thể refresh.</li>
<li><strong>Index</strong>: cấu trúc tăng tốc truy vấn (B-tree, Bitmap, Function-based).</li>
<li><strong>Cluster</strong>: nhóm các bảng có cùng cột chia sẻ để tối ưu truy cập.</li>
<li>Mỗi đối tượng có các thuộc tính riêng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="50" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="c%C3%A1c-nh%C3%B3m-schema-objects---l%E1%BA%ADp-tr%C3%ACnh">Các nhóm Schema Objects - Lập trình</h1>
<ul>
<li><strong>Procedure</strong>: chương trình con thực hiện một tác vụ, không trả về giá trị.</li>
<li><strong>Function</strong>: chương trình con trả về giá trị (thường là scalar).</li>
<li><strong>Package</strong>: nhóm các procedure, function, biến thành một đơn vị.</li>
<li><strong>Trigger</strong>: đoạn PL/SQL tự động thực thi khi một sự kiện xảy ra (INSERT, UPDATE, DELETE, hoặc DDL).</li>
<li>Các đối tượng này giúp đóng gói logic nghiệp vụ và tự động hóa.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="51" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="c%C3%A1c-nh%C3%B3m-schema-objects---h%E1%BB%97-tr%E1%BB%A3">Các nhóm Schema Objects - Hỗ trợ</h1>
<ul>
<li><strong>Sequence</strong>: sinh ra dãy số tăng dần (dùng cho khóa chính).</li>
<li><strong>Synonym</strong>: bí danh (alias) cho đối tượng, có thể public hoặc private.</li>
<li><strong>Type</strong>: kiểu dữ liệu do người dùng định nghĩa (object type, collection).</li>
<li><strong>Database Link</strong>: kết nối đến một database khác để truy cập đối tượng từ xa.</li>
<li>Các đối tượng này hỗ trợ linh hoạt truy cập và lập trình.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="52" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-table---t%E1%BA%A1o-b%E1%BA%A3ng-trong-tablespace">Quản trị Table - Tạo bảng trong Tablespace</h1>
<ul>
<li>Tạo bảng cơ bản:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE TABLE</span> employees (
  emp_id NUMBER(<span class="hljs-number">6</span>) <span class="hljs-keyword">PRIMARY KEY</span>,
  name VARCHAR2(<span class="hljs-number">100</span>) <span class="hljs-keyword">NOT NULL</span>,
  hire_date <span class="hljs-type">DATE</span> <span class="hljs-keyword">DEFAULT</span> SYSDATE,
  salary NUMBER(<span class="hljs-number">8</span>,<span class="hljs-number">2</span>)
)
TABLESPACE ts_app;
</code></pre>
<ul>
<li>Có thể chỉ định storage (initial, next, pctfree, pctused).</li>
<li>Nếu không chỉ định tablespace, bảng được tạo trong default tablespace của user.</li>
<li>Kiểm tra bảng:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> owner, table_name, tablespace_name <span class="hljs-keyword">FROM</span> dba_tables <span class="hljs-keyword">WHERE</span> owner<span class="hljs-operator">=</span><span class="hljs-string">&#x27;APP_USER&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="53" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-table---di-chuy%E1%BB%83n-b%E1%BA%A3ng">Quản trị Table - Di chuyển bảng</h1>
<ul>
<li>Di chuyển bảng sang tablespace khác:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER TABLE</span> employees MOVE TABLESPACE ts_data;
</code></pre>
<ul>
<li>Khi di chuyển, các index trở nên unusable, cần rebuild lại.</li>
<li>Di chuyển với tùy chọn để update indexes:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER TABLE</span> employees MOVE TABLESPACE ts_data <span class="hljs-keyword">UPDATE</span> INDEXES;
</code></pre>
<ul>
<li>Di chuyển bảng lớn sẽ ảnh hưởng đến hiệu năng, nên thực hiện trong thời gian ít tải.</li>
<li>Kiểm tra sau di chuyển:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name <span class="hljs-keyword">FROM</span> dba_tables <span class="hljs-keyword">WHERE</span> owner<span class="hljs-operator">=</span><span class="hljs-string">&#x27;APP_USER&#x27;</span> <span class="hljs-keyword">AND</span> table_name<span class="hljs-operator">=</span><span class="hljs-string">&#x27;EMPLOYEES&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="54" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-index---c%C3%A1c-lo%E1%BA%A1i-index">Quản trị Index - Các loại Index</h1>
<ul>
<li><strong>B-tree index</strong>: mặc định, thích hợp cho khóa chính, dữ liệu có tính chọn lọc cao.</li>
<li><strong>Bitmap index</strong>: thích hợp cho các cột có ít giá trị phân biệt (gender, status).</li>
<li><strong>Function-based index</strong>: index trên biểu thức (ví dụ UPPER(name)).</li>
<li>Tạo B-tree:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> INDEX idx_emp_name <span class="hljs-keyword">ON</span> employees(name) TABLESPACE ts_idx;
</code></pre>
<ul>
<li>Tạo bitmap:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> BITMAP INDEX idx_emp_status <span class="hljs-keyword">ON</span> employees(status) TABLESPACE ts_idx;
</code></pre>
<ul>
<li>Tạo function-based:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> INDEX idx_emp_upper_name <span class="hljs-keyword">ON</span> employees(<span class="hljs-built_in">UPPER</span>(name));
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="55" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-index---qu%E1%BA%A3n-l%C3%BD-v%C3%A0-x%C3%B3a">Quản trị Index - Quản lý và Xóa</h1>
<ul>
<li>Kiểm tra index:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> index_name, table_name, uniqueness, status <span class="hljs-keyword">FROM</span> dba_indexes <span class="hljs-keyword">WHERE</span> owner<span class="hljs-operator">=</span><span class="hljs-string">&#x27;APP_USER&#x27;</span>;
</code></pre>
<ul>
<li>Rebuild index (sau khi di chuyển bảng hoặc để giảm phân mảnh):</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> INDEX idx_emp_name REBUILD TABLESPACE ts_idx;
</code></pre>
<ul>
<li>Xóa index:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DROP</span> INDEX idx_emp_name;
</code></pre>
<ul>
<li>Nên có chiến lược rebuild định kỳ hoặc khi cần.</li>
<li>Sử dụng <code>MONITORING USAGE</code> để kiểm tra index có được sử dụng không:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> INDEX idx_emp_name MONITORING USAGE;
<span class="hljs-comment">-- sau đó kiểm tra v$object_usage</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="56" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-view---simple-v%C3%A0-complex">Quản trị View - Simple và Complex</h1>
<ul>
<li><strong>Simple View</strong>: dựa trên một bảng, không có hàm nhóm, không có join phức tạp; có thể DML trên view (với điều kiện).</li>
<li><strong>Complex View</strong>: dựa trên nhiều bảng, có group by, join, hàm; thường chỉ đọc.</li>
<li>Tạo simple view:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">VIEW</span> emp_view <span class="hljs-keyword">AS</span> <span class="hljs-keyword">SELECT</span> emp_id, name, salary <span class="hljs-keyword">FROM</span> employees <span class="hljs-keyword">WHERE</span> department_id<span class="hljs-operator">=</span><span class="hljs-number">10</span>;
</code></pre>
<ul>
<li>Tạo complex view:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">VIEW</span> dept_salary <span class="hljs-keyword">AS</span>
<span class="hljs-keyword">SELECT</span> d.dept_name, <span class="hljs-built_in">avg</span>(e.salary) avg_sal
<span class="hljs-keyword">FROM</span> departments d <span class="hljs-keyword">JOIN</span> employees e <span class="hljs-keyword">ON</span> d.dept_id<span class="hljs-operator">=</span>e.dept_id
<span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> d.dept_name;
</code></pre>
<ul>
<li>Xem view:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> view_name, text <span class="hljs-keyword">FROM</span> dba_views <span class="hljs-keyword">WHERE</span> owner<span class="hljs-operator">=</span><span class="hljs-string">&#x27;APP_USER&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="57" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-materialized-view">Quản trị Materialized View</h1>
<ul>
<li>Materialized view lưu dữ liệu vật lý, giúp tăng hiệu năng truy vấn cho dữ liệu tổng hợp.</li>
<li>Có thể refresh theo schedule hoặc thủ công.</li>
<li>Tạo:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> MATERIALIZED <span class="hljs-keyword">VIEW</span> mv_sales_summary
BUILD IMMEDIATE
REFRESH COMPLETE <span class="hljs-keyword">ON</span> DEMAND
<span class="hljs-keyword">AS</span> <span class="hljs-keyword">SELECT</span> product_id, <span class="hljs-built_in">sum</span>(sales) total_sales <span class="hljs-keyword">FROM</span> sales <span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> product_id;
</code></pre>
<ul>
<li>Refresh thủ công:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">EXEC</span> DBMS_MVIEW.REFRESH(<span class="hljs-string">&#x27;MV_SALES_SUMMARY&#x27;</span>, <span class="hljs-string">&#x27;C&#x27;</span>);
</code></pre>
<ul>
<li>Xem thông tin:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> mview_name, refresh_mode, last_refresh_date <span class="hljs-keyword">FROM</span> dba_mviews;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="58" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-sequence">Quản trị Sequence</h1>
<ul>
<li>Sequence sinh dãy số tăng dần (hoặc giảm dần) để tạo giá trị duy nhất.</li>
</ul>
<div class="columns">
<div>
<ul>
<li>Tạo:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> SEQUENCE seq_emp
  <span class="hljs-keyword">START</span> <span class="hljs-keyword">WITH</span> <span class="hljs-number">1000</span>
  INCREMENT <span class="hljs-keyword">BY</span> <span class="hljs-number">1</span>
  MAXVALUE <span class="hljs-number">999999</span>
  NOCYCLE
  CACHE <span class="hljs-number">20</span>;
</code></pre>
</div>
<div class="col-2">
<ul>
<li>Thay đổi:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> SEQUENCE seq_emp INCREMENT <span class="hljs-keyword">BY</span> <span class="hljs-number">10</span> MAXVALUE <span class="hljs-number">9999999</span>;
</code></pre>
<ul>
<li>Xóa:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DROP</span> SEQUENCE seq_emp;
</code></pre>
</div>
</div>
<ul>
<li>Sử dụng NEXTVAL và CURRVAL:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">INSERT INTO</span> employees(emp_id, name) <span class="hljs-keyword">VALUES</span>(seq_emp.NEXTVAL, <span class="hljs-string">&#x27;John&#x27;</span>);
<span class="hljs-keyword">SELECT</span> seq_emp.CURRVAL <span class="hljs-keyword">FROM</span> dual;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="59" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="synonym---kh%C3%A1i-ni%E1%BB%87m-v%C3%A0-qu%E1%BA%A3n-tr%E1%BB%8B">Synonym - Khái niệm và Quản trị</h1>
<ul>
<li>Synonym là bí danh (alias) cho một đối tượng (bảng, view, sequence, procedure, v.v.).</li>
<li><strong>Private synonym</strong>: thuộc về một schema, chỉ user đó truy cập.</li>
<li><strong>Public synonym</strong>: truy cập được bởi tất cả người dùng.</li>
</ul>
<div class="columns">
<div class="col-3">
<ul>
<li>Tạo private:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> SYNONYM emp <span class="hljs-keyword">FOR</span> employees;
</code></pre>
<ul>
<li>Tạo public:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> PUBLIC SYNONYM emp <span class="hljs-keyword">FOR</span> app_user.employees;
</code></pre>
</div>
<div class="col-2">
<ul>
<li>Truy vấn qua synonym:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> <span class="hljs-operator">*</span> <span class="hljs-keyword">FROM</span> emp;
</code></pre>
<ul>
<li>Xóa synonym:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DROP</span> SYNONYM emp;
<span class="hljs-keyword">DROP</span> PUBLIC SYNONYM emp;
</code></pre>
</div>
</div>
<ul>
<li>Xem:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> synonym_name, owner, table_owner, table_name <span class="hljs-keyword">FROM</span> dba_synonyms;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="60" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="data-dictionary">Data Dictionary</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="61" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="data-dictionary-v%C3%A0-dynamic-performance-views">Data Dictionary và Dynamic Performance Views</h1>
<ul>
<li><strong>Data Dictionary</strong>: tập các bảng và view do Oracle tạo, lưu metadata về database (cấu trúc, user, tablespace, v.v.).</li>
<li><strong>Dynamic Performance Views (V$)</strong>: view dựa trên cấu trúc bộ nhớ và trạng thái hệ thống, cung cấp thông tin real-time.</li>
<li>Các loại view: USER* (đối tượng của user), ALL* (đối tượng user có quyền truy cập), DBA* (tất cả), CDB* (trong CDB).</li>
<li>Sử dụng data dictionary để giám sát, bảo trì, và khai thác thông tin.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="62" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="data-dictionary---kh%C3%A1i-ni%E1%BB%87m-v%C3%A0-vai-tr%C3%B2">Data Dictionary - Khái niệm và Vai trò</h1>
<ul>
<li>Data dictionary là nơi lưu trữ thông tin về tất cả đối tượng trong database.</li>
<li>Được tự động cập nhật khi có DDL (CREATE, ALTER, DROP).</li>
<li>Vai trò:
<ul>
<li>Cung cấp thông tin cho Oracle optimizer.</li>
<li>Hỗ trợ quản trị viên và người dùng tra cứu cấu trúc.</li>
<li>Đảm bảo tính toàn vẹn dữ liệu.</li>
</ul>
</li>
<li>Các view cơ bản: <code>DBA_OBJECTS</code>, <code>DBA_TABLES</code>, <code>DBA_USERS</code>, v.v.</li>
<li>Các view thường có prefix <code>USER_</code>, <code>ALL_</code>, <code>DBA_</code>, <code>CDB_</code>.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="63" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="c%C3%A1c-nh%C3%B3m-data-dictionary">Các nhóm Data Dictionary</h1>
<ul>
<li><strong>USER_</strong>: chỉ các đối tượng thuộc về user hiện tại.</li>
<li><strong>ALL_</strong>: các đối tượng mà user hiện tại có quyền truy cập (bao gồm cả của người khác).</li>
<li><strong>DBA_</strong>: tất cả các đối tượng trong toàn database (cần quyền DBA).</li>
<li><strong>CDB_</strong>: tương tự DBA_ nhưng áp dụng cho toàn bộ CDB (trong Multitenant), hiển thị thông tin từ root và các PDB.</li>
<li>Ví dụ:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> table_name <span class="hljs-keyword">FROM</span> user_tables;
<span class="hljs-keyword">SELECT</span> table_name <span class="hljs-keyword">FROM</span> all_tables <span class="hljs-keyword">WHERE</span> owner<span class="hljs-operator">=</span><span class="hljs-string">&#x27;SCOTT&#x27;</span>;
<span class="hljs-keyword">SELECT</span> table_name <span class="hljs-keyword">FROM</span> dba_tables;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="64" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="dynamic-performance-views---v-v%C3%A0-gv">Dynamic Performance Views - V$ và GV$</h1>
<ul>
<li><strong>V$</strong> views lấy thông tin từ SGA và cấu trúc bộ nhớ, cung cấp dữ liệu động về instance.</li>
<li>Ví dụ: <code>V$INSTANCE</code>, <code>V$DATABASE</code>, <code>V$SGA</code>, <code>V$SESSION</code>, <code>V$SQL</code>, <code>V$LOCK</code>.</li>
<li><strong>GV$</strong> views tương tự nhưng lấy từ tất cả instances trong RAC.</li>
<li>Cần quyền SELECT ANY DICTIONARY hoặc quyền tương ứng.</li>
<li>Truy vấn phổ biến:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> <span class="hljs-operator">*</span> <span class="hljs-keyword">FROM</span> v$version;
<span class="hljs-keyword">SELECT</span> status <span class="hljs-keyword">FROM</span> v$instance;
<span class="hljs-keyword">SELECT</span> osuser, username, program <span class="hljs-keyword">FROM</span> v$session;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="65" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
