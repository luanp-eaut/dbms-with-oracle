<h1 id="khai-th%C3%A1c-th%C3%B4ng-tin-h%E1%BB%87-th%E1%BB%91ng---query-datafiles">Khai thác thông tin hệ thống - Query Datafiles</h1>
<ul>
<li>Xem chi tiết data files:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> file_id, file_name, tablespace_name, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> size_mb, autoextensible, status
<span class="hljs-keyword">FROM</span> dba_data_files
<span class="hljs-keyword">ORDER</span> <span class="hljs-keyword">BY</span> tablespace_name, file_id;
</code></pre>
<ul>
<li>Xem thông tin mở rộng:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> file_name, increment_by<span class="hljs-operator">*</span>block_size<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> inc_mb, maxbytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> max_mb
<span class="hljs-keyword">FROM</span> dba_data_files
<span class="hljs-keyword">WHERE</span> autoextensible<span class="hljs-operator">=</span><span class="hljs-string">&#x27;YES&#x27;</span>;
</code></pre>
<ul>
<li>Sử dụng view <code>v$datafile</code> để xem trạng thái online:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> file#, status, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> size_mb <span class="hljs-keyword">FROM</span> v$datafile;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="66" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="khai-th%C3%A1c-th%C3%B4ng-tin-h%E1%BB%87-th%E1%BB%91ng---query-tempfiles">Khai thác thông tin hệ thống - Query Tempfiles</h1>
<ul>
<li>Xem temp files:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> file_name, tablespace_name, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> size_mb, autoextensible
<span class="hljs-keyword">FROM</span> dba_temp_files;
</code></pre>
<ul>
<li>Sử dụng view <code>v$tempfile</code>:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> name, status, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> size_mb <span class="hljs-keyword">FROM</span> v$tempfile;
</code></pre>
<ul>
<li>Kiểm tra dung lượng sử dụng tạm:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, <span class="hljs-built_in">sum</span>(bytes_used)<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> used_mb, <span class="hljs-built_in">sum</span>(bytes_free)<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> free_mb
<span class="hljs-keyword">FROM</span> v$temp_space_header
<span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> tablespace_name;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="67" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="khai-th%C3%A1c-th%C3%B4ng-tin-h%E1%BB%87-th%E1%BB%91ng---query-tablespaces">Khai thác thông tin hệ thống - Query Tablespaces</h1>
<ul>
<li>Xem danh sách tablespace:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, status, contents, bigfile <span class="hljs-keyword">FROM</span> dba_tablespaces;
</code></pre>
<ul>
<li>Xem thông tin trạng thái và tệp:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> tablespace_name, file_name, status <span class="hljs-keyword">FROM</span> dba_data_files;
</code></pre>
<ul>
<li>Kết hợp:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> t.tablespace_name, t.status, t.contents,
       <span class="hljs-built_in">sum</span>(f.bytes)<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> total_mb
<span class="hljs-keyword">FROM</span> dba_tablespaces t <span class="hljs-keyword">LEFT</span> <span class="hljs-keyword">JOIN</span> dba_data_files f <span class="hljs-keyword">ON</span> t.tablespace_name <span class="hljs-operator">=</span> f.tablespace_name
<span class="hljs-keyword">GROUP</span> <span class="hljs-keyword">BY</span> t.tablespace_name, t.status, t.contents;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="68" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="khai-th%C3%A1c-th%C3%B4ng-tin-h%E1%BB%87-th%E1%BB%91ng---query-users">Khai thác thông tin hệ thống - Query Users</h1>
<ul>
<li>Xem danh sách user:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> username, account_status, default_tablespace, temporary_tablespace, created
<span class="hljs-keyword">FROM</span> dba_users
<span class="hljs-keyword">ORDER</span> <span class="hljs-keyword">BY</span> username;
</code></pre>
<ul>
<li>Xem thông tin user hiện tại:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> <span class="hljs-keyword">user</span> <span class="hljs-keyword">FROM</span> dual;
<span class="hljs-keyword">SELECT</span> sys_context(<span class="hljs-string">&#x27;USERENV&#x27;</span>, <span class="hljs-string">&#x27;SESSION_USER&#x27;</span>) <span class="hljs-keyword">FROM</span> dual;
</code></pre>
<ul>
<li>Xem các role của user:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> granted_role <span class="hljs-keyword">FROM</span> dba_role_privs <span class="hljs-keyword">WHERE</span> grantee<span class="hljs-operator">=</span><span class="hljs-string">&#x27;APP_USER&#x27;</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="69" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="khai-th%C3%A1c-th%C3%B4ng-tin-h%E1%BB%87-th%E1%BB%91ng---query-cdbpdb">Khai thác thông tin hệ thống - Query CDB/PDB</h1>
<ul>
<li>Trong môi trường Multitenant:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> name, open_mode, con_id <span class="hljs-keyword">FROM</span> v$pdbs;
</code></pre>
<ul>
<li>Xem container hiện tại:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> sys_context(<span class="hljs-string">&#x27;USERENV&#x27;</span>, <span class="hljs-string">&#x27;CON_NAME&#x27;</span>) <span class="hljs-keyword">FROM</span> dual;
</code></pre>
<ul>
<li>Xem các đối tượng trong CDB:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> owner, object_name, object_type <span class="hljs-keyword">FROM</span> cdb_objects <span class="hljs-keyword">WHERE</span> con_id <span class="hljs-operator">=</span> <span class="hljs-number">3</span>; <span class="hljs-comment">-- PDB ID</span>
</code></pre>
<ul>
<li>Chuyển đổi container:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> SESSION <span class="hljs-keyword">SET</span> CONTAINER <span class="hljs-operator">=</span> pdb_name;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="70" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="qu%E1%BA%A3n-tr%E1%BB%8B-ng%C6%B0%E1%BB%9Di-d%C3%B9ng-v%C3%A0-b%E1%BA%A3o-m%E1%BA%ADt">Quản trị người dùng và bảo mật</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="71" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="b%E1%BA%A3o-m%E1%BA%ADt-oracle---t%E1%BB%95ng-quan">Bảo mật Oracle - Tổng quan</h1>
<ul>
<li>Bảo mật dữ liệu qua xác thực, phân quyền, vai trò và hồ sơ.</li>
<li><strong>User Account</strong>: tài khoản đăng nhập, xác thực bằng password, Kerberos, LDAP, v.v.</li>
<li><strong>Privileges</strong>: quyền thực hiện hành động (system privilege) hoặc truy cập đối tượng (object privilege).</li>
<li><strong>Role</strong>: nhóm các quyền để gán cho user.</li>
<li><strong>SYS và SYSTEM</strong>: các user quản trị đặc biệt.</li>
<li><strong>Profile</strong>: giới hạn tài nguyên và chính sách mật khẩu.</li>
<li><strong>Tablespace Quota</strong>: giới hạn dung lượng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="72" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="oracle-account---user-v%C3%A0-authentication">Oracle Account - User và Authentication</h1>
<ul>
<li>User được tạo bằng <code>CREATE USER</code>.</li>
<li>Các phương thức xác thực:
<ul>
<li><strong>Password</strong>: mặc định, dùng password.</li>
<li><strong>External</strong>: dùng thông tin từ OS hoặc dịch vụ bên ngoài.</li>
<li><strong>Global</strong>: dùng LDAP hoặc Oracle Internet Directory.</li>
</ul>
</li>
</ul>
<div class="columns">
<div class="col-4">
<ul>
<li>Tạo user với password:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> <span class="hljs-keyword">USER</span> app_user IDENTIFIED <span class="hljs-keyword">BY</span> password;
</code></pre>
<ul>
<li>Thay đổi password:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user IDENTIFIED <span class="hljs-keyword">BY</span> new_password;
</code></pre>
</div>
<div class="col-3">
<ul>
<li>Khóa/mở khóa user:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user ACCOUNT LOCK;
<span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user ACCOUNT UNLOCK;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="73" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="privileges---system-privilege">Privileges - System Privilege</h1>
<ul>
<li>System privilege cho phép thực hiện hành động quản trị (CREATE TABLE, CREATE USER, ALTER SYSTEM, etc.).</li>
<li>Một số system privileges quan trọng:
<ul>
<li><code>CREATE SESSION</code>: kết nối database.</li>
<li><code>CREATE TABLE</code>: tạo bảng trong schema.</li>
<li><code>CREATE ANY TABLE</code>: tạo bảng trong bất kỳ schema.</li>
<li><code>ALTER DATABASE</code>, <code>ALTER SYSTEM</code>.</li>
<li><code>DBA</code>, <code>SYSDBA</code>, <code>SYSOPER</code>.</li>
</ul>
</li>
</ul>
<div class="columns">
<div>
<ul>
<li>Cấp quyền:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">GRANT</span> <span class="hljs-keyword">CREATE</span> SESSION, <span class="hljs-keyword">CREATE TABLE</span> <span class="hljs-keyword">TO</span> app_user;
</code></pre>
</div>
<div>
<ul>
<li>Thu hồi:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">REVOKE</span> <span class="hljs-keyword">CREATE TABLE</span> <span class="hljs-keyword">FROM</span> app_user;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="74" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="privileges---object-privilege">Privileges - Object Privilege</h1>
<ul>
<li>Object privilege cho phép thao tác trên một đối tượng cụ thể (bảng, view, sequence, procedure).</li>
<li>Các object privileges: SELECT, INSERT, UPDATE, DELETE, EXECUTE, REFERENCES, INDEX, ALTER.</li>
<li>Cấp quyền:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">GRANT</span> <span class="hljs-keyword">SELECT</span>, <span class="hljs-keyword">INSERT</span> <span class="hljs-keyword">ON</span> employees <span class="hljs-keyword">TO</span> hr_user;
<span class="hljs-keyword">GRANT</span> <span class="hljs-keyword">EXECUTE</span> <span class="hljs-keyword">ON</span> proc_calc <span class="hljs-keyword">TO</span> app_user;
</code></pre>
<ul>
<li>Thu hồi:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">REVOKE</span> <span class="hljs-keyword">INSERT</span> <span class="hljs-keyword">ON</span> employees <span class="hljs-keyword">FROM</span> hr_user;
</code></pre>
<ul>
<li>Quyền có thể được cấp với <code>WITH GRANT OPTION</code> để cho phép cấp tiếp.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="75" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="role---kh%C3%A1i-ni%E1%BB%87m">Role - Khái niệm</h1>
<ul>
<li>Role là tập hợp các quyền, giúp đơn giản hóa quản lý.</li>
<li>Thay vì cấp nhiều quyền riêng lẻ cho user, cấp một role.</li>
<li>Có các role mặc định: <code>CONNECT</code>, <code>RESOURCE</code>, <code>DBA</code>.</li>
<li>Tạo role:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> ROLE app_role;
</code></pre>
<ul>
<li>Cấp quyền cho role:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">GRANT</span> <span class="hljs-keyword">CREATE</span> SESSION, <span class="hljs-keyword">CREATE TABLE</span> <span class="hljs-keyword">TO</span> app_role;
</code></pre>
<ul>
<li>Cấp role cho user:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">GRANT</span> app_role <span class="hljs-keyword">TO</span> app_user;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="76" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="default-roles-v%C3%A0-qu%E1%BA%A3n-tr%E1%BB%8B-role">Default Roles và Quản trị Role</h1>
<ul>
<li>User có thể có nhiều role, nhưng chỉ một số là <strong>default</strong> (tự động kích hoạt khi connect).</li>
<li>Xem default roles:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> username, default_role <span class="hljs-keyword">FROM</span> dba_roles;
</code></pre>
<ul>
<li>Thay đổi default role:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user <span class="hljs-keyword">DEFAULT</span> ROLE app_role, <span class="hljs-keyword">CONNECT</span>;
</code></pre>
<div class="columns">
<div class="col-3">
<ul>
<li>Kích hoạt/tắt role trong session:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SET</span> ROLE app_role;
<span class="hljs-keyword">SET</span> ROLE <span class="hljs-keyword">NONE</span>;
</code></pre>
</div>
<div class="col-4">
<ul>
<li>Vô hiệu hóa role:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">REVOKE</span> app_role <span class="hljs-keyword">FROM</span> app_user;
</code></pre>
<ul>
<li>Xóa role:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">DROP</span> ROLE app_role;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="77" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="sys-v%C3%A0-system">SYS và SYSTEM</h1>
<ul>
<li><strong>SYS</strong>: user quản trị cao nhất, sở hữu data dictionary. Có tất cả quyền, bao gồm SYSDBA.</li>
<li><strong>SYSTEM</strong>: user quản trị, sở hữu các bảng mở rộng, có quyền DBA nhưng không phải SYSDBA.</li>
<li>Chỉ sử dụng SYS để thực hiện các tác vụ yêu cầu SYSDBA (khởi động, tắt, backup, recovery).</li>
<li>Không nên sử dụng SYS/SYSTEM cho các tác vụ thường ngày.</li>
<li>Thay đổi mật khẩu:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> SYS IDENTIFIED <span class="hljs-keyword">BY</span> new_password;
<span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> <span class="hljs-keyword">SYSTEM</span> IDENTIFIED <span class="hljs-keyword">BY</span> new_password;
</code></pre>
<ul>
<li>Cấp quyền SYSDBA cho user khác:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">GRANT</span> SYSDBA <span class="hljs-keyword">TO</span> admin_user;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="78" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="profile---password-policy">Profile - Password Policy</h1>
<ul>
<li>Profile định nghĩa chính sách mật khẩu và giới hạn tài nguyên.</li>
<li>Password policy:
<ul>
<li><code>FAILED_LOGIN_ATTEMPTS</code>: số lần thất bại trước khi khóa.</li>
<li><code>PASSWORD_LOCK_TIME</code>: thời gian khóa.</li>
<li><code>PASSWORD_LIFE_TIME</code>: thời gian tồn tại mật khẩu.</li>
<li><code>PASSWORD_REUSE_TIME/MAX</code>: hạn chế dùng lại.</li>
<li><code>PASSWORD_VERIFY_FUNCTION</code>: hàm kiểm tra độ mạnh.</li>
</ul>
</li>
</ul>
<div class="columns">
<div class="col-3">
<ul>
<li>Tạo profile:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> PROFILE app_profile LIMIT
  FAILED_LOGIN_ATTEMPTS <span class="hljs-number">5</span>
  PASSWORD_LOCK_TIME <span class="hljs-number">1</span>
  PASSWORD_LIFE_TIME <span class="hljs-number">90</span>
  PASSWORD_REUSE_TIME <span class="hljs-number">365</span>;
</code></pre>
</div>
<div class="col-4">
<ul>
<li>Gán cho user:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user PROFILE app_profile;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="79" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="profile---resource-limit">Profile - Resource Limit</h1>
<ul>
<li>Resource limit giới hạn sử dụng tài nguyên hệ thống trong một session.</li>
<li>Các tham số:</li>
</ul>
<div class="columns">
<div class="col-4">
<ul>
<ul>
<li><code>SESSIONS_PER_USER</code>: số session tối đa.</li>
<li><code>CPU_PER_SESSION</code>: CPU time tối đa.</li>
<li><code>LOGICAL_READS_PER_SESSION</code>: số block đọc tối đa.</li>
</ul>
</ul>
</div>
<div class="col-3">
<ul>
<ul>
<li><code>IDLE_TIME</code>: thời gian idle tối đa (phút).</li>
<li><code>CONNECT_TIME</code>: thời gian kết nối tối đa.</li>
</ul>
</ul>
</div>
</div>
<ul>
<li>Ví dụ:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">CREATE</span> PROFILE resource_profile LIMIT
  SESSIONS_PER_USER <span class="hljs-number">10</span>
  CPU_PER_SESSION <span class="hljs-number">1000</span>
  IDLE_TIME <span class="hljs-number">30</span>;
</code></pre>
<ul>
<li>Để kích hoạt giới hạn tài nguyên, tham số <code>RESOURCE_LIMIT</code> phải là TRUE:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">SYSTEM</span> <span class="hljs-keyword">SET</span> RESOURCE_LIMIT<span class="hljs-operator">=</span><span class="hljs-literal">TRUE</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="80" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="tablespace-quota---nh%E1%BA%AFc-l%E1%BA%A1i">Tablespace Quota - Nhắc lại</h1>
<ul>
<li>Quota giới hạn dung lượng user sử dụng trên tablespace.</li>
<li>Xem quota:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">SELECT</span> username, tablespace_name, bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> used_mb, max_bytes<span class="hljs-operator">/</span><span class="hljs-number">1024</span><span class="hljs-operator">/</span><span class="hljs-number">1024</span> <span class="hljs-keyword">AS</span> max_mb
<span class="hljs-keyword">FROM</span> dba_ts_quotas
<span class="hljs-keyword">WHERE</span> username<span class="hljs-operator">=</span><span class="hljs-string">&#x27;APP_USER&#x27;</span>;
</code></pre>
<ul>
<li>Thiết lập quota:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user QUOTA <span class="hljs-number">500</span>M <span class="hljs-keyword">ON</span> ts_app;
<span class="hljs-keyword">ALTER</span> <span class="hljs-keyword">USER</span> app_user QUOTA UNLIMITED <span class="hljs-keyword">ON</span> ts_data;
</code></pre>
<ul>
<li>Nếu không có quota, user không thể tạo đối tượng trên tablespace đó.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" data-paginate="true" data-class="section" data-theme="eaut" lang="en-US" class="section" data-marpit-pagination="81" style="--paginate:true;--class:section;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="sao-l%C6%B0u-v%C3%A0-ph%E1%BB%A5c-h%E1%BB%93i">Sao lưu và phục hồi</h1>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="82" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="backup--recovery---t%E1%BB%95ng-quan">Backup &amp; Recovery - Tổng quan</h1>
<ul>
<li>Backup &amp; Recovery đảm bảo an toàn dữ liệu khi gặp sự cố (lỗi phần cứng, lỗi người dùng, thiên tai).</li>
<li>Nguyên nhân mất dữ liệu: lỗi media, lỗi logic, lỗi user.</li>
<li>RTO (Recovery Time Objective): thời gian tối đa để phục hồi.</li>
<li>RPO (Recovery Point Objective): lượng dữ liệu tối đa có thể mất (tính bằng thời gian).</li>
<li>Chiến lược backup: full, incremental, cold, hot.</li>
<li>Phương pháp backup: user-managed (thủ công) hoặc RMAN (Oracle Recovery Manager).</li>
<li>RMAN là công cụ mạnh mẽ, tích hợp, hỗ trợ nhiều tính năng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="83" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="nguy%C3%AAn-nh%C3%A2n-m%E1%BA%A5t-d%E1%BB%AF-li%E1%BB%87u-v%C3%A0-rtorpo">Nguyên nhân mất dữ liệu và RTO/RPO</h1>
<ul>
<li><strong>Lỗi media</strong>: hỏng đĩa, lỗi file system.</li>
<li><strong>Lỗi logic</strong>: lỗi phần mềm, sai sót người dùng (DROP TABLE, DELETE không có điều kiện).</li>
<li><strong>Lỗi site</strong>: mất trung tâm dữ liệu.</li>
<li><strong>RTO</strong>: thời gian phục hồi tối đa chấp nhận được. Ví dụ: 2 giờ.</li>
<li><strong>RPO</strong>: lượng dữ liệu có thể mất. Ví dụ: 15 phút (có nghĩa cần backup mỗi 15 phút).</li>
<li>Xác định RTO/RPO giúp chọn chiến lược backup phù hợp.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="84" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="chi%E1%BA%BFn-l%C6%B0%E1%BB%A3c-backup---full-v%C3%A0-incremental">Chiến lược Backup - Full và Incremental</h1>
<ul>
<li><strong>Full backup</strong>: sao lưu toàn bộ database (data files, control file, archive logs).</li>
<li><strong>Incremental backup</strong>: chỉ sao lưu các block đã thay đổi từ lần backup trước.
<ul>
<li>Cấp 0: full (cơ sở cho incremental).</li>
<li>Cấp 1: incremental kể từ cấp 0 hoặc cấp 1 trước.</li>
</ul>
</li>
<li>Incremental giảm dung lượng và thời gian, nhưng phục hồi phức tạp hơn.</li>
<li>Ví dụ lịch: full hàng tuần, incremental hàng ngày.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="85" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="chi%E1%BA%BFn-l%C6%B0%E1%BB%A3c-backup---cold-v%C3%A0-hot">Chiến lược Backup - Cold và Hot</h1>
<ul>
<li><strong>Cold backup</strong> (offline): backup khi database shutdown. Đơn giản, an toàn, nhưng thời gian downtime cao.</li>
<li><strong>Hot backup</strong> (online): backup trong khi database đang mở. Dùng với archive log mode.</li>
<li>Hot backup yêu cầu database ở chế độ ARCHIVELOG.</li>
<li>Hot backup phù hợp với hệ thống 24/7.</li>
<li>Cold backup có thể thực hiện bằng cách copy các file khi database đóng.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="86" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="ph%C6%B0%C6%A1ng-ph%C3%A1p-backup---user-managed-backup">Phương pháp Backup - User Managed Backup</h1>
<ul>
<li>User-managed: backup thủ công bằng các lệnh OS (cp, tar) hoặc SQL.</li>
<li>Cần thực hiện đồng bộ: đưa tablespace offline, backup data file, đưa online (cho hot).</li>
<li>Cold backup: shutdown, copy tất cả file, startup.</li>
<li>Hot backup (chế độ archive log):</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">ALTER</span> TABLESPACE ts_app <span class="hljs-keyword">BEGIN</span> BACKUP;

<span class="hljs-comment">-- copy data file</span>
<span class="hljs-keyword">ALTER</span> TABLESPACE ts_app <span class="hljs-keyword">END</span> BACKUP;
</code></pre>
<ul>
<li>Quản lý phức tạp, dễ sai sót, khuyến nghị dùng RMAN.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="87" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="recovery-manager-rman---ki%E1%BA%BFn-tr%C3%BAc-v%C3%A0-th%C3%A0nh-ph%E1%BA%A7n">Recovery Manager (RMAN) - Kiến trúc và Thành phần</h1>
<ul>
<li>RMAN là công cụ backup và recovery tích hợp của Oracle.</li>
<li>Kiến trúc: client (rman) kết nối đến target database thông qua Net.</li>
<li>RMAN sử dụng các process server session để thực hiện backup/recovery.</li>
<li>Thành phần:
<ul>
<li><strong>Target database</strong>: database cần backup.</li>
<li><strong>Catalog database</strong>: repository lưu metadata (tùy chọn, khuyến nghị).</li>
<li><strong>Recovery catalog</strong>: schema chứa thông tin backup.</li>
</ul>
</li>
<li>Không cần catalog, RMAN có thể dùng control file để lưu metadata (nhưng hạn chế).</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="88" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="rman---backup-sets-v%C3%A0-image-copies">RMAN - Backup Sets và Image Copies</h1>
<ul>
<li><strong>Backup Set</strong>: định dạng backup của RMAN, gồm một hoặc nhiều <strong>backup pieces</strong>.
<ul>
<li>Có thể nén, nhiều file vào một piece.</li>
</ul>
</li>
<li><strong>Image Copy</strong>: bản sao chính xác của data file (giống OS copy), nhưng được quản lý bởi RMAN.
<ul>
<li>Có thể dùng để phục hồi nhanh (restore).</li>
</ul>
</li>
<li>Backup set thường dùng với incremental, tiết kiệm dung lượng.</li>
<li>Image copy hữu ích cho phục hồi tại chỗ.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="89" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="rman---c%C3%A1c-l%E1%BB%87nh-c%C6%A1-b%E1%BA%A3n-configuration">RMAN - Các lệnh cơ bản (Configuration)</h1>
<ul>
<li>Cấu hình RMAN:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">CONFIGURE RETENTION POLICY <span class="hljs-keyword">TO</span> REDUNDANCY <span class="hljs-number">2</span>;  <span class="hljs-comment">-- giữ 2 bản backup</span>
CONFIGURE BACKUP OPTIMIZATION <span class="hljs-keyword">ON</span>;
CONFIGURE <span class="hljs-keyword">DEFAULT</span> DEVICE TYPE <span class="hljs-keyword">TO</span> DISK;
CONFIGURE DEVICE TYPE DISK PARALLELISM <span class="hljs-number">2</span>;
CONFIGURE CHANNEL DEVICE TYPE DISK FORMAT <span class="hljs-string">&#x27;/backup/%U.bkp&#x27;</span>;
CONFIGURE CONTROLFILE AUTOBACKUP <span class="hljs-keyword">ON</span>;
</code></pre>
<ul>
<li>Xem cấu hình: <code>SHOW ALL;</code></li>
<li>Các thiết lập này lưu trong control file hoặc recovery catalog.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="90" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="90" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="rman---l%E1%BB%87nh-backup">RMAN - Lệnh Backup</h1>
<div class="columns">
<div>
<ul>
<li>Backup full database:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; BACKUP DATABASE PLUS ARCHIVELOG DELETE INPUT;
</code></pre>
<ul>
<li>Backup tablespace:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; BACKUP TABLESPACE ts_app;
</code></pre>
<ul>
<li>Backup datafile:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; BACKUP DATAFILE <span class="hljs-number">5</span>;
</code></pre>
</div>
<div>
<ul>
<li>Backup incremental level 0:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; BACKUP INCREMENTAL LEVEL <span class="hljs-number">0</span> DATABASE;
</code></pre>
<ul>
<li>Backup với tag:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; BACKUP DATABASE TAG &#x27;full_backup_20260107&#x27;;
</code></pre>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="91" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="91" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="rman---l%E1%BB%87nh-restore-v%C3%A0-recovery">RMAN - Lệnh Restore và Recovery</h1>
<ul>
<li><strong>Restore</strong>: lấy lại file từ backup.</li>
<li><strong>Recovery</strong>: áp dụng redo logs để đưa dữ liệu lên thời điểm mới nhất.</li>
<li>Ví dụ restore database:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; <span class="hljs-built_in">RESTORE</span> DATABASE;
RMAN&gt; <span class="hljs-built_in">RECOVER</span> DATABASE;
</code></pre>
<ul>
<li>Restore tablespace:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; <span class="hljs-built_in">RESTORE</span> TABLESPACE ts_app;
RMAN&gt; <span class="hljs-built_in">RECOVER</span> TABLESPACE ts_app;
</code></pre>
<ul>
<li>Restore datafile:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; <span class="hljs-built_in">RESTORE</span> DATAFILE <span class="hljs-number">5</span>;
RMAN&gt; <span class="hljs-built_in">RECOVER</span> DATAFILE <span class="hljs-number">5</span>;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="92" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="92" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="rman---l%E1%BB%87nh-reporting-v%C3%A0-maintenance">RMAN - Lệnh Reporting và Maintenance</h1>
<ul>
<li>Báo cáo:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; LIST BACKUP SUMMARY;
RMAN&gt; LIST BACKUP OF DATABASE;
RMAN&gt; REPORT NEED BACKUP;   -- những file cần backup
RMAN&gt; REPORT UNRECOVERABLE;
</code></pre>
<ul>
<li>Maintenance:</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">RMAN&gt; DELETE OBSOLETE;      -- xóa các backup không cần thiết theo chính sách
RMAN&gt; DELETE EXPIRED BACKUP;-- xóa backup bị lỗi
RMAN&gt; CROSSCHECK BACKUP;    -- kiểm tra sự tồn tại của backup
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="93" data-paginate="true" data-theme="eaut" lang="en-US" data-marpit-pagination="93" style="--paginate:true;--theme:eaut;" data-marpit-pagination-total="94">
<h1 id="rman-script-m%E1%BA%ABu">RMAN Script mẫu</h1>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-cmd">#!/bin/bash
# RMAN backup script
rman target / &lt;&lt;EOF
CONFIGURE RETENTION POLICY TO RECOVERY WINDOW OF <span class="hljs-number">7</span> DAYS;
BACKUP AS COMPRESSED BACKUPSET DATABASE PLUS ARCHIVELOG DELETE INPUT;
BACKUP CURRENT CONTROLFILE;
DELETE OBSOLETE;
<span class="hljs-keyword">EXIT</span>;
EOF
</code></pre>
<ul>
<li>Lưu thành file .sh và lập lịch (cron) hàng ngày.</li>
<li>Có thể thêm email notification.</li>
<li>Đảm bảo backup được lưu trên storage khác để an toàn.</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="94" data-paginate="true" data-class="empty" data-theme="eaut" lang="en-US" class="empty" data-marpit-pagination="94" style="--paginate:true;--class:empty;--theme:eaut;" data-marpit-pagination-total="94">
